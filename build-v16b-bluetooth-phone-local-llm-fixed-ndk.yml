name: V16B Rokid Bluetooth Phone Local LLM Fixed NDK APKs

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build V16B Bluetooth Local LLM APKs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform, NDK, and CMake
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build phone llama-cli Android runner
        run: |
          set -euxo pipefail

          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp

          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          export READELF="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          export STRIP="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          ls -lh "$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake"
          "$ANDROID_HOME/cmake/3.22.1/bin/cmake" --version
          ninja --version

          "$ANDROID_HOME/cmake/3.22.1/bin/cmake" -G Ninja -S /tmp/llama.cpp -B /tmp/llama-build \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_C_FLAGS="-Oz -ffunction-sections -fdata-sections -march=armv8.2-a" \
            -DCMAKE_CXX_FLAGS="-Oz -ffunction-sections -fdata-sections -march=armv8.2-a" \
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,--gc-sections -Wl,--strip-all" \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--gc-sections -Wl,--strip-all" \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=OFF \
            -DGGML_LLAMAFILE=OFF \
            -DGGML_BLAS=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_METAL=OFF \
            -DGGML_VULKAN=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_APP=OFF \
            -DLLAMA_BUILD_UI=OFF \
            -DLLAMA_USE_PREBUILT_UI=OFF \
            -DLLAMA_TOOLS_INSTALL=OFF

          "$ANDROID_HOME/cmake/3.22.1/bin/cmake" --build /tmp/llama-build --target help | grep -E 'llama-cli|llama-server|simple|main' || true
          "$ANDROID_HOME/cmake/3.22.1/bin/cmake" --build /tmp/llama-build --config Release -j2 --target llama-cli

          BIN="$(find /tmp/llama-build -type f -name 'llama-cli' -perm -111 | head -n 1 || true)"
          if [ -z "$BIN" ]; then
            echo "llama-cli target built but executable was not found."
            find /tmp/llama-build -type f -perm -111 -exec ls -lh {} \; || true
            exit 1
          fi

          mkdir -p /tmp/phone-llm-assets/llama-lib
          cp "$BIN" /tmp/phone-llm-assets/llama-runner-arm64
          chmod 755 /tmp/phone-llm-assets/llama-runner-arm64
          "$STRIP" --strip-all /tmp/phone-llm-assets/llama-runner-arm64 || true
          echo "cli" > /tmp/phone-llm-assets/llama-runner-kind.txt

          for LIB in $("$READELF" -d /tmp/phone-llm-assets/llama-runner-arm64 2>/dev/null | sed -n 's/.*Shared library: \[\(.*\)\].*/\1/p' | sort -u); do
            case "$LIB" in
              libc.so|libm.so|libdl.so|liblog.so)
                echo "System lib, not copying: $LIB"
                ;;
              libc++_shared.so)
                STL="$(find "$ANDROID_NDK_HOME" -name libc++_shared.so | grep -E 'arm64-v8a|aarch64-linux-android' | head -n 1 || true)"
                if [ -n "$STL" ] && [ -f "$STL" ]; then
                  cp "$STL" "/tmp/phone-llm-assets/llama-lib/$LIB"
                  "$STRIP" --strip-all "/tmp/phone-llm-assets/llama-lib/$LIB" || true
                fi
                ;;
              *)
                FOUND="$(find /tmp/llama-build -type f -name "$LIB" | head -n 1 || true)"
                if [ -n "$FOUND" ] && [ -f "$FOUND" ]; then
                  cp "$FOUND" "/tmp/phone-llm-assets/llama-lib/$LIB"
                  "$STRIP" --strip-all "/tmp/phone-llm-assets/llama-lib/$LIB" || true
                else
                  echo "WARNING: Needed lib not found in build tree: $LIB"
                fi
                ;;
            esac
          done

          for LIBNAME in libllama.so libggml.so libggml-base.so libggml-cpu.so; do
            FOUND="$(find /tmp/llama-build -type f -name "$LIBNAME" | head -n 1 || true)"
            if [ -n "$FOUND" ] && [ -f "$FOUND" ] && [ ! -f "/tmp/phone-llm-assets/llama-lib/$LIBNAME" ]; then
              cp "$FOUND" "/tmp/phone-llm-assets/llama-lib/$LIBNAME"
              "$STRIP" --strip-all "/tmp/phone-llm-assets/llama-lib/$LIBNAME" || true
            fi
          done

          echo "Phone LLM payload:"
          find /tmp/phone-llm-assets -maxdepth 2 -type f -exec ls -lh {} \; || true
          du -sh /tmp/phone-llm-assets || true


      - name: Generate Phone Bluetooth Brain Bridge
        run: |
          set -e
          mkdir -p phone/app/src/main/java/com/damage/copilot/btbrain
          mkdir -p phone/app/src/main/res/values
          mkdir -p phone/app/src/main/assets

          cp /tmp/phone-llm-assets/llama-runner-arm64 phone/app/src/main/assets/llama-runner-arm64
          cp /tmp/phone-llm-assets/llama-runner-kind.txt phone/app/src/main/assets/llama-runner-kind.txt
          cp -a /tmp/phone-llm-assets/llama-lib phone/app/src/main/assets/llama-lib

          echo "Downloading phone SmolLM2 135M GGUF local brain..."
          curl -L --retry 3 -o phone/app/src/main/assets/brain.gguf "https://huggingface.co/bartowski/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q4_K_M.gguf?download=true"

          echo "Phone asset sizes:"
          du -sh phone/app/src/main/assets/* || true

          cat > phone/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "PhoneBluetoothLocalLlmBrain"
          include ":app"
          EOF

          cat > phone/build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > phone/app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.damage.copilot.btbrain"
              compileSdk 35

              defaultConfig {
                  applicationId "com.damage.copilot.btbrain"
                  minSdk 23
                  targetSdk 28
                  versionCode 1603
                  versionName "16.0b-phone-bluetooth-local-llm-fixed-ndk"

                  ndk {
                      abiFilters "arm64-v8a"
                  }
              }

              aaptOptions {
                  noCompress "gguf"
              }
          }
          EOF

          cat > phone/app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">BT Brain</string>
          </resources>
          EOF

          cat > phone/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.BTBrain" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowBackground">#000000</item>
                  <item name="android:fontFamily">sans</item>
              </style>
          </resources>
          EOF

          cat > phone/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-feature android:name="android.hardware.bluetooth" android:required="false" />

              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.BTBrain"
                  android:resizeableActivity="true"
                  android:largeHeap="true"
                  android:extractNativeLibs="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > phone/app/src/main/java/com/damage/copilot/btbrain/MainActivity.java <<'EOF'
          package com.damage.copilot.btbrain;

          import android.Manifest;
          import android.app.Activity;
          import android.bluetooth.BluetoothAdapter;
          import android.bluetooth.BluetoothDevice;
          import android.bluetooth.BluetoothServerSocket;
          import android.bluetooth.BluetoothSocket;
          import android.content.pm.PackageManager;
          import android.content.res.AssetManager;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.MotionEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;

          import java.io.BufferedReader;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.io.InputStreamReader;
          import java.io.OutputStream;
          import java.nio.charset.StandardCharsets;
          import java.util.Locale;
          import java.util.Set;
          import java.util.UUID;
          import java.util.concurrent.TimeUnit;

          public class MainActivity extends Activity {
              private static final UUID COPILOT_UUID = UUID.fromString("8b6f9b10-6f8d-4b7f-9d34-2d4b7a0f9c21");
              private static final String SERVICE_NAME = "DamageCopilotBrainV16A";
              private static final int REQ_PERMS = 300;

              private static final String ASSET_LLM_MODEL = "brain.gguf";
              private static final String ASSET_LLAMA_BIN = "llama-runner-arm64";
              private static final String ASSET_LLAMA_KIND = "llama-runner-kind.txt";
              private static final String ASSET_LLAMA_LIB_DIR = "llama-lib";

              private final Handler ui = new Handler(Looper.getMainLooper());
              private TextView status;
              private TextView details;
              private TextView lastBox;
              private TextView footer;

              private BluetoothAdapter adapter;
              private BluetoothServerSocket serverSocket;
              private volatile boolean running = false;
              private volatile boolean llmReady = false;
              private volatile boolean llmBusy = false;
              private Thread serverThread;

              private File llamaBinFile;
              private File llamaLibDir;
              private File llmModelFile;
              private String runnerKind = "unknown";

              private int accepts = 0;
              private int requests = 0;
              private int llmOk = 0;
              private int llmFail = 0;
              private int ruleFallbacks = 0;
              private String lastRemote = "(none)";
              private String lastTranscript = "(none)";
              private String lastCard = "(none)";
              private String lastError = "(none)";
              private String lastRaw = "(none)";

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  buildUi();
                  ensurePermissionsThenStart();
              }

              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(24, 24, 24, 24);
                  root.setBackgroundColor(Color.BLACK);

                  root.addView(tv("PHONE BT LLM BRAIN V16B", 23, "#00FF33", true));
                  status = tv("STARTING", 18, "#FFFFFF", true);
                  details = tv("Preparing Bluetooth server and local LLM...", 14, "#00FF33", false);
                  lastBox = tv("Waiting for Rokid transcript.", 15, "#00FF33", true);
                  footer = tv("No Wi-Fi • no cloud • phone-local LLM with rule fallback", 12, "#CCFFFFFF", false);

                  root.addView(status);
                  root.addView(details);
                  root.addView(lastBox);
                  root.addView(footer);
                  setContentView(root);
              }

              private TextView tv(String s, int size, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(s);
                  t.setTextSize(size);
                  t.setTextColor(Color.parseColor(color));
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(0, 6, 0, 6);
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              private void ensurePermissionsThenStart() {
                  if (Build.VERSION.SDK_INT >= 31) {
                      if (checkSelfPermission(Manifest.permission.BLUETOOTH_CONNECT) != PackageManager.PERMISSION_GRANTED ||
                          checkSelfPermission(Manifest.permission.BLUETOOTH_SCAN) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{
                              Manifest.permission.BLUETOOTH_CONNECT,
                              Manifest.permission.BLUETOOTH_SCAN
                          }, REQ_PERMS);
                          return;
                      }
                  } else if (Build.VERSION.SDK_INT >= 23) {
                      if (checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{Manifest.permission.ACCESS_FINE_LOCATION}, REQ_PERMS);
                          return;
                      }
                  }
                  initLlmAsync();
                  startServer();
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  initLlmAsync();
                  startServer();
              }

              private void initLlmAsync() {
                  status.setText("COPYING PHONE LLM");
                  details.setText("First launch copies the local model and runner. This may take a minute.");

                  new Thread(() -> {
                      try {
                          File brainDir = new File(getFilesDir(), "phone-local-llm-v16b");
                          if (!brainDir.exists()) brainDir.mkdirs();

                          llamaBinFile = new File(brainDir, "llama-runner");
                          llamaLibDir = new File(brainDir, "lib");
                          llmModelFile = new File(brainDir, "brain.gguf");

                          if (!llamaBinFile.exists() || llamaBinFile.length() < 1024) {
                              copyAssetFile(getAssets(), ASSET_LLAMA_BIN, llamaBinFile);
                          }
                          llamaBinFile.setReadable(true, false);
                          llamaBinFile.setExecutable(true, false);

                          if (!llamaLibDir.exists() || llamaLibDir.listFiles() == null || llamaLibDir.listFiles().length == 0) {
                              deleteRecursive(llamaLibDir);
                              llamaLibDir.mkdirs();
                              copyAssetDir(getAssets(), ASSET_LLAMA_LIB_DIR, llamaLibDir);
                          }

                          if (!llmModelFile.exists() || llmModelFile.length() < 50L * 1024L * 1024L) {
                              copyAssetFile(getAssets(), ASSET_LLM_MODEL, llmModelFile);
                          }

                          runnerKind = readSmallAsset(ASSET_LLAMA_KIND).trim();
                          if (runnerKind.length() == 0) runnerKind = "unknown";

                          llmReady = llamaBinFile.exists() && llamaBinFile.canExecute() && llmModelFile.exists() && llamaLibDir.exists();

                          ui.post(() -> updateUi(llmReady ? "BT SERVER + LLM READY" : "BT SERVER + RULES ONLY"));
                      } catch (Throwable e) {
                          llmReady = false;
                          lastError = "LLM init " + e.getClass().getSimpleName() + ": " + safe(e.getMessage());
                          ui.post(() -> updateUi("LLM INIT FAILED / RULES ONLY"));
                      }
                  }, "phone-llm-init-v16b").start();
              }

              private void startServer() {
                  stopServer();
                  adapter = BluetoothAdapter.getDefaultAdapter();

                  if (adapter == null) {
                      status.setText("NO BLUETOOTH ADAPTER");
                      details.setText("Phone does not expose BluetoothAdapter.");
                      return;
                  }

                  boolean enabled = false;
                  try { enabled = adapter.isEnabled(); } catch (Throwable ignored) {}

                  if (!enabled) {
                      status.setText("BLUETOOTH OFF");
                      details.setText("Turn Bluetooth on, pair with Rokid, then tap to retry.");
                      return;
                  }

                  running = true;
                  serverThread = new Thread(this::serverLoop, "phone-bt-llm-v16b-server");
                  serverThread.start();
                  updateUi("BT SERVER STARTING");
              }

              private void stopServer() {
                  running = false;
                  try { if (serverSocket != null) serverSocket.close(); } catch (Throwable ignored) {}
                  serverSocket = null;
              }

              private void serverLoop() {
                  try {
                      serverSocket = adapter.listenUsingRfcommWithServiceRecord(SERVICE_NAME, COPILOT_UUID);
                      ui.post(() -> updateUi(llmReady ? "BT SERVER + LLM READY" : "BT SERVER READY / LLM LOADING"));

                      while (running) {
                          BluetoothSocket socket = serverSocket.accept();
                          accepts++;
                          new Thread(() -> handleSocket(socket), "phone-bt-llm-v16b-client").start();
                      }
                  } catch (Throwable e) {
                      lastError = e.getClass().getSimpleName() + ": " + safe(e.getMessage());
                      if (running) ui.post(() -> updateUi("SERVER FAILED"));
                  }
              }

              private void handleSocket(BluetoothSocket socket) {
                  try {
                      BluetoothDevice remote = socket.getRemoteDevice();
                      lastRemote = safeDevice(remote);

                      BufferedReader br = new BufferedReader(new InputStreamReader(socket.getInputStream(), StandardCharsets.UTF_8));
                      OutputStream out = socket.getOutputStream();

                      StringBuilder input = new StringBuilder();
                      String line;
                      while ((line = br.readLine()) != null) {
                          if ("__END__".equals(line.trim())) break;
                          input.append(line).append("\n");
                          if (input.length() > 4000) break;
                      }

                      lastTranscript = input.toString().trim();
                      lastCard = thinkHybrid(lastTranscript);
                      requests++;

                      out.write((lastCard + "\n__END__\n").getBytes(StandardCharsets.UTF_8));
                      out.flush();

                      try { socket.close(); } catch (Throwable ignored) {}
                      ui.post(() -> updateUi("CONNECTED / REPLIED"));
                  } catch (Throwable e) {
                      lastError = e.getClass().getSimpleName() + ": " + safe(e.getMessage());
                      try { socket.close(); } catch (Throwable ignored) {}
                      ui.post(() -> updateUi("CLIENT ERROR"));
                  }
              }

              private String thinkHybrid(String text) {
                  String rule = ruleThink(text);

                  if (!llmReady) {
                      ruleFallbacks++;
                      return rule.replace("SOURCE: PHONE BT", "SOURCE: PHONE RULES");
                  }

                  if (llmBusy) {
                      ruleFallbacks++;
                      return rule.replace("SOURCE: PHONE BT", "SOURCE: PHONE RULES BUSY");
                  }

                  llmBusy = true;
                  try {
                      String raw = runLlama(text);
                      lastRaw = compactRaw(raw, 240);
                      String card = cleanLlmCard(raw);

                      if (card.length() >= 4) {
                          llmOk++;
                          return "SOURCE: PHONE LLM\n" + card;
                      }

                      llmFail++;
                      ruleFallbacks++;
                      lastError = "LLM invalid raw: " + compactRaw(raw, 120);
                      return rule.replace("SOURCE: PHONE BT", "SOURCE: PHONE RULES");
                  } catch (Throwable e) {
                      llmFail++;
                      ruleFallbacks++;
                      lastError = "LLM " + e.getClass().getSimpleName() + ": " + safe(e.getMessage());
                      return rule.replace("SOURCE: PHONE BT", "SOURCE: PHONE RULES");
                  } finally {
                      llmBusy = false;
                  }
              }

              private String runLlama(String transcriptText) throws Exception {
                  String prompt =
                      "You are a smart-glasses conversation copilot.\n" +
                      "Return ONE short HUD card only.\n" +
                      "Start with exactly one label: ASK:, VERIFY:, SUMMARIZE:, PUSH BACK:, ACTION:, or NOTE:.\n" +
                      "Max 18 words. No markdown. No explanation.\n" +
                      "If a factual or math claim is false, use VERIFY: or PUSH BACK:.\n\n" +
                      "Transcript:\n" + safe(transcriptText) + "\n\nCard:";

                  ProcessBuilder pb = new ProcessBuilder(
                      llamaBinFile.getAbsolutePath(),
                      "-m", llmModelFile.getAbsolutePath(),
                      "-p", prompt,
                      "-n", "56",
                      "-c", "512",
                      "-t", "4",
                      "--temp", "0.2",
                      "--no-display-prompt"
                  );

                  pb.redirectErrorStream(false);
                  pb.environment().put("LD_LIBRARY_PATH", llamaLibDir.getAbsolutePath());

                  Process p = pb.start();
                  StreamGrabber stdout = new StreamGrabber(p.getInputStream(), "llm-stdout");
                  StreamGrabber stderr = new StreamGrabber(p.getErrorStream(), "llm-stderr");
                  stdout.start();
                  stderr.start();

                  boolean done = p.waitFor(28, TimeUnit.SECONDS);
                  if (!done) {
                      try { p.destroy(); } catch (Throwable ignored) {}
                      throw new RuntimeException("timeout");
                  }

                  try { stdout.join(500); } catch (Throwable ignored) {}
                  try { stderr.join(500); } catch (Throwable ignored) {}

                  String out = stdout.text();
                  String err = stderr.text();

                  if (p.exitValue() != 0) {
                      throw new RuntimeException("exit=" + p.exitValue() + " err=" + compactRaw(err, 100));
                  }

                  return out + "\n" + err;
              }

              static class StreamGrabber extends Thread {
                  private final InputStream in;
                  private final StringBuilder out = new StringBuilder();

                  StreamGrabber(InputStream in, String name) {
                      super(name);
                      this.in = in;
                  }

                  @Override
                  public void run() {
                      try (BufferedReader br = new BufferedReader(new InputStreamReader(in))) {
                          String line;
                          while ((line = br.readLine()) != null) {
                              out.append(line).append("\n");
                              if (out.length() > 16000) {
                                  out.delete(0, out.length() - 12000);
                              }
                          }
                      } catch (Throwable ignored) {}
                  }

                  String text() {
                      return out.toString();
                  }
              }

              private String cleanLlmCard(String raw) {
                  if (raw == null) return "";
                  String normalized = raw.replace("\r", "\n");

                  int cardIdx = normalized.lastIndexOf("Card:");
                  if (cardIdx >= 0) normalized = normalized.substring(cardIdx + 5);

                  String lowAll = normalized.toLowerCase(Locale.US);
                  int labelIndex = firstLabelIndex(lowAll);
                  if (labelIndex >= 0) normalized = normalized.substring(labelIndex);

                  StringBuilder kept = new StringBuilder();
                  for (String line : normalized.split("\n")) {
                      String t = line.trim();
                      if (t.length() == 0) continue;
                      String low = t.toLowerCase(Locale.US);
                      if (isLlamaLogLine(low) || low.contains("llama_model_loader") || low.contains("ggml") ||
                          low.contains("metadata") || low.contains("tensor") || low.contains(".gguf") ||
                          low.startsWith("main:") || low.startsWith("load_") || low.startsWith("common_")) {
                          continue;
                      }
                      kept.append(t).append("\n");
                  }

                  String cleaned = kept.toString().trim();
                  for (String line : cleaned.split("\n")) {
                      String t = stripQuotes(line.trim());
                      if (t.length() == 0) continue;
                      String low = t.toLowerCase(Locale.US);
                      if (low.startsWith("ask:") || low.startsWith("verify:") || low.startsWith("summarize:") ||
                          low.startsWith("push back:") || low.startsWith("action:") || low.startsWith("note:")) {
                          return limitWords(t, 22);
                      }
                  }

                  String low = cleaned.toLowerCase(Locale.US);
                  if (((low.contains("one plus one") || low.contains("1+1") || low.contains("1 + 1")) &&
                      (low.contains("two") || low.contains("2"))) ||
                      ((low.contains("incorrect") || low.contains("false") || low.contains("not seven")) &&
                      (low.contains("two") || low.contains("2")))) {
                      return "VERIFY: One plus one equals two, not seven.";
                  }

                  return "";
              }

              private String ruleThink(String text) {
                  String raw = text == null ? "" : text.trim();
                  String low = raw.toLowerCase(Locale.US);

                  if (low.length() == 0) {
                      return "SOURCE: PHONE BT\nNOTE: Bluetooth brain is online.";
                  }

                  if ((low.contains("one plus one") && (low.contains("seven") || low.contains("7"))) ||
                      low.contains("1+1=7") || low.contains("1 + 1 = 7")) {
                      return "SOURCE: PHONE BT\nVERIFY: One plus one equals two, not seven.";
                  }

                  if ((low.contains("two plus two") && (low.contains("five") || low.contains("5"))) ||
                      low.contains("2+2=5") || low.contains("2 + 2 = 5")) {
                      return "SOURCE: PHONE BT\nVERIFY: Two plus two equals four, not five.";
                  }

                  if (containsAny(low, "urgent", "emergency", "asap", "right now")) {
                      return "SOURCE: PHONE BT\nACTION: Identify the immediate next step and owner.";
                  }

                  if (containsAny(low, "always", "never", "everyone", "nobody", "guaranteed", "impossible")) {
                      return "SOURCE: PHONE BT\nPUSH BACK: Ask for one example or exception.";
                  }

                  if (containsAny(low, "price", "cost", "money", "dollar", "percent", "rate", "number", "amount", "fee", "budget")) {
                      return "SOURCE: PHONE BT\nVERIFY: Ask what number or source supports that.";
                  }

                  if (containsAny(low, "deadline", "tomorrow", "today", "schedule", "meeting", "when", "time", "due")) {
                      return "SOURCE: PHONE BT\nACTION: Confirm the exact deadline or next step.";
                  }

                  if (containsAny(low, "i think", "maybe", "probably", "not sure", "guess", "assume", "roughly")) {
                      return "SOURCE: PHONE BT\nASK: Clarify the uncertain part before agreeing.";
                  }

                  if (containsAny(low, "because", "therefore", "reason", "why", "so that")) {
                      return "SOURCE: PHONE BT\nVERIFY: Ask what evidence supports that reasoning.";
                  }

                  if (low.length() > 220) {
                      return "SOURCE: PHONE BT\nSUMMARIZE: Let me make sure I understood that.";
                  }

                  return "SOURCE: PHONE BT\nASK: Ask one useful follow-up question.";
              }

              private boolean isLlamaLogLine(String low) {
                  return low.startsWith("llama_") || low.startsWith("ggml_") || low.startsWith("llm_") ||
                      low.startsWith("sampler") || low.startsWith("prompt eval") || low.startsWith("eval time") ||
                      low.startsWith("total time") || low.contains("key-value pairs") || low.contains("tokens per second");
              }

              private int firstLabelIndex(String low) {
                  int best = -1;
                  String[] labels = {"ask:", "verify:", "summarize:", "push back:", "action:", "note:"};
                  for (String label : labels) {
                      int idx = low.indexOf(label);
                      if (idx >= 0 && (best < 0 || idx < best)) best = idx;
                  }
                  return best;
              }

              private String stripQuotes(String s) {
                  if (s == null) return "";
                  s = s.trim();
                  while (s.startsWith("\"") || s.startsWith("'") || s.startsWith("-")) s = s.substring(1).trim();
                  while (s.endsWith("\"") || s.endsWith("'")) s = s.substring(0, s.length() - 1).trim();
                  return s;
              }

              private String limitWords(String s, int maxWords) {
                  String[] parts = s.trim().split("\\s+");
                  if (parts.length <= maxWords) return s.trim();
                  StringBuilder b = new StringBuilder();
                  for (int i = 0; i < maxWords; i++) {
                      if (i > 0) b.append(' ');
                      b.append(parts[i]);
                  }
                  return b.toString();
              }

              private boolean containsAny(String text, String... words) {
                  for (String w : words) {
                      if (text.contains(w)) return true;
                  }
                  return false;
              }

              private void updateUi(String state) {
                  status.setText(state);
                  details.setText(
                      "BT name: " + safeCallName() + "\n" +
                      "Brain: " + (llmReady ? "LLM READY / " + runnerKind : "RULES ONLY") + (llmBusy ? " / BUSY" : "") + "\n" +
                      "Accepts: " + accepts + " Requests: " + requests + "\n" +
                      "LLM ok/fail: " + llmOk + "/" + llmFail + " Rules: " + ruleFallbacks
                  );

                  lastBox.setText(
                      "LAST REMOTE\n" + lastRemote + "\n\n" +
                      "LAST TRANSCRIPT\n" + tail(lastTranscript, 200) + "\n\n" +
                      "LAST CARD\n" + lastCard + "\n\n" +
                      "LAST ERROR\n" + lastError + "\n\n" +
                      "LAST RAW\n" + tail(lastRaw, 160)
                  );

                  footer.setText("Keep open. V16B tests phone-local LLM; rules remain as fallback.");
              }

              private int bondedCount() {
                  try {
                      Set<BluetoothDevice> devices = adapter.getBondedDevices();
                      return devices == null ? 0 : devices.size();
                  } catch (Throwable ignored) {
                      return -1;
                  }
              }

              private String safeDevice(BluetoothDevice d) {
                  if (d == null) return "(unknown device)";
                  String name = "(name blocked)";
                  String addr = "(addr blocked)";
                  try { name = d.getName(); } catch (Throwable ignored) {}
                  try { addr = d.getAddress(); } catch (Throwable ignored) {}
                  return safe(name) + " / " + safe(addr);
              }

              private String safeCallName() {
                  try { return safe(adapter.getName()); } catch (Throwable ignored) { return "(blocked)"; }
              }

              private void copyAssetDir(AssetManager am, String assetPath, File destDir) throws Exception {
                  String[] items = am.list(assetPath);
                  if (items == null || items.length == 0) {
                      copyAssetFile(am, assetPath, destDir);
                      return;
                  }
                  if (!destDir.exists()) destDir.mkdirs();
                  for (String item : items) {
                      String childAssetPath = assetPath + "/" + item;
                      File childDest = new File(destDir, item);
                      String[] childItems = am.list(childAssetPath);
                      if (childItems != null && childItems.length > 0) copyAssetDir(am, childAssetPath, childDest);
                      else copyAssetFile(am, childAssetPath, childDest);
                  }
              }

              private void copyAssetFile(AssetManager am, String assetPath, File destFile) throws Exception {
                  File parent = destFile.getParentFile();
                  if (parent != null && !parent.exists()) parent.mkdirs();
                  try (InputStream in = am.open(assetPath); OutputStream out = new FileOutputStream(destFile)) {
                      byte[] buf = new byte[8192];
                      int len;
                      while ((len = in.read(buf)) > 0) out.write(buf, 0, len);
                  }
              }

              private void deleteRecursive(File f) {
                  if (f == null || !f.exists()) return;
                  if (f.isDirectory()) {
                      File[] kids = f.listFiles();
                      if (kids != null) for (File k : kids) deleteRecursive(k);
                  }
                  f.delete();
              }

              private String readSmallAsset(String assetPath) {
                  try (InputStream in = getAssets().open(assetPath);
                       BufferedReader br = new BufferedReader(new InputStreamReader(in))) {
                      StringBuilder b = new StringBuilder();
                      String line;
                      while ((line = br.readLine()) != null) {
                          b.append(line).append("\n");
                          if (b.length() > 128) break;
                      }
                      return b.toString();
                  } catch (Throwable ignored) {
                      return "";
                  }
              }

              private String compactRaw(String raw, int maxChars) {
                  if (raw == null) return "(none)";
                  String s = raw.replace("\r", " ").replace("\n", " ").replace("\t", " ").trim();
                  while (s.contains("  ")) s = s.replace("  ", " ");
                  if (s.length() == 0) return "(empty)";
                  if (s.length() > maxChars) s = s.substring(0, maxChars) + "...";
                  return s;
              }

              private String tail(String s, int max) {
                  if (s == null) return "";
                  if (s.length() <= max) return s;
                  return "..." + s.substring(s.length() - max);
              }

              private String safe(String s) {
                  return s == null || s.length() == 0 ? "(empty)" : s;
              }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() == MotionEvent.ACTION_UP) {
                      startServer();
                      return true;
                  }
                  return true;
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  stopServer();
              }
          }
