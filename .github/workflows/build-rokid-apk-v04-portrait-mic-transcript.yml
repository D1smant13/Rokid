name: Build Rokid Conversation Copilot APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Android project
        run: |
          mkdir -p app/src/main/java/com/damage/rokid/copilot
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
                  maven { url = uri("https://maven.rokid.com/repository/maven-public/") }
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://maven.rokid.com/repository/maven-public/") }
                  maven { url = uri("https://jitpack.io") }
              }
          }
          rootProject.name = "ConversationCopilotRokid"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.damage.rokid.copilot"
              compileSdk 35

              defaultConfig {
                  applicationId "com.damage.rokid.copilot"
                  minSdk 28
                  targetSdk 34
                  versionCode 4
                  versionName "0.4-portrait-mic-transcript"
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Conversation Copilot</string>
          </resources>
          EOF

          cat > app/src/main/res/values/colors.xml <<'EOF'
          <resources>
              <color name="hud_green">#00FF33</color>
              <color name="hud_white">#FFFFFFFF</color>
              <color name="hud_dim">#CCFFFFFF</color>
              <color name="hud_bg">#000000</color>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.ConversationCopilot" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">@color/hud_green</item>
                  <item name="android:windowBackground">@color/hud_bg</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <uses-feature android:name="android.hardware.microphone" android:required="false" />

              <queries>
                  <intent>
                      <action android:name="android.speech.RecognitionService" />
                  </intent>
              </queries>

              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.ConversationCopilot"
                  android:usesCleartextTraffic="true"
                  android:resizeableActivity="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:autoRemoveFromRecents="true"
                      android:excludeFromRecents="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density"
                      android:theme="@style/Theme.ConversationCopilot">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/damage/rokid/copilot/MainActivity.java <<'EOF'
          package com.damage.rokid.copilot;

          import android.Manifest;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import android.view.Gravity;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import android.graphics.Color;
          import android.graphics.Typeface;

          import java.util.ArrayList;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private static final int REQ_AUDIO = 42;

              private TextView status;
              private TextView transcript;
              private TextView fact;
              private TextView insight;
              private TextView suggestion;

              private SpeechRecognizer recognizer;
              private boolean listening = false;
              private boolean recognizerAvailable = false;
              private final Handler handler = new Handler(Looper.getMainLooper());

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);

                  buildHud();

                  recognizerAvailable = SpeechRecognizer.isRecognitionAvailable(this);
                  setStatus("PORTRAIT + MIC TEST • Speech: " + (recognizerAvailable ? "available" : "not found"));

                  if (checkSelfPermission(Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.RECORD_AUDIO}, REQ_AUDIO);
                  } else {
                      setupRecognizer();
                  }

                  Toast.makeText(this, "Conversation Copilot v0.4 launched", Toast.LENGTH_LONG).show();
              }

              private void buildHud() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(24, 14, 24, 14);
                  root.setBackgroundColor(Color.BLACK);

                  root.addView(tv("CONVERSATION COPILOT", 26, "#00FF33", true));
                  root.addView(tv("PORTRAIT + MIC TEST", 21, "#FFFFFF", true));

                  status = tv("Starting...", 15, "#CCFFFFFF", false);
                  transcript = tv("Tap or press center/select to start listening.", 18, "#FFFFFFFF", false);

                  fact = card("FACT CHECK", "Waiting for transcript.");
                  insight = card("INSIGHT", "No analysis yet.");
                  suggestion = card("SUGGESTED NEXT", "Ask a clarifying question once speech appears.");

                  root.addView(status);
                  root.addView(transcript);
                  root.addView(fact);
                  root.addView(insight);
                  root.addView(suggestion);
                  root.addView(tv("Silent display only • no read-aloud • no paid API", 14, "#CCFFFFFF", false));

                  setContentView(root);
              }

              private TextView tv(String text, int sp, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(text);
                  t.setTextSize(sp);
                  t.setTextColor(Color.parseColor(color));
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(0, 6, 0, 6);
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              private TextView card(String label, String body) {
                  TextView t = tv(label + ": " + body, 16, "#DDFFFFFF", false);
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(8, 7, 8, 7);
                  return t;
              }

              private void setStatus(String s) {
                  if (status != null) status.setText(s);
              }

              private void setupRecognizer() {
                  if (!recognizerAvailable) {
                      setStatus("No Android speech recognition service found");
                      transcript.setText("SpeechRecognizer unavailable. Next build will test raw mic audio.");
                      return;
                  }

                  recognizer = SpeechRecognizer.createSpeechRecognizer(this);
                  recognizer.setRecognitionListener(new RecognitionListener() {
                      @Override public void onReadyForSpeech(Bundle params) {
                          listening = true;
                          setStatus("Listening...");
                          transcript.setText("Listening...");
                      }

                      @Override public void onBeginningOfSpeech() {
                          setStatus("Speech detected");
                      }

                      @Override public void onRmsChanged(float rmsdB) {
                          setStatus("Listening • mic level " + String.format(Locale.US, "%.1f", rmsdB));
                      }

                      @Override public void onBufferReceived(byte[] buffer) {}

                      @Override public void onEndOfSpeech() {
                          setStatus("Processing speech...");
                          listening = false;
                      }

                      @Override public void onError(int error) {
                          listening = false;
                          setStatus("Speech error " + error + " • tap to retry");
                          if (error == SpeechRecognizer.ERROR_NO_MATCH) {
                              transcript.setText("No clear speech matched. Tap to retry.");
                          } else if (error == SpeechRecognizer.ERROR_RECOGNIZER_BUSY) {
                              restartLater();
                          }
                      }

                      @Override public void onResults(Bundle results) {
                          listening = false;
                          ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          String text = (matches != null && !matches.isEmpty()) ? matches.get(0) : "";
                          showTranscript(text, false);
                          restartLater();
                      }

                      @Override public void onPartialResults(Bundle partialResults) {
                          ArrayList<String> matches = partialResults.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          String text = (matches != null && !matches.isEmpty()) ? matches.get(0) : "";
                          showTranscript(text, true);
                      }

                      @Override public void onEvent(int eventType, Bundle params) {}
                  });
              }

              private void showTranscript(String text, boolean partial) {
                  if (text == null || text.trim().isEmpty()) return;
                  transcript.setText((partial ? "Partial: " : "Heard: ") + text);
                  fact.setText("FACT CHECK: Transcript captured. AIUI/Rokid assistant hook is next.");
                  insight.setText("INSIGHT: Speech input is reaching the app.");
                  suggestion.setText("SUGGESTED NEXT: Ask: “Can you clarify the specific claim?”");
              }

              private Intent recognizerIntent() {
                  Intent i = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.getDefault());
                  i.putExtra(RecognizerIntent.EXTRA_PARTIAL_RESULTS, true);
                  i.putExtra(RecognizerIntent.EXTRA_MAX_RESULTS, 3);
                  i.putExtra(RecognizerIntent.EXTRA_PROMPT, "Conversation Copilot");
                  return i;
              }

              private void toggleListening() {
                  if (recognizer == null) setupRecognizer();
                  if (recognizer == null) return;

                  try {
                      if (listening) {
                          recognizer.stopListening();
                          listening = false;
                          setStatus("Stopped • tap to listen");
                      } else {
                          recognizer.startListening(recognizerIntent());
                      }
                  } catch (Exception e) {
                      setStatus("Recognizer start failed: " + e.getClass().getSimpleName());
                      transcript.setText(e.getMessage());
                  }
              }

              private void restartLater() {
                  handler.postDelayed(() -> {
                      if (!listening && recognizer != null) {
                          try {
                              recognizer.startListening(recognizerIntent());
                          } catch (Exception ignored) {}
                      }
                  }, 900);
              }

              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  if (event.getAction() == KeyEvent.ACTION_UP) {
                      int key = event.getKeyCode();
                      if (key == KeyEvent.KEYCODE_ENTER ||
                          key == KeyEvent.KEYCODE_DPAD_CENTER ||
                          key == KeyEvent.KEYCODE_SPACE ||
                          key == KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE) {
                          toggleListening();
                          return true;
                      }
                      if (key == KeyEvent.KEYCODE_BACK) {
                          if (listening && recognizer != null) {
                              recognizer.cancel();
                              listening = false;
                              setStatus("Paused • tap to listen");
                              return true;
                          }
                      }
                  }
                  return super.dispatchKeyEvent(event);
              }

              @Override
              public boolean onTouchEvent(MotionEvent event) {
                  if (event.getAction() == MotionEvent.ACTION_UP) {
                      toggleListening();
                      return true;
                  }
                  return true;
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == REQ_AUDIO) {
                      if (grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                          setStatus("Audio permission granted • tap to listen");
                          setupRecognizer();
                      } else {
                          setStatus("Audio permission denied");
                          transcript.setText("Mic permission is required for live conversation testing.");
                      }
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (recognizer != null) {
                      recognizer.destroy();
                      recognizer = null;
                  }
              }
          }
          EOF

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Show APK output
        run: |
          echo "APK output folder:"
          find app/build/outputs/apk -type f || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ConversationCopilot-Rokid-v04-portrait-mic-transcript-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
