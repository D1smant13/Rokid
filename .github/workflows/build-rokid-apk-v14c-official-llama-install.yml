name: V14C Rokid Offline Vosk Plus Local LLM APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build V14C APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and NDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build llama.cpp Android install package
        run: |
          set -euxo pipefail

          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp

          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"

          cmake -S /tmp/llama.cpp -B /tmp/llama-build \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_INSTALL_PREFIX=/tmp/llama-install \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-march=armv8.2-a" \
            -DCMAKE_CXX_FLAGS="-march=armv8.2-a" \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=OFF \
            -DGGML_LLAMAFILE=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF

          # Official Android cross-compile route: build, install, then run with LD_LIBRARY_PATH.
          cmake --build /tmp/llama-build --config Release -j2 --target install

          echo "Installed llama.cpp files:"
          find /tmp/llama-install -maxdepth 4 -type f -print | sort | head -300

          BIN=""
          for CANDIDATE in \
            /tmp/llama-install/bin/llama-simple \
            /tmp/llama-install/bin/llama-cli \
            /tmp/llama-install/bin/main \
            /tmp/llama-build/bin/llama-simple \
            /tmp/llama-build/bin/llama-cli
          do
            if [ -f "$CANDIDATE" ]; then
              BIN="$CANDIDATE"
              break
            fi
          done

          if [ -z "$BIN" ]; then
            BIN="$(find /tmp/llama-install /tmp/llama-build -maxdepth 5 -type f -perm -111 | grep -E '/(llama-simple|llama-cli|main)$' | head -n 1 || true)"
          fi

          if [ -z "$BIN" ]; then
            echo "Could not find installed llama executable."
            exit 1
          fi

          mkdir -p /tmp/copilot-assets/llama-lib
          cp "$BIN" /tmp/copilot-assets/llama-runner-arm64
          chmod 755 /tmp/copilot-assets/llama-runner-arm64

          if [ -d /tmp/llama-install/lib ]; then
            cp -a /tmp/llama-install/lib/. /tmp/copilot-assets/llama-lib/ || true
          fi

          STL="$(find "$ANDROID_NDK_HOME" -name libc++_shared.so | grep -E 'arm64-v8a|aarch64-linux-android' | head -n 1 || true)"
          if [ -n "$STL" ] && [ -f "$STL" ]; then
            cp "$STL" /tmp/copilot-assets/llama-lib/ || true
          fi

          echo "Runner:"
          file /tmp/copilot-assets/llama-runner-arm64 || true
          ls -lh /tmp/copilot-assets/llama-runner-arm64

          echo "Runtime libs:"
          find /tmp/copilot-assets/llama-lib -maxdepth 1 -type f -exec ls -lh {} \; || true

      - name: Generate Android project with Vosk and local LLM assets
        run: |
          set -e
          mkdir -p app/src/main/java/com/damage/rokid/copilot
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

          cp /tmp/copilot-assets/llama-runner-arm64 app/src/main/assets/llama-runner-arm64
          cp -a /tmp/copilot-assets/llama-lib app/src/main/assets/llama-lib

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ConversationCopilotRokid"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.damage.rokid.copilot"
              compileSdk 35

              defaultConfig {
                  applicationId "com.damage.rokid.copilot"
                  minSdk 28
                  targetSdk 28
                  versionCode 142
                  versionName "1.4c-official-llama-install"

                  ndk {
                      abiFilters "arm64-v8a"
                  }
              }

              aaptOptions {
                  noCompress "gguf", "am", "fst", "bin", "txt", "conf", "mdl", "raw", "arpa", "int"
              }
          }

          dependencies {
              implementation "net.java.dev.jna:jna:5.18.1@aar"
              implementation "com.alphacephei:vosk-android:0.3.75@aar"
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Conversation Copilot</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.ConversationCopilot" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowBackground">#000000</item>
                  <item name="android:fontFamily">sans</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <uses-feature android:name="android.hardware.microphone" android:required="false" />

              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.ConversationCopilot"
                  android:resizeableActivity="true"
                  android:extractNativeLibs="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:autoRemoveFromRecents="true"
                      android:excludeFromRecents="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

          echo "Downloading Vosk small English model..."
          curl -L --retry 3 -o /tmp/vosk-model-small-en-us-0.15.zip https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip
          unzip -q /tmp/vosk-model-small-en-us-0.15.zip -d /tmp/vosk-model
          mv /tmp/vosk-model/vosk-model-small-en-us-0.15 app/src/main/assets/model-en-us

          echo "Downloading SmolLM2 135M GGUF local brain..."
          curl -L --retry 3 -o app/src/main/assets/brain.gguf "https://huggingface.co/bartowski/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q4_K_M.gguf?download=true"

          echo "Asset sizes:"
          du -h app/src/main/assets/llama-runner-arm64 app/src/main/assets/llama-lib app/src/main/assets/brain.gguf app/src/main/assets/model-en-us | tail -30

          cat > app/src/main/java/com/damage/rokid/copilot/MainActivity.java <<'EOF'
          package com.damage.rokid.copilot;

          import android.Manifest;
          import android.app.Activity;
          import android.content.pm.PackageManager;
          import android.content.res.AssetManager;
          import android.media.AudioFormat;
          import android.media.AudioRecord;
          import android.media.MediaRecorder;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import android.graphics.Color;
          import android.graphics.Typeface;

          import org.json.JSONObject;
          import org.vosk.LibVosk;
          import org.vosk.LogLevel;
          import org.vosk.Model;
          import org.vosk.Recognizer;

          import java.io.BufferedReader;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.io.InputStreamReader;
          import java.io.OutputStream;
          import java.util.Locale;
          import java.util.concurrent.TimeUnit;

          public class MainActivity extends Activity {
              private static final int REQ_AUDIO = 42;
              private static final String ASSET_MODEL_DIR = "model-en-us";
              private static final String ASSET_LLM_MODEL = "brain.gguf";
              private static final String ASSET_LLAMA_BIN = "llama-runner-arm64";
              private static final String ASSET_LLAMA_LIB_DIR = "llama-lib";
              private static final int SAMPLE_RATE = 16000;
              private static final float PCM_GAIN = 2.0f;

              private TextView status;
              private TextView transcript;
              private TextView card;
              private TextView footer;

              private final Handler ui = new Handler(Looper.getMainLooper());

              private Model speechModel;
              private Recognizer recognizer;
              private AudioRecord recorder;
              private Thread audioThread;

              private File llamaBinFile;
              private File llamaLibDir;
              private File llmModelFile;

              private volatile boolean listening = false;
              private volatile boolean ready = false;
              private volatile boolean brainReady = false;
              private volatile boolean brainBusy = false;

              private String transcriptLog = "";
              private String lastPartial = "";
              private String brainCard = "LOCAL LLM\nLoading offline brain.";
              private String fallbackCard = "LOCAL BRAIN\nWaiting for transcript.";
              private String lastBrainInput = "";

              private long startedAt = 0L;
              private long lastUiAt = 0L;
              private long lastBrainAt = 0L;

              private int finalCount = 0;
              private int partialCount = 0;
              private int readCount = 0;
              private int readErrors = 0;
              private int peak = 0;
              private int sessionPeak = 0;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);

                  buildUi();
                  LibVosk.setLogLevel(LogLevel.WARNINGS);

                  if (checkSelfPermission(Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      status.setText("NEEDS MIC PERMISSION");
                      requestPermissions(new String[]{Manifest.permission.RECORD_AUDIO}, REQ_AUDIO);
                  } else {
                      initEverythingAsync();
                  }
              }

              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(16, 8, 16, 8);
                  root.setBackgroundColor(Color.BLACK);

                  TextView title = tv("CONVERSATION COPILOT", 22, "#00FF33", true);
                  status = tv("V14C OFFLINE VOSK + LOCAL LLM", 14, "#FFFFFF", true);
                  transcript = tv("Loading offline speech model and local LLM...\nFirst launch may take a few minutes.", 12, "#DDFFFFFF", false);
                  card = tv("LOCAL LLM\nPreparing offline brain.", 15, "#00FF33", true);
                  footer = tv("offline • no API • no phone • no server", 11, "#CCFFFFFF", false);

                  root.addView(title);
                  root.addView(status);
                  root.addView(transcript);
                  root.addView(card);
                  root.addView(footer);
                  setContentView(root);
              }

              private TextView tv(String s, int size, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(s);
                  t.setTextSize(size);
                  t.setTextColor(Color.parseColor(color));
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(0, 3, 0, 3);
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == REQ_AUDIO && grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                      initEverythingAsync();
                  } else {
                      status.setText("MIC PERMISSION DENIED");
                      transcript.setText("Microphone permission is required.");
                      card.setText("Permission blocked.");
                  }
              }

              private void initEverythingAsync() {
                  status.setText("COPYING LOCAL MODELS");
                  transcript.setText("Copying embedded speech model, LLM model, and llama runner.");

                  new Thread(() -> {
                      try {
                          File speechDir = new File(getFilesDir(), "vosk-model-en-us");
                          File speechMarker = new File(speechDir, ".copilot_v14c_speech_ready");
                          if (!speechMarker.exists()) {
                              deleteRecursive(speechDir);
                              speechDir.mkdirs();
                              copyAssetDir(getAssets(), ASSET_MODEL_DIR, speechDir);
                              speechMarker.createNewFile();
                          }

                          File brainDir = new File(getFilesDir(), "local-brain");
                          if (!brainDir.exists()) brainDir.mkdirs();

                          llamaBinFile = new File(brainDir, "llama-runner");
                          llamaLibDir = new File(brainDir, "lib");
                          llmModelFile = new File(brainDir, "brain.gguf");

                          if (!llamaBinFile.exists() || llamaBinFile.length() < 1024) {
                              copyAssetFile(getAssets(), ASSET_LLAMA_BIN, llamaBinFile);
                          }
                          llamaBinFile.setReadable(true, false);
                          llamaBinFile.setExecutable(true, false);

                          if (!llamaLibDir.exists() || llamaLibDir.listFiles() == null || llamaLibDir.listFiles().length == 0) {
                              deleteRecursive(llamaLibDir);
                              llamaLibDir.mkdirs();
                              copyAssetDir(getAssets(), ASSET_LLAMA_LIB_DIR, llamaLibDir);
                          }

                          if (!llmModelFile.exists() || llmModelFile.length() < 50L * 1024L * 1024L) {
                              copyAssetFile(getAssets(), ASSET_LLM_MODEL, llmModelFile);
                          }

                          speechModel = new Model(speechDir.getAbsolutePath());
                          recognizer = new Recognizer(speechModel, SAMPLE_RATE);
                          recognizer.setWords(false);

                          brainReady = llamaBinFile.exists() && llamaBinFile.canExecute() && llmModelFile.exists() && llamaLibDir.exists();

                          ui.post(() -> {
                              ready = true;
                              status.setText(brainReady ? "READY: SPEECH + LOCAL LLM" : "READY: SPEECH ONLY");
                              transcript.setText("Offline transcript ready.\nLocal LLM: " + (brainReady ? "ready" : "not executable") + "\nTap/center to start.");
                              card.setText(brainReady ? "LOCAL LLM\nReady. Speak normally." : "LOCAL BRAIN\nLLM blocked; using rules.");
                              startListening();
                          });

                      } catch (Throwable e) {
                          ui.post(() -> {
                              status.setText("MODEL LOAD FAILED");
                              transcript.setText(e.getClass().getSimpleName() + "\n" + safe(e.getMessage()));
                              card.setText("Check storage/RAM or reinstall APK.");
                          });
                      }
                  }).start();
              }

              private void startListening() {
                  if (!ready || speechModel == null || recognizer == null || listening) return;

                  try {
                      int min = AudioRecord.getMinBufferSize(SAMPLE_RATE, AudioFormat.CHANNEL_IN_MONO, AudioFormat.ENCODING_PCM_16BIT);
                      int bufferSize = Math.max(min * 2, SAMPLE_RATE);
                      recorder = new AudioRecord(MediaRecorder.AudioSource.MIC, SAMPLE_RATE, AudioFormat.CHANNEL_IN_MONO, AudioFormat.ENCODING_PCM_16BIT, bufferSize);

                      if (recorder.getState() != AudioRecord.STATE_INITIALIZED) {
                          throw new RuntimeException("AudioRecord not initialized");
                      }

                      resetSessionStats();
                      listening = true;
                      startedAt = System.currentTimeMillis();
                      recorder.startRecording();

                      audioThread = new Thread(this::audioLoop, "copilot-v14c-audio-vosk");
                      audioThread.start();

                      status.setText("LISTENING OFFLINE");
                      card.setText(brainReady ? "LOCAL LLM\nListening. I will think after final lines." : fallbackCard);
                      footer.setText("raw mic → Vosk → local LLM");

                  } catch (Throwable e) {
                      status.setText("AUDIO START FAILED");
                      transcript.setText(e.getClass().getSimpleName() + "\n" + safe(e.getMessage()));
                      card.setText("Mic route failed to start.");
                      cleanupRecorder();
                  }
              }

              private void resetSessionStats() {
                  transcriptLog = "";
                  lastPartial = "";
                  brainCard = brainReady ? "LOCAL LLM\nListening. Say a few sentences." : "LOCAL BRAIN\nLLM fallback mode.";
                  fallbackCard = "LOCAL BRAIN\nWaiting for transcript.";
                  lastBrainInput = "";
                  finalCount = 0;
                  partialCount = 0;
                  readCount = 0;
                  readErrors = 0;
                  peak = 0;
                  sessionPeak = 0;
                  lastUiAt = 0L;
                  lastBrainAt = 0L;
              }

              private void audioLoop() {
                  byte[] raw = new byte[4096];
                  byte[] boosted = new byte[4096];

                  while (listening && recorder != null) {
                      int n;
                      try {
                          n = recorder.read(raw, 0, raw.length);
                      } catch (Throwable e) {
                          readErrors++;
                          postHud();
                          continue;
                      }

                      if (n <= 0) {
                          readErrors++;
                          postHud();
                          continue;
                      }

                      readCount++;
                      applyGainAndMeasure(raw, boosted, n);

                      try {
                          boolean finalReady = recognizer.acceptWaveForm(boosted, n);

                          if (finalReady) {
                              String text = extract(recognizer.getResult(), "text");
                              if (text.length() > 0) {
                                  finalCount++;
                                  lastPartial = "";
                                  appendTranscript(text);
                                  updateFallbackBrain();
                                  maybeRunLlm();
                              }
                          } else {
                              String text = extract(recognizer.getPartialResult(), "partial");
                              if (text.length() > 0) {
                                  partialCount++;
                                  lastPartial = text;
                                  updateFallbackBrain();
                              }
                          }
                      } catch (Throwable ignored) {}

                      long now = System.currentTimeMillis();
                      if (now - lastUiAt > 250) {
                          lastUiAt = now;
                          postHud();
                      }
                  }

                  try {
                      String text = extract(recognizer.getFinalResult(), "text");
                      if (text.length() > 0) {
                          finalCount++;
                          appendTranscript(text);
                          updateFallbackBrain();
                          maybeRunLlm();
                      }
                  } catch (Throwable ignored) {}

                  postHud();
              }

              private void maybeRunLlm() {
                  if (!brainReady || brainBusy || llmModelFile == null || llamaBinFile == null) return;

                  String input = transcriptLog.trim();
                  if (input.length() < 16) return;
                  if (input.equals(lastBrainInput)) return;

                  long now = System.currentTimeMillis();
                  if (now - lastBrainAt < 15000L) return;

                  lastBrainAt = now;
                  lastBrainInput = input;
                  brainBusy = true;
                  brainCard = "LOCAL LLM\nThinking...";
                  postHud();

                  final String promptInput = tail(input, 900);

                  new Thread(() -> {
                      String result;
                      try {
                          result = runLlama(promptInput);
                      } catch (Throwable e) {
                          result = "LLM ERROR\n" + e.getClass().getSimpleName() + ": " + safe(e.getMessage());
                      }

                      String cleaned = cleanLlmCard(result);
                      if (cleaned.length() < 4 || cleaned.toLowerCase(Locale.US).contains("llm error")) {
                          cleaned = fallbackCard;
                      }

                      final String cardText = cleaned;
                      ui.post(() -> {
                          brainCard = cardText;
                          brainBusy = false;
                          updateHud();
                      });
                  }, "copilot-v14c-llm").start();
              }

              private String runLlama(String transcriptText) throws Exception {
                  String prompt =
                      "You are a silent smart-glasses conversation copilot.\n" +
                      "Read the transcript and return ONE short HUD card only.\n" +
                      "Max 16 words. Start with exactly one label: ASK:, VERIFY:, SUMMARIZE:, PUSH BACK:, ACTION:, or NOTE:.\n" +
                      "No explanation. No markdown.\n\n" +
                      "Transcript:\n" + transcriptText + "\n\n" +
                      "Card:";

                  ProcessBuilder pb = new ProcessBuilder(
                      llamaBinFile.getAbsolutePath(),
                      "-m", llmModelFile.getAbsolutePath(),
                      "-c", "512",
                      "-p", prompt
                  );
                  pb.redirectErrorStream(true);
                  pb.environment().put("LD_LIBRARY_PATH", llamaLibDir.getAbsolutePath());

                  Process p = pb.start();

                  StringBuilder out = new StringBuilder();
                  try (BufferedReader br = new BufferedReader(new InputStreamReader(p.getInputStream()))) {
                      String line;
                      while ((line = br.readLine()) != null) {
                          out.append(line).append("\n");
                          if (out.length() > 12000) break;
                      }
                  }

                  boolean done = p.waitFor(28, TimeUnit.SECONDS);
                  if (!done) {
                      p.destroy();
                      return "LLM TIMEOUT\nUsing fallback.";
                  }

                  return out.toString();
              }

              private String cleanLlmCard(String raw) {
                  if (raw == null) return "";

                  String s = raw.replace("\r", "\n").trim();
                  int idx = s.lastIndexOf("Card:");
                  if (idx >= 0) s = s.substring(idx + 5).trim();

                  String[] lines = s.split("\n");
                  for (String line : lines) {
                      String t = line.trim();
                      if (t.length() == 0) continue;
                      String low = t.toLowerCase(Locale.US);
                      if (low.startsWith("ask:") || low.startsWith("verify:") || low.startsWith("summarize:") ||
                          low.startsWith("push back:") || low.startsWith("action:") || low.startsWith("note:")) {
                          return limitWords(t, 18).toUpperCase(Locale.US);
                      }
                  }

                  if (s.length() > 0) return limitWords(s, 18).toUpperCase(Locale.US);
                  return "";
              }

              private String limitWords(String s, int maxWords) {
                  String[] parts = s.trim().split("\\s+");
                  if (parts.length <= maxWords) return s.trim();
                  StringBuilder b = new StringBuilder();
                  for (int i = 0; i < maxWords; i++) {
                      if (i > 0) b.append(' ');
                      b.append(parts[i]);
                  }
                  return b.toString();
              }

              private void updateFallbackBrain() {
                  fallbackCard = makeLocalBrainCard((transcriptLog + " " + lastPartial).trim().toLowerCase(Locale.US));
                  if (!brainReady && !brainBusy) brainCard = fallbackCard;
              }

              private void applyGainAndMeasure(byte[] src, byte[] dst, int len) {
                  int p = 0;
                  for (int i = 0; i + 1 < len; i += 2) {
                      int lo = src[i] & 0xff;
                      int hi = src[i + 1];
                      int sample = (hi << 8) | lo;
                      if (sample > 32767) sample -= 65536;

                      int abs = Math.abs(sample);
                      if (abs > p) p = abs;

                      int boosted = Math.round(sample * PCM_GAIN);
                      if (boosted > 32767) boosted = 32767;
                      else if (boosted < -32768) boosted = -32768;

                      dst[i] = (byte)(boosted & 0xff);
                      dst[i + 1] = (byte)((boosted >> 8) & 0xff);
                  }
                  if ((len & 1) == 1) dst[len - 1] = src[len - 1];
                  peak = p;
                  if (peak > sessionPeak) sessionPeak = peak;
              }

              private void postHud() {
                  ui.post(this::updateHud);
              }

              private void updateHud() {
                  long seconds = startedAt == 0L ? 0L : (System.currentTimeMillis() - startedAt) / 1000L;

                  transcript.setText(
                      "TRANSCRIPT\n" +
                      (transcriptLog.length() == 0 ? "(waiting for final words)" : transcriptLog) +
                      "\n\nLIVE\n" +
                      (lastPartial.length() == 0 ? "(listening...)" : lastPartial)
                  );

                  String signal;
                  if (finalCount > 0 || partialCount > 0) signal = "TEXT OK";
                  else if (sessionPeak > 800) signal = "AUDIO OK";
                  else if (readCount > 10) signal = "QUIET";
                  else signal = "STARTING";

                  String brainState = brainReady ? (brainBusy ? "LLM THINKING" : "LLM READY") : "RULES";
                  footer.setText(signal + " • " + brainState + " • " + seconds + "s • f=" + finalCount + " p=" + partialCount + " • P=" + peak + " maxP=" + sessionPeak);
                  card.setText((brainCard == null || brainCard.trim().length() == 0) ? fallbackCard : brainCard);
              }

              private String makeLocalBrainCard(String text) {
                  if (text.length() < 8) return "LOCAL BRAIN\nListening locally. No cloud/API.";
                  if (containsAny(text, "price", "cost", "money", "dollar", "percent", "rate", "number", "amount", "fee")) return "VERIFY:\nAsk what number or source supports that.";
                  if (containsAny(text, "always", "never", "everyone", "nobody", "guaranteed", "impossible")) return "PUSH BACK:\nAsk for one example or exception.";
                  if (containsAny(text, "deadline", "tomorrow", "today", "date", "schedule", "meeting", "when", "time")) return "ACTION:\nConfirm the exact deadline or next meeting.";
                  if (containsAny(text, "i think", "maybe", "probably", "not sure", "guess", "assume")) return "ASK:\nClarify the uncertain part before agreeing.";
                  if (containsAny(text, "because", "therefore", "so that", "reason", "why")) return "VERIFY:\nAsk what evidence supports that reasoning.";
                  if (text.length() > 180) return "SUMMARIZE:\nLet me make sure I understood that.";
                  return "ASK:\nAsk one clarifying question before agreeing.";
              }

              private boolean containsAny(String text, String... words) {
                  for (String w : words) if (text.contains(w)) return true;
                  return false;
              }

              private void appendTranscript(String text) {
                  if (text == null || text.trim().isEmpty()) return;
                  transcriptLog = (transcriptLog + "\n" + text.trim()).trim();
                  if (transcriptLog.length() > 700) {
                      transcriptLog = transcriptLog.substring(transcriptLog.length() - 700);
                      int firstBreak = transcriptLog.indexOf('\n');
                      if (firstBreak > 0) transcriptLog = transcriptLog.substring(firstBreak + 1);
                  }
              }

              private String extract(String json, String key) {
                  try {
                      JSONObject obj = new JSONObject(json == null ? "{}" : json);
                      String value = obj.optString(key, "");
                      return value == null ? "" : value.trim();
                  } catch (Throwable ignored) {
                      return "";
                  }
              }

              private void stopListening() {
                  listening = false;
                  try { if (recorder != null) recorder.stop(); } catch (Throwable ignored) {}
                  cleanupRecorder();
                  status.setText("STOPPED");
                  footer.setText("Tap/center = start • offline Vosk + local LLM");
                  updateHud();
              }

              private void cleanupRecorder() {
                  try { if (recorder != null) recorder.release(); } catch (Throwable ignored) {}
                  recorder = null;
              }

              private void toggleListening() {
                  if (!ready) {
                      Toast.makeText(this, "Models still loading", Toast.LENGTH_SHORT).show();
                      return;
                  }
                  if (listening) stopListening();
                  else startListening();
              }

              private void copyAssetDir(AssetManager am, String assetPath, File destDir) throws Exception {
                  String[] items = am.list(assetPath);
                  if (items == null || items.length == 0) {
                      copyAssetFile(am, assetPath, destDir);
                      return;
                  }
                  if (!destDir.exists()) destDir.mkdirs();
                  for (String item : items) {
                      String childAssetPath = assetPath + "/" + item;
                      File childDest = new File(destDir, item);
                      String[] childItems = am.list(childAssetPath);
                      if (childItems != null && childItems.length > 0) copyAssetDir(am, childAssetPath, childDest);
                      else copyAssetFile(am, childAssetPath, childDest);
                  }
              }

              private void copyAssetFile(AssetManager am, String assetPath, File destFile) throws Exception {
                  File parent = destFile.getParentFile();
                  if (parent != null && !parent.exists()) parent.mkdirs();
                  try (InputStream in = am.open(assetPath); OutputStream out = new FileOutputStream(destFile)) {
                      byte[] buf = new byte[8192];
                      int len;
                      while ((len = in.read(buf)) > 0) out.write(buf, 0, len);
                  }
              }

              private void deleteRecursive(File f) {
                  if (f == null || !f.exists()) return;
                  if (f.isDirectory()) {
                      File[] kids = f.listFiles();
                      if (kids != null) for (File k : kids) deleteRecursive(k);
                  }
                  f.delete();
              }

              private String tail(String s, int max) {
                  if (s == null) return "";
                  if (s.length() <= max) return s;
                  return s.substring(s.length() - max);
              }

              private String safe(String s) {
                  return s == null ? "" : s;
              }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() == MotionEvent.ACTION_UP) {
                      toggleListening();
                      return true;
                  }
                  return true;
              }

              @Override
              public boolean dispatchKeyEvent(KeyEvent e) {
                  if (e.getAction() == KeyEvent.ACTION_UP) {
                      int k = e.getKeyCode();
                      if (k == KeyEvent.KEYCODE_ENTER || k == KeyEvent.KEYCODE_DPAD_CENTER || k == KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE ||
                          k == KeyEvent.KEYCODE_VOLUME_UP || k == KeyEvent.KEYCODE_VOLUME_DOWN) {
                          toggleListening();
                          return true;
                      }
                  }
                  return super.dispatchKeyEvent(e);
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  listening = false;
                  cleanupRecorder();
                  if (recognizer != null) {
                      recognizer.close();
                      recognizer = null;
                  }
                  if (speechModel != null) {
                      speechModel.close();
                      speechModel = null;
                  }
              }
          }
          EOF

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Show APK output and size
        run: |
          echo "APK output folder:"
          find app/build/outputs/apk -type f -exec ls -lh {} \;

      - name: Enforce APK under 300MB
        run: |
          APK="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          SIZE="$(stat -c%s "$APK")"
          LIMIT="$((300 * 1024 * 1024))"
          echo "APK size bytes: $SIZE"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "APK is over 300MB limit"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ConversationCopilot-Rokid-v14c-offline-vosk-local-llm-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
