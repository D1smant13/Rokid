name: V10 Rokid Launcher Route Extras Matrix APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build V10 APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Android project
        run: |
          mkdir -p app/src/main/java/com/damage/rokid/copilot
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
                  maven { url = uri("https://maven.rokid.com/repository/maven-public/") }
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://maven.rokid.com/repository/maven-public/") }
                  maven { url = uri("https://jitpack.io") }
              }
          }
          rootProject.name = "ConversationCopilotRokid"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.damage.rokid.copilot"
              compileSdk 35

              defaultConfig {
                  applicationId "com.damage.rokid.copilot"
                  minSdk 28
                  targetSdk 34
                  versionCode 10
                  versionName "1.0-launcher-route-extras-matrix"
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Conversation Copilot</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.ConversationCopilot" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowBackground">#000000</item>
                  <item name="android:fontFamily">sans</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <uses-feature android:name="android.hardware.microphone" android:required="false" />
              <queries>
                  <package android:name="com.rokid.os.sprite.launcher" />
              </queries>
              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.ConversationCopilot"
                  android:resizeableActivity="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:autoRemoveFromRecents="true"
                      android:excludeFromRecents="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/damage/rokid/copilot/MainActivity.java <<'EOF'
          package com.damage.rokid.copilot;

          import android.app.Activity;
          import android.content.ComponentName;
          import android.content.Intent;
          import android.content.pm.ActivityInfo;
          import android.content.pm.PackageInfo;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import android.graphics.Color;
          import android.graphics.Typeface;

          import java.util.ArrayList;
          import java.util.Arrays;
          import java.util.HashSet;

          public class MainActivity extends Activity {
              private static final String LAUNCHER_PKG = "com.rokid.os.sprite.launcher";
              private static final String TEST_PROMPT =
                  "Summarize this conversation and give me one useful response suggestion.";

              private TextView status;
              private TextView body;
              private final ArrayList<Page> pages = new ArrayList<>();
              private int page = 0;

              static class Page {
                  final String title;
                  final String text;
                  final String pkg;
                  final String cls;
                  final int variant;

                  Page(String title, String text, String pkg, String cls, int variant) {
                      this.title = title;
                      this.text = text;
                      this.pkg = pkg;
                      this.cls = cls;
                      this.variant = variant;
                  }
              }

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  buildUi();
                  buildPages();
                  show(0);
                  Toast.makeText(this, "V10 route/extras matrix", Toast.LENGTH_LONG).show();
              }

              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(16, 8, 16, 8);
                  root.setBackgroundColor(Color.BLACK);

                  TextView title = tv("CONVERSATION COPILOT", 22, "#00FF33", true);
                  status = tv("V10 ROUTE / EXTRAS MATRIX", 14, "#FFFFFF", true);
                  body = tv("Building launch matrix...", 11, "#DDFFFFFF", false);
                  TextView footer = tv("Tap/right/vol+ = next • left/vol- = previous • center = launch", 11, "#CCFFFFFF", false);

                  root.addView(title);
                  root.addView(status);
                  root.addView(body);
                  root.addView(footer);
                  setContentView(root);
              }

              private TextView tv(String s, int size, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(s);
                  t.setTextSize(size);
                  t.setTextColor(Color.parseColor(color));
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(0, 3, 0, 3);
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              private void buildPages() {
                  pages.clear();

                  pages.add(new Page(
                      "V10 ROUTE / EXTRAS MATRIX",
                      "This tests launcher activities with different route/extras combinations.\n\n" +
                      "Targets:\n" +
                      "ChatPageActivity\nTranslatePageActivity\nAudioPageActivity\nWordTipsPageActivity\nLivePageActivity\n\n" +
                      "Center/select/enter launches the current combination.\n\n" +
                      "After a launch, screenshot what opened, then back out to continue.",
                      null,
                      null,
                      -1
                  ));

                  HashSet<String> wanted = new HashSet<>(Arrays.asList(
                      "ChatPageActivity",
                      "TranslatePageActivity",
                      "AudioPageActivity",
                      "WordTipsPageActivity",
                      "LivePageActivity",
                      "CaexpoPageActivity"
                  ));

                  try {
                      PackageManager pm = getPackageManager();
                      PackageInfo pi = pm.getPackageInfo(LAUNCHER_PKG, PackageManager.GET_ACTIVITIES);
                      if (pi.activities == null || pi.activities.length == 0) {
                          pages.add(new Page("NO ACTIVITIES", "No launcher activities visible.", null, null, -1));
                          return;
                      }

                      StringBuilder found = new StringBuilder();
                      found.append("FOUND TARGETS\n\n");

                      for (ActivityInfo a : pi.activities) {
                          String sn = shortName(a.name);
                          if (a.exported && wanted.contains(sn)) {
                              found.append("• ").append(sn).append("\n").append(a.name).append("\n\n");
                              addVariantsFor(a);
                          }
                      }

                      pages.add(1, new Page("FOUND TARGETS", cut(found.toString(), 1700), null, null, -1));

                  } catch (Exception e) {
                      pages.add(new Page("SCAN ERROR", "Could not inspect launcher package.\n\n" + e.getClass().getSimpleName() + "\n" + safe(e.getMessage()), null, null, -1));
                  }
              }

              private void addVariantsFor(ActivityInfo a) {
                  for (int v = 0; v <= 12; v++) {
                      pages.add(new Page(
                          shortName(a.name) + " / " + variantName(v),
                          variantText(a, v),
                          a.packageName,
                          a.name,
                          v
                      ));
                  }
              }

              private String variantName(int v) {
                  switch (v) {
                      case 0: return "plain";
                      case 1: return "ACTION_MAIN";
                      case 2: return "ACTION_VIEW";
                      case 3: return "route=chat";
                      case 4: return "route=translate";
                      case 5: return "route=conversation";
                      case 6: return "route=subtitle";
                      case 7: return "mode=chat+prompt";
                      case 8: return "mode=translate+autoStart";
                      case 9: return "mode=conversation+mic";
                      case 10: return "page=chat";
                      case 11: return "deeplink sprite://chat";
                      case 12: return "deeplink sprite://translate";
                      default: return "variant-" + v;
                  }
              }

              private String variantText(ActivityInfo a, int v) {
                  return
                      "LAUNCH TEST\n\n" +
                      "Activity:\n" + shortName(a.name) + "\n\n" +
                      "Full class:\n" + a.name + "\n\n" +
                      "Variant:\n" + variantName(v) + "\n\n" +
                      "Center/select/enter launches this exact combo.\n\n" +
                      "Prompt/query text:\n" + TEST_PROMPT + "\n\n" +
                      "Goal:\nFind which combo opens chat, translation, live listening, or prompt input.";
              }

              private void launchCurrent() {
                  if (pages.isEmpty()) return;
                  Page p = pages.get(page);

                  if (p.pkg == null || p.cls == null) {
                      Toast.makeText(this, "No launch target on this page", Toast.LENGTH_SHORT).show();
                      return;
                  }

                  Intent i = new Intent();
                  i.setComponent(new ComponentName(p.pkg, p.cls));

                  applyVariant(i, p.variant);

                  try {
                      startActivity(i);
                      Toast.makeText(this, "Launched " + p.title, Toast.LENGTH_LONG).show();
                  } catch (Throwable e) {
                      Toast.makeText(this, "Launch failed: " + e.getClass().getSimpleName(), Toast.LENGTH_LONG).show();
                      String fail =
                          p.text +
                          "\n\nLAST LAUNCH RESULT\nERROR: " + e.getClass().getSimpleName() + "\n" +
                          safe(e.getMessage());
                      pages.set(page, new Page(p.title, cut(fail, 1700), p.pkg, p.cls, p.variant));
                      show(page);
                  }
              }

              private void applyVariant(Intent i, int v) {
                  i.putExtra("from", "conversation_copilot");
                  i.putExtra("source", "conversation_copilot_probe");
                  i.putExtra("prompt", TEST_PROMPT);
                  i.putExtra("text", TEST_PROMPT);
                  i.putExtra("query", TEST_PROMPT);
                  i.putExtra("question", TEST_PROMPT);
                  i.putExtra("inputText", TEST_PROMPT);
                  i.putExtra("content", TEST_PROMPT);

                  switch (v) {
                      case 0:
                          break;

                      case 1:
                          i.setAction(Intent.ACTION_MAIN);
                          i.addCategory(Intent.CATEGORY_DEFAULT);
                          break;

                      case 2:
                          i.setAction(Intent.ACTION_VIEW);
                          break;

                      case 3:
                          setRoute(i, "chat");
                          break;

                      case 4:
                          setRoute(i, "translate");
                          break;

                      case 5:
                          setRoute(i, "conversation");
                          break;

                      case 6:
                          setRoute(i, "subtitle");
                          break;

                      case 7:
                          setRoute(i, "chat");
                          i.putExtra("mode", "chat");
                          i.putExtra("type", "chat");
                          i.putExtra("autoSend", true);
                          i.putExtra("submit", true);
                          break;

                      case 8:
                          setRoute(i, "translate");
                          i.putExtra("mode", "translate");
                          i.putExtra("type", "translate");
                          i.putExtra("autoStart", true);
                          i.putExtra("listen", true);
                          i.putExtra("mic", true);
                          break;

                      case 9:
                          setRoute(i, "conversation");
                          i.putExtra("mode", "conversation");
                          i.putExtra("type", "conversation");
                          i.putExtra("autoStart", true);
                          i.putExtra("listen", true);
                          i.putExtra("mic", true);
                          break;

                      case 10:
                          i.putExtra("page", "chat");
                          i.putExtra("target", "chat");
                          i.putExtra("module", "chat");
                          i.putExtra("tab", "chat");
                          i.putExtra("entry", "chat");
                          break;

                      case 11:
                          i.setAction(Intent.ACTION_VIEW);
                          i.setData(Uri.parse("sprite://chat?prompt=" + Uri.encode(TEST_PROMPT)));
                          setRoute(i, "chat");
                          break;

                      case 12:
                          i.setAction(Intent.ACTION_VIEW);
                          i.setData(Uri.parse("sprite://translate?autoStart=true&mode=conversation"));
                          setRoute(i, "translate");
                          i.putExtra("autoStart", true);
                          break;
                  }
              }

              private void setRoute(Intent i, String route) {
                  i.putExtra("route", route);
                  i.putExtra("path", route);
                  i.putExtra("page", route);
                  i.putExtra("target", route);
                  i.putExtra("module", route);
                  i.putExtra("tab", route);
                  i.putExtra("entry", route);
                  i.putExtra("mode", route);
              }

              private void show(int idx) {
                  if (pages.isEmpty()) return;
                  page = (idx + pages.size()) % pages.size();
                  Page p = pages.get(page);
                  status.setText("V10 PAGE " + (page + 1) + "/" + pages.size() + " • " + p.title);
                  body.setText(p.text);
              }

              private void next() { show(page + 1); }
              private void prev() { show(page - 1); }

              private String shortName(String s) {
                  if (s == null) return "";
                  int i = s.lastIndexOf(".");
                  return i >= 0 ? s.substring(i + 1) : s;
              }

              private String safe(String s) { return s == null ? "" : s; }

              private String cut(String s, int n) {
                  if (s == null) return "";
                  return s.length() <= n ? s : s.substring(0, n - 12) + "\n...truncated";
              }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() == MotionEvent.ACTION_UP) {
                      next();
                      return true;
                  }
                  return true;
              }

              @Override
              public boolean dispatchKeyEvent(KeyEvent e) {
                  if (e.getAction() == KeyEvent.ACTION_UP) {
                      int k = e.getKeyCode();

                      if (k == KeyEvent.KEYCODE_ENTER ||
                          k == KeyEvent.KEYCODE_DPAD_CENTER ||
                          k == KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE) {
                          launchCurrent();
                          return true;
                      }

                      if (k == KeyEvent.KEYCODE_DPAD_RIGHT ||
                          k == KeyEvent.KEYCODE_VOLUME_UP) {
                          next();
                          return true;
                      }

                      if (k == KeyEvent.KEYCODE_DPAD_LEFT ||
                          k == KeyEvent.KEYCODE_VOLUME_DOWN) {
                          prev();
                          return true;
                      }
                  }
                  return super.dispatchKeyEvent(e);
              }
          }
          EOF

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Show APK output
        run: |
          echo "APK output folder:"
          find app/build/outputs/apk -type f || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ConversationCopilot-Rokid-v10-launcher-route-extras-matrix-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
