name: V09 Rokid Launcher Activity Probe APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build V09 APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Android project
        run: |
          mkdir -p app/src/main/java/com/damage/rokid/copilot
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
                  maven { url = uri("https://maven.rokid.com/repository/maven-public/") }
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://maven.rokid.com/repository/maven-public/") }
                  maven { url = uri("https://jitpack.io") }
              }
          }
          rootProject.name = "ConversationCopilotRokid"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.damage.rokid.copilot"
              compileSdk 35

              defaultConfig {
                  applicationId "com.damage.rokid.copilot"
                  minSdk 28
                  targetSdk 34
                  versionCode 9
                  versionName "0.9-launcher-activity-probe"
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Conversation Copilot</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.ConversationCopilot" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowBackground">#000000</item>
                  <item name="android:fontFamily">sans</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <uses-feature android:name="android.hardware.microphone" android:required="false" />
              <queries>
                  <package android:name="com.rokid.os.sprite.launcher" />
              </queries>
              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.ConversationCopilot"
                  android:resizeableActivity="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:autoRemoveFromRecents="true"
                      android:excludeFromRecents="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/damage/rokid/copilot/MainActivity.java <<'EOF'
          package com.damage.rokid.copilot;

          import android.app.Activity;
          import android.content.ComponentName;
          import android.content.Intent;
          import android.content.pm.ActivityInfo;
          import android.content.pm.PackageInfo;
          import android.content.pm.PackageManager;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import android.graphics.Color;
          import android.graphics.Typeface;

          import java.util.ArrayList;

          public class MainActivity extends Activity {
              private static final String LAUNCHER_PKG = "com.rokid.os.sprite.launcher";

              private TextView status;
              private TextView body;
              private final ArrayList<Page> pages = new ArrayList<>();
              private int page = 0;

              static class Page {
                  final String title;
                  final String text;
                  final String pkg;
                  final String cls;
                  Page(String title, String text, String pkg, String cls) {
                      this.title = title;
                      this.text = text;
                      this.pkg = pkg;
                      this.cls = cls;
                  }
              }

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  buildUi();
                  buildPages();
                  show(0);
                  Toast.makeText(this, "V09 launcher activity probe", Toast.LENGTH_LONG).show();
              }

              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(16, 8, 16, 8);
                  root.setBackgroundColor(Color.BLACK);

                  TextView title = tv("CONVERSATION COPILOT", 22, "#00FF33", true);
                  status = tv("V09 LAUNCHER ACTIVITY PROBE", 14, "#FFFFFF", true);
                  body = tv("Scanning launcher activities...", 11, "#DDFFFFFF", false);
                  TextView footer = tv("Tap/right/vol+ = next • left/vol- = previous • center = launch", 11, "#CCFFFFFF", false);

                  root.addView(title);
                  root.addView(status);
                  root.addView(body);
                  root.addView(footer);
                  setContentView(root);
              }

              private TextView tv(String s, int size, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(s);
                  t.setTextSize(size);
                  t.setTextColor(Color.parseColor(color));
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(0, 3, 0, 3);
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              private void buildPages() {
                  pages.clear();
                  pages.add(new Page(
                      "V09 LAUNCHER ACTIVITY PROBE",
                      "This probes exported pages inside:\n" + LAUNCHER_PKG + "\n\n" +
                      "Looking for Chat / Translate / Audio / Tips / Subtitle pages.\n\n" +
                      "Tap/right/vol+ = move pages.\nCenter/select/enter = LAUNCH shown page.\n\n" +
                      "If a Rokid AI page opens, screenshot it and back out.",
                      null,
                      null
                  ));

                  try {
                      PackageManager pm = getPackageManager();
                      PackageInfo pi = pm.getPackageInfo(LAUNCHER_PKG, PackageManager.GET_ACTIVITIES);

                      if (pi.activities == null || pi.activities.length == 0) {
                          pages.add(new Page("NO ACTIVITIES", "No activities visible in launcher package.", null, null));
                          return;
                      }

                      StringBuilder all = new StringBuilder();
                      all.append("VISIBLE ACTIVITIES\n\n");

                      for (ActivityInfo a : pi.activities) {
                          all.append("• ").append(shortName(a.name)).append(" exported=").append(a.exported);
                          if (a.permission != null) all.append(" perm=").append(shortName(a.permission));
                          all.append("\n");

                          if (a.exported && interesting(a.name)) {
                              pages.add(activityPage(a));
                          }
                      }

                      pages.add(1, new Page("ACTIVITY LIST", cut(all.toString(), 1700), null, null));

                      if (pages.size() <= 2) {
                          for (ActivityInfo a : pi.activities) {
                              if (a.exported) pages.add(activityPage(a));
                          }
                      }

                  } catch (Exception e) {
                      pages.add(new Page("SCAN ERROR", "Could not inspect launcher package.\n\n" + e.getClass().getSimpleName() + "\n" + safe(e.getMessage()), null, null));
                  }
              }

              private boolean interesting(String name) {
                  String n = name == null ? "" : name.toLowerCase();
                  return n.contains("chat") ||
                         n.contains("translate") ||
                         n.contains("audio") ||
                         n.contains("word") ||
                         n.contains("tip") ||
                         n.contains("subtitle") ||
                         n.contains("caption") ||
                         n.contains("speech") ||
                         n.contains("ai") ||
                         n.contains("assistant");
              }

              private Page activityPage(ActivityInfo a) {
                  String text =
                      "TARGET ACTIVITY\n\n" +
                      "Short: " + shortName(a.name) + "\n\n" +
                      "Package:\n" + a.packageName + "\n\n" +
                      "Class:\n" + a.name + "\n\n" +
                      "exported=" + a.exported + "\n" +
                      "permission=" + safe(a.permission) + "\n\n" +
                      "Center/select/enter will try startActivity with common prompt extras:\n" +
                      "prompt, text, query, question, source, mode\n\n" +
                      "Prompt text:\nCan you summarize this conversation?";

                  return new Page(shortName(a.name), text, a.packageName, a.name);
              }

              private void launchCurrent() {
                  if (pages.isEmpty()) return;
                  Page p = pages.get(page);
                  if (p.pkg == null || p.cls == null) {
                      Toast.makeText(this, "No launch target on this page", Toast.LENGTH_SHORT).show();
                      return;
                  }

                  Intent i = new Intent();
                  i.setComponent(new ComponentName(p.pkg, p.cls));
                  i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                  i.addFlags(Intent.FLAG_ACTIVITY_CLEAR_TOP);
                  i.putExtra("prompt", "Can you summarize this conversation?");
                  i.putExtra("text", "Can you summarize this conversation?");
                  i.putExtra("query", "Can you summarize this conversation?");
                  i.putExtra("question", "Can you summarize this conversation?");
                  i.putExtra("source", "conversation_copilot_probe");
                  i.putExtra("mode", "chat");
                  i.putExtra("from", "conversation_copilot");

                  try {
                      startActivity(i);
                      Toast.makeText(this, "Launched " + p.title, Toast.LENGTH_LONG).show();
                  } catch (Throwable e) {
                      Toast.makeText(this, "Launch failed: " + e.getClass().getSimpleName(), Toast.LENGTH_LONG).show();
                      String fail = p.text + "\n\nLAST LAUNCH RESULT\nERROR: " + e.getClass().getSimpleName() + "\n" + safe(e.getMessage());
                      pages.set(page, new Page(p.title, cut(fail, 1700), p.pkg, p.cls));
                      show(page);
                  }
              }

              private void show(int i) {
                  if (pages.isEmpty()) return;
                  page = (i + pages.size()) % pages.size();
                  Page p = pages.get(page);
                  status.setText("V09 PAGE " + (page + 1) + "/" + pages.size() + " • " + p.title);
                  body.setText(p.text);
              }

              private void next() { show(page + 1); }
              private void prev() { show(page - 1); }

              private String shortName(String s) {
                  if (s == null) return "";
                  int i = s.lastIndexOf(".");
                  return i >= 0 ? s.substring(i + 1) : s;
              }

              private String safe(String s) { return s == null ? "" : s; }

              private String cut(String s, int n) {
                  if (s == null) return "";
                  return s.length() <= n ? s : s.substring(0, n - 12) + "\n...truncated";
              }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() == MotionEvent.ACTION_UP) {
                      next();
                      return true;
                  }
                  return true;
              }

              @Override
              public boolean dispatchKeyEvent(KeyEvent e) {
                  if (e.getAction() == KeyEvent.ACTION_UP) {
                      int k = e.getKeyCode();

                      if (k == KeyEvent.KEYCODE_ENTER ||
                          k == KeyEvent.KEYCODE_DPAD_CENTER ||
                          k == KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE) {
                          launchCurrent();
                          return true;
                      }

                      if (k == KeyEvent.KEYCODE_DPAD_RIGHT ||
                          k == KeyEvent.KEYCODE_VOLUME_UP) {
                          next();
                          return true;
                      }

                      if (k == KeyEvent.KEYCODE_DPAD_LEFT ||
                          k == KeyEvent.KEYCODE_VOLUME_DOWN) {
                          prev();
                          return true;
                      }
                  }
                  return super.dispatchKeyEvent(e);
              }
          }
          EOF

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Show APK output
        run: |
          echo "APK output folder:"
          find app/build/outputs/apk -type f || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ConversationCopilot-Rokid-v09-launcher-activity-probe-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
