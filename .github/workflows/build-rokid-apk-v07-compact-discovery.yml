name: V07 Rokid CXR Assist Deep Discovery APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build V07 APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Android project
        run: |
          mkdir -p app/src/main/java/com/damage/rokid/copilot
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
                  maven { url = uri("https://maven.rokid.com/repository/maven-public/") }
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://maven.rokid.com/repository/maven-public/") }
                  maven { url = uri("https://jitpack.io") }
              }
          }
          rootProject.name = "ConversationCopilotRokid"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.damage.rokid.copilot"
              compileSdk 35

              defaultConfig {
                  applicationId "com.damage.rokid.copilot"
                  minSdk 28
                  targetSdk 34
                  versionCode 7
                  versionName "0.7-cxr-assist-deep-discovery"
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Conversation Copilot</string>
          </resources>
          EOF

          cat > app/src/main/res/values/colors.xml <<'EOF'
          <resources>
              <color name="hud_green">#00FF33</color>
              <color name="hud_white">#FFFFFFFF</color>
              <color name="hud_dim">#CCFFFFFF</color>
              <color name="hud_bg">#000000</color>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.ConversationCopilot" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">@color/hud_green</item>
                  <item name="android:windowBackground">@color/hud_bg</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />

              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <uses-feature android:name="android.hardware.microphone" android:required="false" />

              <queries>
                  <package android:name="com.rokid.cxrservice" />
                  <package android:name="com.rokid.os.sprite.assistserver" />
                  <package android:name="com.rokid.os.sprite.launcher" />
                  <package android:name="com.rokid.os.sprite.record" />
                  <package android:name="com.rokid.sysconfig" />
                  <package android:name="com.rokid.glass.ota" />
                  <intent><action android:name="android.intent.action.ASSIST" /></intent>
                  <intent><action android:name="com.rokid.action.ASSISTANT" /></intent>
                  <intent><action android:name="com.rokid.action.AIUI" /></intent>
                  <intent><action android:name="com.rokid.aiui.action.AIUI" /></intent>
                  <intent><action android:name="com.rokid.cxr.action.BRIDGE" /></intent>
                  <intent><action android:name="com.rokid.cxrservice.action.BRIDGE" /></intent>
                  <intent><action android:name="com.rokid.os.sprite.assistserver.action.ASSIST" /></intent>
              </queries>

              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.ConversationCopilot"
                  android:usesCleartextTraffic="true"
                  android:resizeableActivity="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:autoRemoveFromRecents="true"
                      android:excludeFromRecents="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density"
                      android:theme="@style/Theme.ConversationCopilot">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/damage/rokid/copilot/MainActivity.java <<'EOF'
          package com.damage.rokid.copilot;

          import android.Manifest;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.ActivityInfo;
          import android.content.pm.PackageInfo;
          import android.content.pm.PackageManager;
          import android.content.pm.ProviderInfo;
          import android.content.pm.ResolveInfo;
          import android.content.pm.ServiceInfo;
          import android.media.AudioFormat;
          import android.media.AudioRecord;
          import android.media.MediaRecorder;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import android.graphics.Color;
          import android.graphics.Typeface;

          import java.util.ArrayList;
          import java.util.List;

          public class MainActivity extends Activity {
              private static final int REQ_AUDIO = 42;
              private static final int SAMPLE_RATE = 16000;
              private static final int CHANNEL = AudioFormat.CHANNEL_IN_MONO;
              private static final int FORMAT = AudioFormat.ENCODING_PCM_16BIT;
              private static final int FRAME_MS = 60;
              private static final int BYTES_PER_FRAME = (SAMPLE_RATE * FRAME_MS / 1000) * 2;

              private TextView header;
              private TextView pageTitle;
              private TextView status;
              private TextView body;
              private TextView footer;

              private final Handler mainHandler = new Handler(Looper.getMainLooper());
              private final List<String> pages = new ArrayList<>();
              private int pageIndex = 0;

              private volatile boolean capturing = false;
              private Thread captureThread;
              private AudioRecord audioRecord;
              private long frameCount = 0;
              private int currentSource = MediaRecorder.AudioSource.MIC;
              private int voiceFrames = 0;
              private int silenceFrames = 0;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);

                  buildHud();

                  if (checkSelfPermission(Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.RECORD_AUDIO}, REQ_AUDIO);
                  }

                  runDiscovery();
                  Toast.makeText(this, "V07 CXR Assist deep discovery", Toast.LENGTH_LONG).show();
              }

              private void buildHud() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(16, 8, 16, 8);
                  root.setBackgroundColor(Color.BLACK);

                  header = tv("CONVERSATION COPILOT", 22, "#00FF33", true);
                  pageTitle = tv("V07 CXR / ASSIST DEEP DISCOVERY", 16, "#FFFFFF", true);
                  status = tv("Scanning target packages...", 12, "#CCFFFFFF", false);
                  body = tv("Please wait...", 11, "#DDFFFFFF", false);
                  footer = tv("Tap = next page • center/select = mic toggle • back = stop mic", 11, "#CCFFFFFF", false);

                  root.addView(header);
                  root.addView(pageTitle);
                  root.addView(status);
                  root.addView(body);
                  root.addView(footer);

                  setContentView(root);
              }

              private TextView tv(String text, int sp, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(text);
                  t.setTextSize(sp);
                  t.setTextColor(Color.parseColor(color));
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(0, 3, 0, 3);
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              private void runDiscovery() {
                  new Thread(() -> {
                      try {
                          buildPages();
                      } catch (Exception e) {
                          pages.clear();
                          pages.add("DISCOVERY ERROR\n" + e.getClass().getSimpleName() + "\n" + safe(e.getMessage()));
                      }

                      mainHandler.post(() -> {
                          status.setText("Discovery complete • " + pages.size() + " pages");
                          showPage(0);
                      });
                  }, "v07-discovery").start();
              }

              private void buildPages() {
                  pages.clear();
                  PackageManager pm = getPackageManager();

                  String[] targets = new String[] {
                      "com.rokid.cxrservice",
                      "com.rokid.os.sprite.assistserver",
                      "com.rokid.os.sprite.launcher",
                      "com.rokid.os.sprite.record",
                      "com.rokid.sysconfig",
                      "com.rokid.glass.ota"
                  };

                  pages.add("SUMMARY\n" +
                      "Targets:\n" +
                      "• com.rokid.cxrservice\n" +
                      "• com.rokid.os.sprite.assistserver\n" +
                      "• launcher / record / sysconfig\n\n" +
                      "Use screenshots of each page. Tap anywhere to advance pages.\n\n" +
                      "Goal: find exported activities/services/providers or intent actions we can safely target.");

                  for (String pkg : targets) {
                      pages.add(packageDetailPage(pm, pkg));
                  }

                  pages.add(intentProbePage(pm, null, "GLOBAL INTENT PROBES"));
                  pages.add(intentProbePage(pm, "com.rokid.cxrservice", "CXR INTENT PROBES"));
                  pages.add(intentProbePage(pm, "com.rokid.os.sprite.assistserver", "ASSISTSERVER INTENT PROBES"));

                  pages.add(micHelpPage());
              }

              private String packageDetailPage(PackageManager pm, String packageName) {
                  StringBuilder out = new StringBuilder();
                  out.append("PACKAGE DETAIL\n").append(packageName).append("\n\n");

                  try {
                      int flags = PackageManager.GET_ACTIVITIES |
                                  PackageManager.GET_SERVICES |
                                  PackageManager.GET_PROVIDERS |
                                  PackageManager.GET_RECEIVERS |
                                  PackageManager.GET_PERMISSIONS;
                      PackageInfo pi = pm.getPackageInfo(packageName, flags);

                      String label = packageName;
                      try { label = pm.getApplicationLabel(pi.applicationInfo).toString(); } catch (Exception ignored) {}
                      out.append("Label: ").append(label).append("\n");
                      out.append("Version: ").append(pi.versionName).append(" / ").append(pi.getLongVersionCode()).append("\n\n");

                      out.append("ACTIVITIES\n");
                      if (pi.activities == null || pi.activities.length == 0) {
                          out.append("none visible\n");
                      } else {
                          int count = 0;
                          for (ActivityInfo a : pi.activities) {
                              appendComponent(out, a.name, a.exported, a.permission);
                              if (++count >= 8) { out.append("... +").append(pi.activities.length - count).append(" more\n"); break; }
                          }
                      }

                      out.append("\nSERVICES\n");
                      if (pi.services == null || pi.services.length == 0) {
                          out.append("none visible\n");
                      } else {
                          int count = 0;
                          for (ServiceInfo s : pi.services) {
                              appendComponent(out, s.name, s.exported, s.permission);
                              if (++count >= 10) { out.append("... +").append(pi.services.length - count).append(" more\n"); break; }
                          }
                      }

                      out.append("\nPROVIDERS\n");
                      if (pi.providers == null || pi.providers.length == 0) {
                          out.append("none visible\n");
                      } else {
                          int count = 0;
                          for (ProviderInfo p : pi.providers) {
                              out.append("• ").append(shortName(p.name)).append("\n");
                              out.append("  auth=").append(shorten(safe(p.authority), 60)).append("\n");
                              out.append("  exported=").append(p.exported);
                              if (p.readPermission != null) out.append(" readPerm=").append(shortName(p.readPermission));
                              if (p.writePermission != null) out.append(" writePerm=").append(shortName(p.writePermission));
                              out.append("\n");
                              if (++count >= 6) { out.append("... +").append(pi.providers.length - count).append(" more\n"); break; }
                          }
                      }

                      out.append("\nRECEIVERS\n");
                      if (pi.receivers == null || pi.receivers.length == 0) {
                          out.append("none visible\n");
                      } else {
                          int count = 0;
                          for (ActivityInfo r : pi.receivers) {
                              appendComponent(out, r.name, r.exported, r.permission);
                              if (++count >= 6) { out.append("... +").append(pi.receivers.length - count).append(" more\n"); break; }
                          }
                      }

                  } catch (Exception e) {
                      out.append("Could not inspect: ").append(e.getClass().getSimpleName()).append("\n").append(safe(e.getMessage())).append("\n");
                  }

                  return trim(out.toString());
              }

              private void appendComponent(StringBuilder out, String name, boolean exported, String permission) {
                  out.append("• ").append(shortName(name)).append("\n");
                  out.append("  exported=").append(exported);
                  if (permission != null) out.append(" perm=").append(shortName(permission));
                  out.append("\n");
              }

              private String intentProbePage(PackageManager pm, String pkg, String title) {
                  StringBuilder out = new StringBuilder();
                  out.append(title).append("\n");
                  if (pkg != null) out.append("package=").append(pkg).append("\n");
                  out.append("\n");

                  String[] actions = new String[] {
                      Intent.ACTION_ASSIST,
                      "android.speech.RecognitionService",
                      "com.rokid.action.ASSISTANT",
                      "com.rokid.action.AIUI",
                      "com.rokid.aiui.action.AIUI",
                      "com.rokid.intent.action.AIUI",
                      "com.rokid.glass.action.AIUI",
                      "com.rokid.cxr.action.BRIDGE",
                      "com.rokid.cxrservice.action.BRIDGE",
                      "com.rokid.cxrservice.action.CONNECT",
                      "com.rokid.cxrservice.action.SEND",
                      "com.rokid.os.sprite.assistserver.action.ASSIST",
                      "com.rokid.os.sprite.assistserver.action.AIUI",
                      "com.rokid.os.sprite.assistserver.action.START"
                  };

                  for (String action : actions) {
                      Intent i = new Intent(action);
                      if (pkg != null) i.setPackage(pkg);

                      List<ResolveInfo> acts = pm.queryIntentActivities(i, 0);
                      List<ResolveInfo> svcs = pm.queryIntentServices(i, 0);
                      List<ResolveInfo> recs = pm.queryBroadcastReceivers(i, 0);

                      out.append(shortAction(action)).append(" -> A").append(acts.size()).append(" S").append(svcs.size()).append(" R").append(recs.size()).append("\n");

                      if (!acts.isEmpty() && acts.get(0).activityInfo != null) {
                          ActivityInfo a = acts.get(0).activityInfo;
                          out.append("  act ").append(shorten(a.packageName + "/" + shortName(a.name), 70)).append("\n");
                      }
                      if (!svcs.isEmpty() && svcs.get(0).serviceInfo != null) {
                          ServiceInfo s = svcs.get(0).serviceInfo;
                          out.append("  svc ").append(shorten(s.packageName + "/" + shortName(s.name), 70)).append("\n");
                      }
                      if (!recs.isEmpty() && recs.get(0).activityInfo != null) {
                          ActivityInfo r = recs.get(0).activityInfo;
                          out.append("  rec ").append(shorten(r.packageName + "/" + shortName(r.name), 70)).append("\n");
                      }
                  }

                  return trim(out.toString());
              }

              private String micHelpPage() {
                  return "RAW MIC TEST\n" +
                      "Center/select toggles AudioRecord.\n\n" +
                      "If ENERGY/PEAK move and VOICE changes, mic access still works.\n\n" +
                      "This build does not send audio anywhere.\n\n" +
                      "Next after screenshots: try explicit bind/start probes for exported CXR/Assist components only.";
              }

              private void showPage(int index) {
                  if (pages.isEmpty()) return;
                  pageIndex = (index + pages.size()) % pages.size();
                  pageTitle.setText("V07 PAGE " + (pageIndex + 1) + "/" + pages.size());
                  body.setText(pages.get(pageIndex));
              }

              private void nextPage() {
                  showPage(pageIndex + 1);
              }

              private void prevPage() {
                  showPage(pageIndex - 1);
              }

              private String trim(String s) {
                  if (s.length() > 1900) return s.substring(0, 1900) + "\n...truncated";
                  return s;
              }

              private String safe(String s) {
                  return s == null ? "" : s;
              }

              private String shortName(String s) {
                  if (s == null) return "";
                  int idx = s.lastIndexOf('.');
                  return idx >= 0 ? s.substring(idx + 1) : s;
              }

              private String shortAction(String s) {
                  if (s == null) return "";
                  if (s.startsWith("com.rokid.")) return s.substring("com.rokid.".length());
                  if (s.startsWith("android.intent.action.")) return "android." + s.substring("android.intent.action.".length());
                  if (s.startsWith("android.speech.")) return "android.speech." + shortName(s);
                  return s;
              }

              private String shorten(String s, int max) {
                  if (s == null) return "";
                  return s.length() <= max ? s : s.substring(0, max - 3) + "...";
              }

              private void toggleCapture() {
                  if (capturing) stopCapture();
                  else {
                      if (checkSelfPermission(Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{Manifest.permission.RECORD_AUDIO}, REQ_AUDIO);
                      } else startCapture();
                  }
              }

              private void startCapture() {
                  if (capturing) return;
                  capturing = true;
                  voiceFrames = 0;
                  silenceFrames = 0;
                  frameCount = 0;

                  captureThread = new Thread(() -> {
                      int minBuffer = AudioRecord.getMinBufferSize(SAMPLE_RATE, CHANNEL, FORMAT);
                      if (minBuffer < BYTES_PER_FRAME) minBuffer = BYTES_PER_FRAME * 4;

                      int[] sources = new int[] {
                          MediaRecorder.AudioSource.MIC,
                          MediaRecorder.AudioSource.VOICE_RECOGNITION,
                          MediaRecorder.AudioSource.DEFAULT
                      };

                      AudioRecord record = null;
                      int usedSource = MediaRecorder.AudioSource.MIC;

                      for (int src : sources) {
                          try {
                              AudioRecord candidate = new AudioRecord(src, SAMPLE_RATE, CHANNEL, FORMAT, minBuffer * 2);
                              if (candidate.getState() == AudioRecord.STATE_INITIALIZED) {
                                  record = candidate;
                                  usedSource = src;
                                  break;
                              } else candidate.release();
                          } catch (Exception ignored) {}
                      }

                      if (record == null) {
                          capturing = false;
                          postMic("AudioRecord failed", "MIC failed");
                          return;
                      }

                      audioRecord = record;
                      currentSource = usedSource;

                      try {
                          audioRecord.startRecording();
                      } catch (Exception e) {
                          capturing = false;
                          try { audioRecord.release(); } catch (Exception ignored) {}
                          audioRecord = null;
                          postMic("startRecording failed", "MIC failed");
                          return;
                      }

                      byte[] buffer = new byte[BYTES_PER_FRAME];

                      while (capturing) {
                          int read = audioRecord.read(buffer, 0, buffer.length);
                          if (read <= 0) continue;

                          long energy = computeEnergy(buffer, read);
                          int peak = computePeak(buffer, read);
                          boolean voice = energy > 140 || peak > 1200;

                          if (voice) {
                              voiceFrames++;
                              silenceFrames = 0;
                          } else {
                              silenceFrames++;
                              if (silenceFrames > 4) voiceFrames = 0;
                          }

                          frameCount++;
                          if (frameCount % 3 == 0) {
                              String vad = voiceFrames >= 2 ? "VOICE DETECTED" : "SILENCE / ROOM";
                              mainHandler.post(() -> {
                                  status.setText("MIC source " + sourceName(currentSource));
                                  footer.setText("ENERGY " + energy + " • PEAK " + peak + " • " + vad);
                              });
                          }
                      }

                      try { audioRecord.stop(); } catch (Exception ignored) {}
                      try { audioRecord.release(); } catch (Exception ignored) {}
                      audioRecord = null;
                      postMic("Mic stopped", "Tap = next page • center/select = mic toggle");
                  }, "rokid-v07-mic");

                  captureThread.start();
              }

              private long computeEnergy(byte[] buffer, int bytesRead) {
                  long sum = 0;
                  int samples = bytesRead / 2;
                  for (int i = 0; i < samples; i++) {
                      int lo = buffer[i * 2] & 0xFF;
                      int hi = buffer[i * 2 + 1];
                      int sample = (hi << 8) | lo;
                      sum += Math.abs(sample);
                  }
                  return samples > 0 ? sum / samples : 0;
              }

              private int computePeak(byte[] buffer, int bytesRead) {
                  int peak = 0;
                  int samples = bytesRead / 2;
                  for (int i = 0; i < samples; i++) {
                      int lo = buffer[i * 2] & 0xFF;
                      int hi = buffer[i * 2 + 1];
                      int sample = (hi << 8) | lo;
                      int abs = Math.abs(sample);
                      if (abs > peak) peak = abs;
                  }
                  return peak;
              }

              private void postMic(String s, String f) {
                  mainHandler.post(() -> {
                      status.setText(s);
                      footer.setText(f);
                  });
              }

              private String sourceName(int source) {
                  if (source == MediaRecorder.AudioSource.MIC) return "MIC";
                  if (source == MediaRecorder.AudioSource.VOICE_RECOGNITION) return "VOICE_RECOGNITION";
                  if (source == MediaRecorder.AudioSource.DEFAULT) return "DEFAULT";
                  return String.valueOf(source);
              }

              private void stopCapture() {
                  capturing = false;
                  try { if (captureThread != null) captureThread.join(600); } catch (Exception ignored) {}
                  captureThread = null;
              }

              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  if (event.getAction() == KeyEvent.ACTION_UP) {
                      int key = event.getKeyCode();
                      if (key == KeyEvent.KEYCODE_ENTER ||
                          key == KeyEvent.KEYCODE_DPAD_CENTER ||
                          key == KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE) {
                          toggleCapture();
                          return true;
                      }
                      if (key == KeyEvent.KEYCODE_DPAD_RIGHT || key == KeyEvent.KEYCODE_VOLUME_UP) {
                          nextPage();
                          return true;
                      }
                      if (key == KeyEvent.KEYCODE_DPAD_LEFT || key == KeyEvent.KEYCODE_VOLUME_DOWN) {
                          prevPage();
                          return true;
                      }
                      if (key == KeyEvent.KEYCODE_BACK && capturing) {
                          stopCapture();
                          return true;
                      }
                  }
                  return super.dispatchKeyEvent(event);
              }

              @Override
              public boolean onTouchEvent(MotionEvent event) {
                  if (event.getAction() == MotionEvent.ACTION_UP) {
                      nextPage();
                      return true;
                  }
                  return true;
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == REQ_AUDIO) {
                      if (grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                          status.setText("Audio permission granted");
                      } else {
                          status.setText("Audio permission denied");
                      }
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  stopCapture();
              }
          }
          EOF

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Show APK output
        run: |
          echo "APK output folder:"
          find app/build/outputs/apk -type f || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
