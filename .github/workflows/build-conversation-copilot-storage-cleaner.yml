name: Copilot Storage Cleaner APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build Storage Cleaner APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate tiny cleaner Android project
        run: |
          set -e
          mkdir -p app/src/main/java/com/damage/rokid/copilot
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ConversationCopilotStorageCleaner"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.damage.rokid.copilot"
              compileSdk 35

              defaultConfig {
                  applicationId "com.damage.rokid.copilot"
                  minSdk 28
                  targetSdk 28
                  versionCode 900
                  versionName "9.0-storage-cleaner"
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Copilot Cleaner</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.CopilotCleaner" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowBackground">#000000</item>
                  <item name="android:fontFamily">sans</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />

              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.CopilotCleaner"
                  android:resizeableActivity="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:autoRemoveFromRecents="true"
                      android:excludeFromRecents="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/damage/rokid/copilot/MainActivity.java <<'EOF'
          package com.damage.rokid.copilot;

          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Environment;
          import android.os.StatFs;
          import android.view.Gravity;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.graphics.Color;
          import android.graphics.Typeface;

          import java.io.File;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private TextView status;
              private TextView details;
              private TextView footer;

              private long deletedBytes = 0L;
              private int deletedFiles = 0;
              private int failedDeletes = 0;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  buildUi();
                  runCleanup();
              }

              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(16, 12, 16, 12);
                  root.setBackgroundColor(Color.BLACK);

                  TextView title = tv("CONVERSATION COPILOT", 22, "#00FF33", true);
                  status = tv("STORAGE CLEANER", 16, "#FFFFFF", true);
                  details = tv("Preparing cleanup...", 13, "#00FF33", true);
                  footer = tv("Tap/center = clean again • install latest Copilot after this", 11, "#CCFFFFFF", false);

                  root.addView(title);
                  root.addView(status);
                  root.addView(details);
                  root.addView(footer);
                  setContentView(root);
              }

              private TextView tv(String s, int size, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(s);
                  t.setTextSize(size);
                  t.setTextColor(Color.parseColor(color));
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(0, 4, 0, 4);
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              private void runCleanup() {
                  deletedBytes = 0L;
                  deletedFiles = 0;
                  failedDeletes = 0;

                  long freeBefore = freeBytes();

                  File files = getFilesDir();
                  File cache = getCacheDir();
                  File noBackup = getNoBackupFilesDir();
                  File codeCache = getCodeCacheDir();

                  deleteChildren(files);
                  deleteChildren(cache);
                  deleteChildren(noBackup);
                  deleteChildren(codeCache);

                  deleteTarget(new File(files, "vosk-model-en-us"));
                  deleteTarget(new File(files, "local-brain"));
                  deleteTarget(new File(files, "models"));
                  deleteTarget(new File(files, "model-en-us"));
                  deleteTarget(new File(files, "brain.gguf"));
                  deleteTarget(new File(files, "llama-cli"));
                  deleteTarget(new File(files, "llama-runner"));
                  deleteTarget(new File(files, "llama-lib"));

                  long freeAfter = freeBytes();

                  status.setText("STORAGE CLEANED");
                  details.setText(
                      "Deleted files: " + deletedFiles + "\n" +
                      "Deleted approx: " + human(deletedBytes) + "\n" +
                      "Free before: " + human(freeBefore) + "\n" +
                      "Free after:  " + human(freeAfter) + "\n" +
                      "Free gained: " + human(Math.max(0L, freeAfter - freeBefore)) + "\n" +
                      "Failed deletes: " + failedDeletes + "\n\n" +
                      "Now install the newest Copilot APK."
                  );
              }

              private void deleteChildren(File dir) {
                  if (dir == null || !dir.exists() || !dir.isDirectory()) return;
                  File[] kids = dir.listFiles();
                  if (kids == null) return;
                  for (File k : kids) deleteTarget(k);
              }

              private void deleteTarget(File f) {
                  if (f == null || !f.exists()) return;

                  if (f.isDirectory()) {
                      File[] kids = f.listFiles();
                      if (kids != null) {
                          for (File k : kids) deleteTarget(k);
                      }
                  }

                  long len = sizeOf(f);
                  boolean ok = f.delete();
                  if (ok) {
                      deletedBytes += len;
                      deletedFiles++;
                  } else if (f.exists()) {
                      failedDeletes++;
                  }
              }

              private long sizeOf(File f) {
                  try {
                      if (f == null || !f.exists()) return 0L;
                      if (f.isFile()) return Math.max(0L, f.length());
                      long total = 0L;
                      File[] kids = f.listFiles();
                      if (kids != null) {
                          for (File k : kids) total += sizeOf(k);
                      }
                      return total;
                  } catch (Throwable ignored) {
                      return 0L;
                  }
              }

              private long freeBytes() {
                  try {
                      File root = Environment.getDataDirectory();
                      StatFs stat = new StatFs(root.getAbsolutePath());
                      return stat.getAvailableBytes();
                  } catch (Throwable ignored) {
                      return 0L;
                  }
              }

              private String human(long bytes) {
                  double b = (double)Math.max(0L, bytes);
                  String[] units = {"B", "KB", "MB", "GB"};
                  int u = 0;
                  while (b >= 1024.0 && u < units.length - 1) {
                      b /= 1024.0;
                      u++;
                  }
                  return String.format(Locale.US, "%.1f %s", b, units[u]);
              }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() == MotionEvent.ACTION_UP) {
                      runCleanup();
                      return true;
                  }
                  return true;
              }

              @Override
              public boolean dispatchKeyEvent(KeyEvent e) {
                  if (e.getAction() == KeyEvent.ACTION_UP) {
                      int k = e.getKeyCode();
                      if (k == KeyEvent.KEYCODE_ENTER ||
                          k == KeyEvent.KEYCODE_DPAD_CENTER ||
                          k == KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE ||
                          k == KeyEvent.KEYCODE_VOLUME_UP ||
                          k == KeyEvent.KEYCODE_VOLUME_DOWN) {
                          runCleanup();
                          return true;
                      }
                  }
                  return super.dispatchKeyEvent(e);
              }
          }
          EOF

      - name: Build debug cleaner APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Show cleaner APK output and size
        run: |
          echo "APK output folder:"
          find app/build/outputs/apk -type f -exec ls -lh {} \;

      - name: Upload cleaner APK
        uses: actions/upload-artifact@v4
        with:
          name: ConversationCopilot-storage-cleaner-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
