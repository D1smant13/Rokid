name: V17A Phone Native LLM Proof

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  LLAMA_CPP_COMMIT: "3e706dd55f56f59126c053c3db9cfc219a0a7074"
  ANDROID_COMPILE_SDK: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK_VERSION: "29.0.13113456"
  ANDROID_CMAKE_VERSION: "3.31.6"
  MODEL_URL: "https://huggingface.co/bartowski/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q4_K_M.gguf?download=true"

jobs:
  build:
    name: Build phone-native LLM proof APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out workflow repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build dependencies
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl \
            git \
            ninja-build \
            unzip

          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          LICENSE_STATUS="${PIPESTATUS[1]}"
          set -o pipefail

          if [ "${LICENSE_STATUS}" -ne 0 ]; then
            echo "sdkmanager --licenses failed with exit code ${LICENSE_STATUS}"
            exit "${LICENSE_STATUS}"
          fi

          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Fetch the exact smoke-tested llama.cpp source
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf llama.cpp
          git init llama.cpp
          git -C llama.cpp remote add origin https://github.com/ggml-org/llama.cpp.git
          git -C llama.cpp fetch --depth 1 origin "${LLAMA_CPP_COMMIT}"
          git -C llama.cpp checkout --detach FETCH_HEAD

          test -f llama.cpp/examples/llama.android/gradlew
          test -f llama.cpp/examples/llama.android/app/build.gradle.kts
          test -f llama.cpp/examples/llama.android/lib/build.gradle.kts
          test -f llama.cpp/examples/llama.android/lib/src/main/java/com/arm/aichat/AiChat.kt
          test -f llama.cpp/examples/llama.android/lib/src/main/java/com/arm/aichat/InferenceEngine.kt

          git -C llama.cpp rev-parse HEAD

      - name: Configure the official project for an arm64 proof APK
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          from pathlib import Path

          lib_gradle = Path(
              "llama.cpp/examples/llama.android/lib/build.gradle.kts"
          )
          text = lib_gradle.read_text(encoding="utf-8")

          old = 'abiFilters += listOf("arm64-v8a", "x86_64")'
          new = 'abiFilters += listOf("arm64-v8a")'

          if old not in text:
              raise SystemExit("Expected official ABI declaration was not found.")

          lib_gradle.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

          cat > llama.cpp/examples/llama.android/app/build.gradle.kts <<'EOF'
          plugins {
              alias(libs.plugins.android.application)
              alias(libs.plugins.jetbrains.kotlin.android)
          }

          android {
              namespace = "com.example.llama"
              compileSdk = 36

              defaultConfig {
                  applicationId = "com.damage.v17a.nativeproof"

                  minSdk = 33
                  targetSdk = 36

                  versionCode = 1701
                  versionName = "17.0a-native-proof"

                  ndk {
                      abiFilters += listOf("arm64-v8a")
                  }

                  vectorDrawables {
                      useSupportLibrary = true
                  }
              }

              buildTypes {
                  debug {
                      isMinifyEnabled = false
                      isShrinkResources = false
                  }
                  release {
                      isMinifyEnabled = false
                      isShrinkResources = false
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlin {
                  jvmToolchain(17)
              }

              androidResources {
                  noCompress += listOf("gguf")
              }

              packaging {
                  jniLibs {
                      useLegacyPackaging = true
                  }
                  resources {
                      excludes += "/META-INF/{AL2.0,LGPL2.1}"
                  }
              }
          }

          dependencies {
              implementation(libs.bundles.androidx)
              implementation(libs.material)
              implementation(project(":lib"))
          }
          EOF

      - name: Generate the minimal V17A proof screen
        shell: bash
        run: |
          set -euxo pipefail

          APP="llama.cpp/examples/llama.android/app"
          SOURCE="${APP}/src/main/java/com/example/llama/MainActivity.kt"

          mkdir -p "${APP}/src/main/assets"

          cat > "${SOURCE}" <<'EOF'
          package com.example.llama

          import android.graphics.Color
          import android.graphics.Typeface
          import android.os.Bundle
          import android.os.SystemClock
          import android.view.Gravity
          import android.view.WindowManager
          import android.widget.Button
          import android.widget.LinearLayout
          import android.widget.ScrollView
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity
          import androidx.lifecycle.lifecycleScope
          import com.arm.aichat.AiChat
          import com.arm.aichat.InferenceEngine
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.Job
          import kotlinx.coroutines.flow.collect
          import kotlinx.coroutines.launch
          import kotlinx.coroutines.withContext
          import java.io.File
          import java.io.FileOutputStream
          import java.io.RandomAccessFile
          import java.util.Locale

          class MainActivity : AppCompatActivity() {

              private lateinit var engine: InferenceEngine
              private lateinit var statusView: TextView
              private lateinit var metricsView: TextView
              private lateinit var outputView: TextView
              private lateinit var runButton: Button

              private var generationJob: Job? = null
              private var modelLoadMs = 0L

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)
                  buildScreen()
                  initializeModel()
              }

              private fun buildScreen() {
                  val root = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      gravity = Gravity.CENTER_HORIZONTAL
                      setPadding(dp(20), dp(18), dp(20), dp(18))
                      setBackgroundColor(Color.BLACK)
                  }

                  root.addView(label(
                      value = "V17A PHONE NATIVE LLM PROOF",
                      size = 22f,
                      color = "#00FF33",
                      bold = true,
                      gravityValue = Gravity.CENTER
                  ))

                  statusView = label(
                      value = "STARTING",
                      size = 18f,
                      color = "#FFFFFF",
                      bold = true,
                      gravityValue = Gravity.CENTER
                  )
                  root.addView(statusView)

                  metricsView = label(
                      value = "Preparing bundled GGUF...",
                      size = 14f,
                      color = "#B8FFBF",
                      bold = false,
                      gravityValue = Gravity.CENTER
                  )
                  root.addView(metricsView)

                  runButton = Button(this).apply {
                      text = "RUN NATIVE LLM TEST"
                      isEnabled = false
                      setOnClickListener { runProof() }
                  }

                  root.addView(
                      runButton,
                      LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                      ).apply {
                          topMargin = dp(12)
                          bottomMargin = dp(12)
                      }
                  )

                  outputView = label(
                      value = "SOURCE: PHONE NATIVE LLM\n\nWaiting for model load.",
                      size = 17f,
                      color = "#00FF33",
                      bold = true,
                      gravityValue = Gravity.START
                  ).apply {
                      setTextIsSelectable(true)
                  }

                  val outputScroll = ScrollView(this).apply {
                      isFillViewport = true
                      addView(
                          outputView,
                          ScrollView.LayoutParams(
                              ScrollView.LayoutParams.MATCH_PARENT,
                              ScrollView.LayoutParams.WRAP_CONTENT
                          )
                      )
                  }

                  root.addView(
                      outputScroll,
                      LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          0,
                          1f
                      )
                  )

                  root.addView(label(
                      value = "AiChat / InferenceEngine • in-process GGUF • no CLI • no rules",
                      size = 12f,
                      color = "#A0A0A0",
                      bold = false,
                      gravityValue = Gravity.CENTER
                  ))

                  setContentView(root)
              }

              private fun initializeModel() {
                  statusView.text = "COPYING MODEL TO PRIVATE STORAGE"
                  runButton.isEnabled = false

                  lifecycleScope.launch {
                      try {
                          val copyStarted = SystemClock.elapsedRealtime()
                          val model = withContext(Dispatchers.IO) {
                              ensurePrivateModel()
                          }
                          val copyMs = SystemClock.elapsedRealtime() - copyStarted

                          statusView.text = "LOADING MODEL IN-PROCESS"
                          metricsView.text =
                              "Model: ${formatMiB(model.length())}\n" +
                              "Copy/check: ${copyMs} ms"

                          engine = withContext(Dispatchers.Default) {
                              AiChat.getInferenceEngine(applicationContext)
                          }

                          val loadStarted = SystemClock.elapsedRealtime()
                          withContext(Dispatchers.IO) {
                              engine.loadModel(model.absolutePath)
                          }
                          modelLoadMs = SystemClock.elapsedRealtime() - loadStarted

                          statusView.text = "PHONE NATIVE LLM READY"
                          metricsView.text =
                              "Binding: AiChat / InferenceEngine\n" +
                              "Model: ${formatMiB(model.length())}\n" +
                              "Load time: ${modelLoadMs} ms\n" +
                              "ABI: ${android.os.Build.SUPPORTED_ABIS.joinToString()}"

                          outputView.text =
                              "SOURCE: PHONE NATIVE LLM\n\n" +
                              "Model loaded successfully. Tap RUN NATIVE LLM TEST."

                          runButton.isEnabled = true
                      } catch (error: Throwable) {
                          showError("MODEL INITIALIZATION FAILED", error)
                      }
                  }
              }

              private fun runProof() {
                  if (!this::engine.isInitialized) {
                      outputView.text =
                          "SOURCE: PHONE NATIVE LLM\n\nERROR: Engine is not initialized."
                      return
                  }

                  generationJob?.cancel()
                  runButton.isEnabled = false
                  statusView.text = "NATIVE INFERENCE RUNNING"
                  outputView.text = "SOURCE: PHONE NATIVE LLM\n\nGENERATING..."

                  generationJob = lifecycleScope.launch(Dispatchers.Default) {
                      val result = StringBuilder()
                      var tokenEvents = 0
                      val generationStarted = SystemClock.elapsedRealtime()

                      try {
                          engine.sendUserPrompt(
                              message = PROOF_PROMPT,
                              predictLength = 80
                          ).collect { token ->
                              tokenEvents += 1
                              result.append(token)

                              withContext(Dispatchers.Main) {
                                  outputView.text =
                                      "SOURCE: PHONE NATIVE LLM\n\n" +
                                      result.toString()
                              }
                          }

                          val generationMs =
                              SystemClock.elapsedRealtime() - generationStarted
                          val answer = result.toString().trim()
                          val corrected = correctsArithmetic(answer)

                          withContext(Dispatchers.Main) {
                              statusView.text =
                                  if (corrected) {
                                      "NATIVE LLM PROOF PASSED"
                                  } else {
                                      "NATIVE TOKENS RECEIVED — REVIEW OUTPUT"
                                  }

                              metricsView.text =
                                  "Binding: AiChat / InferenceEngine\n" +
                                  "Model load: ${modelLoadMs} ms\n" +
                                  "Generation: ${generationMs} ms\n" +
                                  "Token events: ${tokenEvents}\n" +
                                  "Arithmetic check: ${if (corrected) "PASS" else "REVIEW"}"

                              outputView.text =
                                  "SOURCE: PHONE NATIVE LLM\n\n" +
                                  if (answer.isBlank()) {
                                      "(Native generation completed without visible text.)"
                                  } else {
                                      answer
                                  }

                              runButton.isEnabled = true
                          }
                      } catch (error: Throwable) {
                          withContext(Dispatchers.Main) {
                              showError("NATIVE INFERENCE FAILED", error)
                          }
                      }
                  }
              }

              private fun ensurePrivateModel(): File {
                  val directory = File(filesDir, "models")

                  if (directory.exists() && !directory.isDirectory) {
                      check(directory.delete()) {
                          "Could not replace invalid models path."
                      }
                  }

                  if (!directory.exists()) {
                      check(directory.mkdirs()) {
                          "Could not create private model directory."
                      }
                  }

                  val destination = File(directory, MODEL_FILENAME)

                  if (!destination.exists() ||
                      destination.length() < MINIMUM_MODEL_BYTES
                  ) {
                      val temporary = File(directory, "$MODEL_FILENAME.part")
                      if (temporary.exists()) {
                          temporary.delete()
                      }

                      assets.open(MODEL_ASSET).use { input ->
                          FileOutputStream(temporary).use { output ->
                              val buffer = ByteArray(1024 * 1024)

                              while (true) {
                                  val count = input.read(buffer)
                                  if (count < 0) {
                                      break
                                  }
                                  output.write(buffer, 0, count)
                              }

                              output.fd.sync()
                          }
                      }

                      check(temporary.length() >= MINIMUM_MODEL_BYTES) {
                          "Copied model is too small: ${temporary.length()} bytes."
                      }

                      RandomAccessFile(temporary, "r").use { file ->
                          val magic = ByteArray(4)
                          file.readFully(magic)
                          check(magic.contentEquals(byteArrayOf(
                              'G'.code.toByte(),
                              'G'.code.toByte(),
                              'U'.code.toByte(),
                              'F'.code.toByte()
                          ))) {
                              "Copied asset is not a GGUF file."
                          }
                      }

                      if (destination.exists()) {
                          check(destination.delete()) {
                              "Could not replace old private model."
                          }
                      }

                      check(temporary.renameTo(destination)) {
                          "Could not move copied model into place."
                      }
                  }

                  check(destination.exists()) {
                      "Private model file is missing."
                  }

                  return destination
              }

              private fun correctsArithmetic(answer: String): Boolean {
                  val normalized = answer
                      .lowercase(Locale.US)
                      .replace(Regex("\\s+"), " ")
                      .trim()

                  val saysTwo =
                      normalized.contains("one plus one equals two") ||
                      normalized.contains("one plus one is two") ||
                      normalized.contains("1 + 1 = 2") ||
                      normalized.contains("1+1=2")

                  val rejectsSeven =
                      normalized.contains("not seven") ||
                      normalized.contains("seven is incorrect") ||
                      normalized.contains("claim is false") ||
                      normalized.contains("statement is false") ||
                      normalized.contains("incorrect")

                  return saysTwo && rejectsSeven
              }

              private fun showError(title: String, error: Throwable) {
                  statusView.text = title
                  metricsView.text =
                      "${error.javaClass.simpleName}: " +
                      (error.message ?: "(no message)")
                  outputView.text =
                      "SOURCE: PHONE NATIVE LLM\n\n" +
                      "ERROR: ${error.javaClass.name}\n" +
                      (error.message ?: "(no message)")
                  runButton.isEnabled = this::engine.isInitialized
              }

              private fun label(
                  value: String,
                  size: Float,
                  color: String,
                  bold: Boolean,
                  gravityValue: Int
              ): TextView =
                  TextView(this).apply {
                      text = value
                      textSize = size
                      setTextColor(Color.parseColor(color))
                      gravity = gravityValue
                      setPadding(0, dp(6), 0, dp(6))

                      if (bold) {
                          setTypeface(Typeface.DEFAULT, Typeface.BOLD)
                      }
                  }

              private fun dp(value: Int): Int =
                  (value * resources.displayMetrics.density).toInt()

              private fun formatMiB(bytes: Long): String =
                  String.format(
                      Locale.US,
                      "%.1f MiB",
                      bytes.toDouble() / (1024.0 * 1024.0)
                  )

              override fun onStop() {
                  generationJob?.cancel()
                  super.onStop()
              }

              override fun onDestroy() {
                  generationJob?.cancel()

                  if (this::engine.isInitialized) {
                      try {
                          engine.destroy()
                      } catch (_: Throwable) {
                          // The Android process is already shutting down.
                      }
                  }

                  super.onDestroy()
              }

              companion object {
                  private const val MODEL_ASSET = "brain.gguf"
                  private const val MODEL_FILENAME =
                      "SmolLM2-135M-Instruct-Q4_K_M.gguf"
                  private const val MINIMUM_MODEL_BYTES =
                      50L * 1024L * 1024L

                  private const val PROOF_PROMPT =
                      "Correct this false arithmetic claim in one short sentence. " +
                      "Start your answer with VERIFY:. " +
                      "The false claim is: one plus one equals seven."
              }
          }
          EOF

          cat > "${APP}/src/main/res/values/strings.xml" <<'EOF'
          <resources>
              <string name="app_name">V17A Native LLM Proof</string>
          </resources>
          EOF

          if grep -RInE \
              'ProcessBuilder[[:space:]]*\(|Runtime\.getRuntime[[:space:]]*\(|llama-cli|llama-server' \
              "${APP}/src/main/java"; then
            echo "Forbidden CLI/subprocess integration found."
            exit 1
          fi

      - name: Download and validate the bundled GGUF
        shell: bash
        run: |
          set -euxo pipefail

          MODEL_PATH="llama.cpp/examples/llama.android/app/src/main/assets/brain.gguf"

          curl \
            --fail \
            --location \
            --retry 5 \
            --retry-all-errors \
            --connect-timeout 30 \
            --output "${MODEL_PATH}" \
            "${MODEL_URL}"

          python3 - <<'PY'
          from pathlib import Path

          model = Path(
              "llama.cpp/examples/llama.android/app/src/main/assets/brain.gguf"
          )
          size = model.stat().st_size

          if size < 50 * 1024 * 1024:
              raise SystemExit(f"Downloaded model is too small: {size} bytes")

          with model.open("rb") as handle:
              magic = handle.read(4)

          if magic != b"GGUF":
              raise SystemExit(f"Invalid GGUF magic: {magic!r}")

          print(f"Validated GGUF: {size / 1024 / 1024:.1f} MiB")
          PY

          ls -lh "${MODEL_PATH}"

      - name: Build V17A and preserve the complete Gradle log
        id: gradle_build
        working-directory: llama.cpp/examples/llama.android
        shell: bash
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx6g
            -Dfile.encoding=UTF-8
            -Dkotlin.daemon.jvm.options=-Xmx2g
        run: |
          set -uo pipefail

          chmod +x gradlew

          set +e
          ./gradlew \
            :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            2>&1 | tee "${GITHUB_WORKSPACE}/V17A-gradle-build.log"

          BUILD_STATUS="${PIPESTATUS[0]}"
          set -e

          echo "status=${BUILD_STATUS}" >> "${GITHUB_OUTPUT}"
          echo "Gradle exit code: ${BUILD_STATUS}"

          # Do not exit here. The log is uploaded in the next step even on failure.
          exit 0

      - name: Upload complete Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: V17A-Complete-Gradle-Build-Log
          path: V17A-gradle-build.log
          if-no-files-found: error
          retention-days: 14

      - name: Stop after a recorded build failure
        if: steps.gradle_build.outputs.status != '0'
        shell: bash
        run: |
          echo "Gradle failed. Download the V17A-Complete-Gradle-Build-Log artifact."
          exit 1

      - name: Verify and name the APK
        shell: bash
        run: |
          set -euxo pipefail

          APK="llama.cpp/examples/llama.android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "${APK}"

          unzip -l "${APK}" > /tmp/v17a-apk-contents.txt

          grep -F "assets/brain.gguf" /tmp/v17a-apk-contents.txt
          grep -E "lib/arm64-v8a/.+\.so" /tmp/v17a-apk-contents.txt

          if grep -E "lib/x86_64/" /tmp/v17a-apk-contents.txt; then
            echo "Unexpected x86_64 libraries were packaged."
            exit 1
          fi

          cp "${APK}" V17A-Phone-Native-LLM-Proof.apk
          ls -lh V17A-Phone-Native-LLM-Proof.apk

      - name: Upload V17A phone proof APK
        uses: actions/upload-artifact@v4
        with:
          name: V17A-Phone-Native-LLM-Proof-APK
          path: V17A-Phone-Native-LLM-Proof.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
