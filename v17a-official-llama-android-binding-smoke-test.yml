name: V17A Official llama.cpp Android Binding Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  LLAMA_CPP_COMMIT: "3e706dd55f56f59126c053c3db9cfc219a0a7074"
  ANDROID_COMPILE_SDK: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK_VERSION: "29.0.13113456"
  ANDROID_CMAKE_VERSION: "3.31.6"

jobs:
  build:
    name: Build official llama.android sample
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out workflow repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build dependencies
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git \
            ninja-build \
            unzip

          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          LICENSE_STATUS="${PIPESTATUS[1]}"
          set -o pipefail

          if [ "${LICENSE_STATUS}" -ne 0 ]; then
            echo "sdkmanager --licenses failed with exit code ${LICENSE_STATUS}"
            exit "${LICENSE_STATUS}"
          fi

          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"

          java -version
          "${ANDROID_HOME}/cmake/${ANDROID_CMAKE_VERSION}/bin/cmake" --version
          ninja --version

      - name: Fetch pinned official llama.cpp source
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf llama.cpp
          git init llama.cpp
          git -C llama.cpp remote add origin https://github.com/ggml-org/llama.cpp.git
          git -C llama.cpp fetch --depth 1 origin "${LLAMA_CPP_COMMIT}"
          git -C llama.cpp checkout --detach FETCH_HEAD

          test -f llama.cpp/examples/llama.android/gradlew
          test -f llama.cpp/examples/llama.android/app/build.gradle.kts
          test -f llama.cpp/examples/llama.android/lib/build.gradle.kts
          test -f llama.cpp/examples/llama.android/lib/src/main/java/com/arm/aichat/AiChat.kt
          test -f llama.cpp/examples/llama.android/lib/src/main/java/com/arm/aichat/InferenceEngine.kt

          echo "Pinned llama.cpp commit:"
          git -C llama.cpp rev-parse HEAD

      - name: Print official Android project versions
        shell: bash
        run: |
          set -euxo pipefail

          echo "Gradle wrapper:"
          grep "distributionUrl" \
            llama.cpp/examples/llama.android/gradle/wrapper/gradle-wrapper.properties

          echo "Plugin versions:"
          sed -n '1,30p' \
            llama.cpp/examples/llama.android/gradle/libs.versions.toml

          echo "Native toolchain:"
          grep -nE "compileSdk|minSdk|targetSdk|ndkVersion|cmake" \
            llama.cpp/examples/llama.android/app/build.gradle.kts \
            llama.cpp/examples/llama.android/lib/build.gradle.kts

      - name: Build untouched official Android sample
        working-directory: llama.cpp/examples/llama.android
        shell: bash
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx6g
            -Dfile.encoding=UTF-8
            -Dkotlin.daemon.jvm.options=-Xmx2g
        run: |
          set -euxo pipefail

          chmod +x gradlew

          ./gradlew \
            :lib:assembleDebug \
            :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all

      - name: Verify official APK and native libraries
        shell: bash
        run: |
          set -euxo pipefail

          APK="llama.cpp/examples/llama.android/app/build/outputs/apk/debug/app-debug.apk"
          AAR="llama.cpp/examples/llama.android/lib/build/outputs/aar/lib-debug.aar"

          test -f "${APK}"
          test -f "${AAR}"

          unzip -l "${APK}" > /tmp/official-apk-contents.txt
          unzip -l "${AAR}" > /tmp/official-aar-contents.txt

          grep -E "lib/(arm64-v8a|x86_64)/.+\.so" /tmp/official-apk-contents.txt
          grep -E "jni/(arm64-v8a|x86_64)/.+\.so" /tmp/official-aar-contents.txt

          cp "${APK}" V17A-Official-llama-Android-Sample.apk
          cp "${AAR}" V17A-Official-llama-Android-Library.aar

          ls -lh \
            V17A-Official-llama-Android-Sample.apk \
            V17A-Official-llama-Android-Library.aar

      - name: Upload official smoke-test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: V17A-Official-Android-Binding-Smoke-Test
          path: |
            V17A-Official-llama-Android-Sample.apk
            V17A-Official-llama-Android-Library.aar
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
