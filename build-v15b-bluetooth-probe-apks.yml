name: V15B Bluetooth Probe APKs

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build V15B Bluetooth Probe APKs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Phone Bluetooth Brain Server Probe
        run: |
          set -e
          mkdir -p phone/app/src/main/java/com/damage/copilot/btbrain
          mkdir -p phone/app/src/main/res/values

          cat > phone/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "PhoneBluetoothBrainProbe"
          include ":app"
          EOF

          cat > phone/build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > phone/app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.damage.copilot.btbrain"
              compileSdk 35

              defaultConfig {
                  applicationId "com.damage.copilot.btbrain"
                  minSdk 23
                  targetSdk 28
                  versionCode 1511
                  versionName "15.0b-phone-bluetooth-brain-probe"
              }
          }
          EOF

          cat > phone/app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">BT Brain Probe</string>
          </resources>
          EOF

          cat > phone/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.BTBrainProbe" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowBackground">#000000</item>
                  <item name="android:fontFamily">sans</item>
              </style>
          </resources>
          EOF

          cat > phone/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />

              <uses-feature android:name="android.hardware.bluetooth" android:required="false" />

              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.BTBrainProbe"
                  android:resizeableActivity="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > phone/app/src/main/java/com/damage/copilot/btbrain/MainActivity.java <<'EOF'
          package com.damage.copilot.btbrain;

          import android.Manifest;
          import android.app.Activity;
          import android.bluetooth.BluetoothAdapter;
          import android.bluetooth.BluetoothDevice;
          import android.bluetooth.BluetoothServerSocket;
          import android.bluetooth.BluetoothSocket;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.MotionEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.graphics.Color;
          import android.graphics.Typeface;

          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.io.OutputStream;
          import java.nio.charset.StandardCharsets;
          import java.util.Locale;
          import java.util.Set;
          import java.util.UUID;

          public class MainActivity extends Activity {
              private static final UUID COPILOT_UUID = UUID.fromString("8b6f9b10-6f8d-4b7f-9d34-2d4b7a0f9c21");
              private static final String SERVICE_NAME = "DamageCopilotBrainV15B";
              private static final int REQ_PERMS = 200;

              private final Handler ui = new Handler(Looper.getMainLooper());
              private TextView status;
              private TextView details;
              private TextView lastBox;
              private TextView footer;

              private BluetoothAdapter adapter;
              private BluetoothServerSocket serverSocket;
              private volatile boolean running = false;
              private Thread serverThread;

              private int accepts = 0;
              private int requests = 0;
              private String lastRemote = "(none)";
              private String lastTranscript = "(none)";
              private String lastCard = "(none)";
              private String lastError = "(none)";

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  buildUi();
                  ensurePermissionsThenStart();
              }

              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(24, 24, 24, 24);
                  root.setBackgroundColor(Color.BLACK);

                  TextView title = tv("PHONE BT BRAIN PROBE", 24, "#00FF33", true);
                  status = tv("STARTING", 18, "#FFFFFF", true);
                  details = tv("Preparing Bluetooth RFCOMM server...", 14, "#00FF33", false);
                  lastBox = tv("Waiting for Rokid probe.", 15, "#00FF33", true);
                  footer = tv("No Wi-Fi • no cloud • Bluetooth app-to-app test", 12, "#CCFFFFFF", false);

                  root.addView(title);
                  root.addView(status);
                  root.addView(details);
                  root.addView(lastBox);
                  root.addView(footer);
                  setContentView(root);
              }

              private TextView tv(String s, int size, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(s);
                  t.setTextSize(size);
                  t.setTextColor(Color.parseColor(color));
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(0, 7, 0, 7);
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              private void ensurePermissionsThenStart() {
                  if (Build.VERSION.SDK_INT >= 31) {
                      if (checkSelfPermission(Manifest.permission.BLUETOOTH_CONNECT) != PackageManager.PERMISSION_GRANTED ||
                          checkSelfPermission(Manifest.permission.BLUETOOTH_SCAN) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{
                              Manifest.permission.BLUETOOTH_CONNECT,
                              Manifest.permission.BLUETOOTH_SCAN
                          }, REQ_PERMS);
                          return;
                      }
                  } else if (Build.VERSION.SDK_INT >= 23) {
                      if (checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{Manifest.permission.ACCESS_FINE_LOCATION}, REQ_PERMS);
                          return;
                      }
                  }
                  startServer();
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  startServer();
              }

              private void startServer() {
                  stopServer();
                  adapter = BluetoothAdapter.getDefaultAdapter();

                  if (adapter == null) {
                      status.setText("NO BLUETOOTH ADAPTER");
                      details.setText("This phone does not expose BluetoothAdapter.");
                      return;
                  }

                  String name = safeCallName();
                  boolean enabled = false;
                  try { enabled = adapter.isEnabled(); } catch (Throwable ignored) {}

                  if (!enabled) {
                      status.setText("BLUETOOTH OFF");
                      details.setText("Turn Bluetooth on, pair with Rokid, then tap to retry.\nPhone name: " + name);
                      return;
                  }

                  running = true;
                  serverThread = new Thread(this::serverLoop, "phone-bt-brain-probe-server");
                  serverThread.start();
                  updateUi("WAITING FOR ROKID");
              }

              private void stopServer() {
                  running = false;
                  try { if (serverSocket != null) serverSocket.close(); } catch (Throwable ignored) {}
                  serverSocket = null;
              }

              private void serverLoop() {
                  try {
                      serverSocket = adapter.listenUsingRfcommWithServiceRecord(SERVICE_NAME, COPILOT_UUID);
                      ui.post(() -> updateUi("RFCOMM SERVER READY"));

                      while (running) {
                          BluetoothSocket socket = serverSocket.accept();
                          accepts++;
                          handleSocket(socket);
                      }
                  } catch (Throwable e) {
                      lastError = e.getClass().getSimpleName() + ": " + safe(e.getMessage());
                      if (running) {
                          ui.post(() -> {
                              status.setText("SERVER FAILED");
                              updateUi("SERVER FAILED");
                          });
                      }
                  }
              }

              private void handleSocket(BluetoothSocket socket) {
                  try {
                      BluetoothDevice remote = socket.getRemoteDevice();
                      lastRemote = safeDevice(remote);

                      BufferedReader br = new BufferedReader(new InputStreamReader(socket.getInputStream(), StandardCharsets.UTF_8));
                      OutputStream out = socket.getOutputStream();

                      String line = br.readLine();
                      if (line == null) line = "";
                      lastTranscript = line.trim();

                      lastCard = think(lastTranscript);
                      requests++;

                      out.write((lastCard + "\n").getBytes(StandardCharsets.UTF_8));
                      out.flush();

                      try { socket.close(); } catch (Throwable ignored) {}

                      ui.post(() -> updateUi("CONNECTED / REPLIED"));
                  } catch (Throwable e) {
                      lastError = e.getClass().getSimpleName() + ": " + safe(e.getMessage());
                      try { socket.close(); } catch (Throwable ignored) {}
                      ui.post(() -> updateUi("CLIENT ERROR"));
                  }
              }

              private String think(String text) {
                  String low = text == null ? "" : text.toLowerCase(Locale.US);
                  if (low.contains("one plus one") && (low.contains("seven") || low.contains("7"))) {
                      return "SOURCE: PHONE BT\nVERIFY: One plus one equals two, not seven.";
                  }
                  if (low.length() == 0) {
                      return "SOURCE: PHONE BT\nNOTE: Bluetooth brain is online.";
                  }
                  return "SOURCE: PHONE BT\nASK: Bluetooth bridge received the transcript.";
              }

              private void updateUi(String state) {
                  String name = safeCallName();
                  String addr = safeAddress();
                  int bonded = bondedCount();

                  status.setText(state);
                  details.setText(
                      "Phone BT name: " + name + "\n" +
                      "Phone BT addr: " + addr + "\n" +
                      "UUID: " + COPILOT_UUID + "\n" +
                      "Bonded devices: " + bonded + "\n" +
                      "Accepts: " + accepts + " Requests: " + requests
                  );

                  lastBox.setText(
                      "LAST REMOTE\n" + lastRemote + "\n\n" +
                      "LAST TRANSCRIPT\n" + lastTranscript + "\n\n" +
                      "LAST CARD\n" + lastCard + "\n\n" +
                      "LAST ERROR\n" + lastError
                  );

                  footer.setText("Keep this open. Rokid must already be Bluetooth-paired to phone.");
              }

              private int bondedCount() {
                  try {
                      Set<BluetoothDevice> devices = adapter.getBondedDevices();
                      return devices == null ? 0 : devices.size();
                  } catch (Throwable ignored) {
                      return -1;
                  }
              }

              private String safeDevice(BluetoothDevice d) {
                  if (d == null) return "(unknown device)";
                  String name = "(name blocked)";
                  String addr = "(addr blocked)";
                  try { name = d.getName(); } catch (Throwable ignored) {}
                  try { addr = d.getAddress(); } catch (Throwable ignored) {}
                  return safe(name) + " / " + safe(addr);
              }

              private String safeCallName() {
                  try { return safe(adapter.getName()); } catch (Throwable ignored) { return "(blocked)"; }
              }

              private String safeAddress() {
                  try { return safe(adapter.getAddress()); } catch (Throwable ignored) { return "(blocked/randomized)"; }
              }

              private String safe(String s) {
                  return s == null || s.length() == 0 ? "(empty)" : s;
              }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() == MotionEvent.ACTION_UP) {
                      startServer();
                      return true;
                  }
                  return true;
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  stopServer();
              }
          }
          EOF

      - name: Build Phone BT Brain Probe APK
        run: gradle -p phone :app:assembleDebug --no-daemon --stacktrace

      - name: Generate Rokid Bluetooth Client Probe
        run: |
          set -e
          mkdir -p rokid/app/src/main/java/com/damage/rokid/btprobe
          mkdir -p rokid/app/src/main/res/values

          cat > rokid/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "RokidBluetoothClientProbe"
          include ":app"
          EOF

          cat > rokid/build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > rokid/app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.damage.rokid.btprobe"
              compileSdk 35

              defaultConfig {
                  applicationId "com.damage.rokid.btprobe"
                  minSdk 28
                  targetSdk 28
                  versionCode 1512
                  versionName "15.0b-rokid-bluetooth-client-probe"
              }
          }
          EOF

          cat > rokid/app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">BT Probe</string>
          </resources>
          EOF

          cat > rokid/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.BTProbe" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowBackground">#000000</item>
                  <item name="android:fontFamily">sans</item>
              </style>
          </resources>
          EOF

          cat > rokid/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />

              <uses-feature android:name="android.hardware.bluetooth" android:required="false" />
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />

              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.BTProbe"
                  android:resizeableActivity="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:autoRemoveFromRecents="true"
                      android:excludeFromRecents="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > rokid/app/src/main/java/com/damage/rokid/btprobe/MainActivity.java <<'EOF'
          package com.damage.rokid.btprobe;

          import android.Manifest;
          import android.app.Activity;
          import android.bluetooth.BluetoothAdapter;
          import android.bluetooth.BluetoothDevice;
          import android.bluetooth.BluetoothSocket;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;

          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.io.OutputStream;
          import java.nio.charset.StandardCharsets;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.Set;
          import java.util.UUID;

          public class MainActivity extends Activity {
              private static final UUID COPILOT_UUID = UUID.fromString("8b6f9b10-6f8d-4b7f-9d34-2d4b7a0f9c21");
              private static final int REQ_PERMS = 201;

              private final Handler ui = new Handler(Looper.getMainLooper());
              private TextView status;
              private TextView report;
              private TextView card;
              private TextView footer;

              private BluetoothAdapter adapter;
              private volatile boolean probing = false;
              private String lastReport = "Not started.";
              private String lastCard = "Tap/center to probe Bluetooth.";
              private int probeCount = 0;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  buildUi();
                  ensurePermissionsThenProbe();
              }

              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(16, 8, 16, 8);
                  root.setBackgroundColor(Color.BLACK);

                  TextView title = tv("ROKID BT PROBE", 24, "#00FF33", true);
                  status = tv("V15B BLUETOOTH PROBE", 15, "#FFFFFF", true);
                  report = tv("Checking Bluetooth capability...", 12, "#DDFFFFFF", false);
                  card = tv("BT PROBE\nTap to test paired phone.", 16, "#00FF33", true);
                  footer = tv("No Wi-Fi • app-level Bluetooth RFCOMM test", 11, "#CCFFFFFF", false);

                  root.addView(title);
                  root.addView(status);
                  root.addView(report);
                  root.addView(card);
                  root.addView(footer);
                  setContentView(root);
              }

              private TextView tv(String s, int size, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(s);
                  t.setTextSize(size);
                  t.setTextColor(Color.parseColor(color));
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(0, 4, 0, 4);
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              private void ensurePermissionsThenProbe() {
                  if (Build.VERSION.SDK_INT >= 31) {
                      if (checkSelfPermission(Manifest.permission.BLUETOOTH_CONNECT) != PackageManager.PERMISSION_GRANTED ||
                          checkSelfPermission(Manifest.permission.BLUETOOTH_SCAN) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{
                              Manifest.permission.BLUETOOTH_CONNECT,
                              Manifest.permission.BLUETOOTH_SCAN
                          }, REQ_PERMS);
                          return;
                      }
                  } else if (Build.VERSION.SDK_INT >= 23) {
                      if (checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{Manifest.permission.ACCESS_FINE_LOCATION}, REQ_PERMS);
                          return;
                      }
                  }
                  runProbe();
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  runProbe();
              }

              private void runProbe() {
                  if (probing) return;
                  probing = true;
                  probeCount++;

                  status.setText("PROBING BLUETOOTH");
                  lastCard = "BT PROBE\nTrying paired devices...";
                  updateUi();

                  new Thread(() -> {
                      StringBuilder r = new StringBuilder();
                      String finalCard = "BT FAILED\nNo result.";
                      try {
                          adapter = BluetoothAdapter.getDefaultAdapter();
                          if (adapter == null) {
                              r.append("BluetoothAdapter: NULL\n");
                              finalCard = "BT FAILED\nNo BluetoothAdapter exposed.";
                              finishProbe(r, finalCard);
                              return;
                          }

                          r.append("BluetoothAdapter: OK\n");

                          boolean enabled = false;
                          try { enabled = adapter.isEnabled(); } catch (Throwable e) { r.append("isEnabled error: ").append(shortErr(e)).append("\n"); }
                          r.append("Enabled: ").append(enabled).append("\n");

                          String myName = "(blocked)";
                          String myAddr = "(blocked)";
                          try { myName = adapter.getName(); } catch (Throwable ignored) {}
                          try { myAddr = adapter.getAddress(); } catch (Throwable ignored) {}
                          r.append("Rokid BT name: ").append(safe(myName)).append("\n");
                          r.append("Rokid BT addr: ").append(safe(myAddr)).append("\n");

                          if (!enabled) {
                              finalCard = "BT FAILED\nBluetooth exists but is off/unavailable.";
                              finishProbe(r, finalCard);
                              return;
                          }

                          try { adapter.cancelDiscovery(); } catch (Throwable ignored) {}

                          Set<BluetoothDevice> bonded;
                          try {
                              bonded = adapter.getBondedDevices();
                          } catch (Throwable e) {
                              r.append("getBondedDevices failed: ").append(shortErr(e)).append("\n");
                              finalCard = "BT FAILED\nCannot read paired devices.";
                              finishProbe(r, finalCard);
                              return;
                          }

                          int count = bonded == null ? 0 : bonded.size();
                          r.append("Bonded devices: ").append(count).append("\n");

                          if (count == 0) {
                              finalCard = "BT FAILED\nNo paired Bluetooth devices visible.";
                              finishProbe(r, finalCard);
                              return;
                          }

                          List<BluetoothDevice> devices = new ArrayList<>(bonded);
                          for (BluetoothDevice d : devices) {
                              String name = safeDeviceName(d);
                              String addr = safeDeviceAddr(d);
                              r.append("\nTrying: ").append(name).append(" / ").append(addr).append("\n");

                              try {
                                  BluetoothSocket socket = d.createRfcommSocketToServiceRecord(COPILOT_UUID);
                                  r.append("Socket created.\n");
                                  socket.connect();
                                  r.append("Connected.\n");

                                  OutputStream out = socket.getOutputStream();
                                  BufferedReader br = new BufferedReader(new InputStreamReader(socket.getInputStream(), StandardCharsets.UTF_8));

                                  String test = "one plus one equals seven";
                                  out.write((test + "\n").getBytes(StandardCharsets.UTF_8));
                                  out.flush();

                                  String response = br.readLine();
                                  if (response == null) response = "(null response)";
                                  r.append("Response: ").append(response).append("\n");

                                  try { socket.close(); } catch (Throwable ignored) {}

                                  finalCard = "BT CONNECTED\n" + name + "\n" + response;
                                  finishProbe(r, finalCard);
                                  return;

                              } catch (Throwable e) {
                                  r.append("Failed: ").append(shortErr(e)).append("\n");
                              }
                          }

                          finalCard = "BT FAILED\nNo paired device accepted UUID.";
                          finishProbe(r, finalCard);

                      } catch (Throwable e) {
                          r.append("Fatal: ").append(shortErr(e)).append("\n");
                          finalCard = "BT FATAL\n" + e.getClass().getSimpleName();
                          finishProbe(r, finalCard);
                      }
                  }, "rokid-bt-probe").start();
              }

              private void finishProbe(StringBuilder r, String finalCard) {
                  lastReport = r.toString();
                  lastCard = finalCard;
                  probing = false;
                  ui.post(this::updateUi);
              }

              private void updateUi() {
                  status.setText(probing ? "PROBING BLUETOOTH" : "PROBE COMPLETE");
                  report.setText(lastReport);
                  card.setText(lastCard);
                  footer.setText("Probes: " + probeCount + " • Tap/center to run again");
              }

              private String safeDeviceName(BluetoothDevice d) {
                  try {
                      String n = d.getName();
                      return safe(n);
                  } catch (Throwable e) {
                      return "(name blocked)";
                  }
              }

              private String safeDeviceAddr(BluetoothDevice d) {
                  try {
                      String a = d.getAddress();
                      return safe(a);
                  } catch (Throwable e) {
                      return "(addr blocked)";
                  }
              }

              private String shortErr(Throwable e) {
                  if (e == null) return "(unknown)";
                  String msg = e.getMessage();
                  if (msg == null) msg = "";
                  if (msg.length() > 80) msg = msg.substring(0, 80);
                  return e.getClass().getSimpleName() + ": " + msg;
              }

              private String safe(String s) {
                  return s == null || s.length() == 0 ? "(empty)" : s;
              }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() == MotionEvent.ACTION_UP) {
                      runProbe();
                      return true;
                  }
                  return true;
              }

              @Override
              public boolean dispatchKeyEvent(KeyEvent e) {
                  if (e.getAction() == KeyEvent.ACTION_UP) {
                      int k = e.getKeyCode();
                      if (k == KeyEvent.KEYCODE_ENTER ||
                          k == KeyEvent.KEYCODE_DPAD_CENTER ||
                          k == KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE ||
                          k == KeyEvent.KEYCODE_VOLUME_UP ||
                          k == KeyEvent.KEYCODE_VOLUME_DOWN) {
                          runProbe();
                          return true;
                      }
                  }
                  return super.dispatchKeyEvent(e);
              }
          }
          EOF

      - name: Build Rokid BT Client Probe APK
        run: gradle -p rokid :app:assembleDebug --no-daemon --stacktrace

      - name: Show APK outputs and sizes
        run: |
          echo "Phone APK:"
          find phone/app/build/outputs/apk -type f -exec ls -lh {} \;
          echo "Rokid APK:"
          find rokid/app/build/outputs/apk -type f -exec ls -lh {} \;

      - name: Upload Phone BT Brain Probe APK
        uses: actions/upload-artifact@v4
        with:
          name: V15B-Phone-Bluetooth-Brain-Probe-APK
          path: phone/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Rokid BT Client Probe APK
        uses: actions/upload-artifact@v4
        with:
          name: V15B-Rokid-Bluetooth-Client-Probe-APK
          path: rokid/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
