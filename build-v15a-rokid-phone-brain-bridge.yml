name: V15A Rokid Phone Brain Bridge APKs

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build V15A Bridge APKs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Phone Local Brain Companion app
        run: |
          set -e
          mkdir -p phone/app/src/main/java/com/damage/copilot/brain
          mkdir -p phone/app/src/main/res/values

          cat > phone/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "PhoneLocalBrainCompanion"
          include ":app"
          EOF

          cat > phone/build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > phone/app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.damage.copilot.brain"
              compileSdk 35

              defaultConfig {
                  applicationId "com.damage.copilot.brain"
                  minSdk 26
                  targetSdk 28
                  versionCode 1501
                  versionName "15.0a-phone-local-brain-bridge"
              }
          }
          EOF

          cat > phone/app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Copilot Brain</string>
          </resources>
          EOF

          cat > phone/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.CopilotBrain" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowBackground">#000000</item>
                  <item name="android:fontFamily">sans</item>
              </style>
          </resources>
          EOF

          cat > phone/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              <uses-permission android:name="android.permission.CHANGE_WIFI_MULTICAST_STATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />

              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.CopilotBrain"
                  android:usesCleartextTraffic="true"
                  android:resizeableActivity="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > phone/app/src/main/java/com/damage/copilot/brain/MainActivity.java <<'EOF'
          package com.damage.copilot.brain;

          import android.app.Activity;
          import android.net.wifi.WifiManager;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.MotionEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.graphics.Color;
          import android.graphics.Typeface;

          import java.io.BufferedReader;
          import java.io.InputStream;
          import java.io.InputStreamReader;
          import java.io.OutputStream;
          import java.net.DatagramPacket;
          import java.net.DatagramSocket;
          import java.net.Inet4Address;
          import java.net.InetAddress;
          import java.net.NetworkInterface;
          import java.net.ServerSocket;
          import java.net.Socket;
          import java.nio.charset.StandardCharsets;
          import java.util.Enumeration;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private static final int HTTP_PORT = 8765;
              private static final int BEACON_PORT = 8766;

              private final Handler ui = new Handler(Looper.getMainLooper());
              private TextView status;
              private TextView details;
              private TextView lastBox;
              private TextView footer;

              private volatile boolean running = false;
              private ServerSocket serverSocket;
              private Thread serverThread;
              private Thread beaconThread;
              private WifiManager.MulticastLock multicastLock;

              private int requestCount = 0;
              private String localIp = "unknown";
              private String lastTranscript = "(none yet)";
              private String lastCard = "(none yet)";

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  buildUi();
                  startBrain();
              }

              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(24, 24, 24, 24);
                  root.setBackgroundColor(Color.BLACK);

                  TextView title = tv("COPILOT PHONE BRAIN", 24, "#00FF33", true);
                  status = tv("STARTING LOCAL SERVER", 17, "#FFFFFF", true);
                  details = tv("Preparing local bridge...", 14, "#00FF33", false);
                  lastBox = tv("Waiting for Rokid transcript.", 15, "#00FF33", true);
                  footer = tv("No cloud • no API • phone is the brain", 12, "#CCFFFFFF", false);

                  root.addView(title);
                  root.addView(status);
                  root.addView(details);
                  root.addView(lastBox);
                  root.addView(footer);
                  setContentView(root);
              }

              private TextView tv(String s, int size, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(s);
                  t.setTextSize(size);
                  t.setTextColor(Color.parseColor(color));
                  t.setGravity(Gravity.CENTER);
                  t.setPadding(0, 8, 0, 8);
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              private void startBrain() {
                  stopBrain();
                  running = true;
                  localIp = findLocalIp();
                  acquireMulticastLock();

                  serverThread = new Thread(this::serverLoop, "copilot-phone-brain-http");
                  serverThread.start();

                  beaconThread = new Thread(this::beaconLoop, "copilot-phone-brain-beacon");
                  beaconThread.start();

                  updateUi("BRAIN SERVER READY");
              }

              private void stopBrain() {
                  running = false;
                  try { if (serverSocket != null) serverSocket.close(); } catch (Throwable ignored) {}
                  serverSocket = null;
                  try { if (multicastLock != null && multicastLock.isHeld()) multicastLock.release(); } catch (Throwable ignored) {}
                  multicastLock = null;
              }

              private void acquireMulticastLock() {
                  try {
                      WifiManager wm = (WifiManager) getApplicationContext().getSystemService(WIFI_SERVICE);
                      if (wm != null) {
                          multicastLock = wm.createMulticastLock("copilot-brain-beacon");
                          multicastLock.setReferenceCounted(false);
                          multicastLock.acquire();
                      }
                  } catch (Throwable ignored) {}
              }

              private void serverLoop() {
                  try {
                      serverSocket = new ServerSocket(HTTP_PORT);
                      while (running) {
                          Socket socket = serverSocket.accept();
                          new Thread(() -> handleClient(socket), "copilot-phone-brain-client").start();
                      }
                  } catch (Throwable e) {
                      if (running) {
                          ui.post(() -> {
                              status.setText("SERVER ERROR");
                              details.setText(e.getClass().getSimpleName() + ": " + safe(e.getMessage()) + "\nTap to restart.");
                          });
                      }
                  }
              }

              private void handleClient(Socket socket) {
                  String transcript = "";
                  String responseCard;
                  try {
                      socket.setSoTimeout(5000);
                      InputStream in = socket.getInputStream();
                      OutputStream out = socket.getOutputStream();

                      BufferedReader br = new BufferedReader(new InputStreamReader(in, StandardCharsets.UTF_8));
                      String first = br.readLine();
                      if (first == null) {
                          closeQuiet(socket);
                          return;
                      }

                      int contentLength = 0;
                      String line;
                      while ((line = br.readLine()) != null) {
                          if (line.length() == 0) break;
                          String low = line.toLowerCase(Locale.US);
                          if (low.startsWith("content-length:")) {
                              try { contentLength = Integer.parseInt(line.substring(line.indexOf(":") + 1).trim()); } catch (Throwable ignored) {}
                          }
                      }

                      if (contentLength > 0) {
                          char[] buf = new char[Math.min(contentLength, 12000)];
                          int total = 0;
                          while (total < buf.length) {
                              int n = br.read(buf, total, buf.length - total);
                              if (n <= 0) break;
                              total += n;
                          }
                          transcript = new String(buf, 0, total).trim();
                      }

                      if (transcript.length() == 0 && first.startsWith("GET ")) transcript = "health check";

                      responseCard = think(transcript);
                      requestCount++;
                      lastTranscript = transcript.length() == 0 ? "(empty)" : transcript;
                      lastCard = responseCard;

                      byte[] body = responseCard.getBytes(StandardCharsets.UTF_8);
                      String headers =
                          "HTTP/1.1 200 OK\r\n" +
                          "Content-Type: text/plain; charset=utf-8\r\n" +
                          "Cache-Control: no-store\r\n" +
                          "Connection: close\r\n" +
                          "Content-Length: " + body.length + "\r\n\r\n";
                      out.write(headers.getBytes(StandardCharsets.UTF_8));
                      out.write(body);
                      out.flush();

                      ui.post(() -> updateUi("BRAIN SERVER READY"));

                  } catch (Throwable e) {
                      try {
                          OutputStream out = socket.getOutputStream();
                          String bodyText = "SOURCE: PHONE ERROR\n" + e.getClass().getSimpleName() + ": " + safe(e.getMessage());
                          byte[] body = bodyText.getBytes(StandardCharsets.UTF_8);
                          String headers = "HTTP/1.1 500 ERROR\r\nContent-Type: text/plain; charset=utf-8\r\nConnection: close\r\nContent-Length: " + body.length + "\r\n\r\n";
                          out.write(headers.getBytes(StandardCharsets.UTF_8));
                          out.write(body);
                          out.flush();
                      } catch (Throwable ignored) {}
                  } finally {
                      closeQuiet(socket);
                  }
              }

              private void beaconLoop() {
                  while (running) {
                      DatagramSocket ds = null;
                      try {
                          String msg = "COPILOT_BRAIN_V15A:" + HTTP_PORT;
                          byte[] bytes = msg.getBytes(StandardCharsets.UTF_8);
                          ds = new DatagramSocket();
                          ds.setBroadcast(true);
                          DatagramPacket packet = new DatagramPacket(bytes, bytes.length, InetAddress.getByName("255.255.255.255"), BEACON_PORT);
                          ds.send(packet);
                      } catch (Throwable ignored) {
                      } finally {
                          if (ds != null) ds.close();
                      }

                      try { Thread.sleep(2000); } catch (Throwable ignored) {}
                  }
              }

              private String think(String raw) {
                  String text = raw == null ? "" : raw.trim();
                  String low = text.toLowerCase(Locale.US);

                  if (low.length() == 0 || low.equals("health check")) return "SOURCE: PHONE\nNOTE: Phone brain is online.";

                  if ((low.contains("one plus one") && (low.contains("seven") || low.contains("7"))) || low.contains("1+1=7") || low.contains("1 + 1 = 7")) {
                      return "SOURCE: PHONE\nVERIFY: One plus one equals two, not seven.";
                  }

                  if ((low.contains("two plus two") && (low.contains("five") || low.contains("5"))) || low.contains("2+2=5") || low.contains("2 + 2 = 5")) {
                      return "SOURCE: PHONE\nVERIFY: Two plus two equals four, not five.";
                  }

                  if (containsAny(low, "always", "never", "everyone", "nobody", "guaranteed", "impossible")) {
                      return "SOURCE: PHONE\nPUSH BACK: Ask for one example or exception.";
                  }

                  if (containsAny(low, "price", "cost", "money", "dollar", "percent", "rate", "number", "amount", "fee")) {
                      return "SOURCE: PHONE\nVERIFY: Ask what number or source supports that.";
                  }

                  if (containsAny(low, "deadline", "tomorrow", "today", "schedule", "meeting", "when", "time")) {
                      return "SOURCE: PHONE\nACTION: Confirm the exact deadline or next step.";
                  }

                  if (containsAny(low, "i think", "maybe", "probably", "not sure", "guess", "assume")) {
                      return "SOURCE: PHONE\nASK: Clarify the uncertain part before agreeing.";
                  }

                  if (low.length() > 220) return "SOURCE: PHONE\nSUMMARIZE: Let me make sure I understood that.";

                  return "SOURCE: PHONE\nASK: Ask one useful follow-up question.";
              }

              private boolean containsAny(String text, String... words) {
                  for (String w : words) if (text.contains(w)) return true;
                  return false;
              }

              private void updateUi(String state) {
                  localIp = findLocalIp();
                  status.setText(state);
                  details.setText("Phone IP: " + localIp + "\nHTTP: http://" + localIp + ":" + HTTP_PORT + "/think\nBeacon: UDP " + BEACON_PORT + "\nRequests: " + requestCount);
                  lastBox.setText("LAST TRANSCRIPT\n" + tail(lastTranscript, 180) + "\n\nLAST CARD\n" + lastCard);
                  footer.setText("Keep this app open. Put phone and Rokid on same Wi-Fi/hotspot.");
              }

              private String findLocalIp() {
                  try {
                      Enumeration<NetworkInterface> interfaces = NetworkInterface.getNetworkInterfaces();
                      while (interfaces.hasMoreElements()) {
                          NetworkInterface ni = interfaces.nextElement();
                          if (!ni.isUp() || ni.isLoopback()) continue;
                          Enumeration<InetAddress> addrs = ni.getInetAddresses();
                          while (addrs.hasMoreElements()) {
                              InetAddress addr = addrs.nextElement();
                              if (addr instanceof Inet4Address && !addr.isLoopbackAddress() && !addr.isLinkLocalAddress()) return addr.getHostAddress();
                          }
                      }
                  } catch (Throwable ignored) {}
                  return "unknown";
              }

              private String tail(String s, int max) {
                  if (s == null) return "";
                  if (s.length() <= max) return s;
                  return "..." + s.substring(s.length() - max);
              }

              private String safe(String s) { return s == null ? "" : s; }
              private void closeQuiet(Socket s) { try { if (s != null) s.close(); } catch (Throwable ignored) {} }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() == MotionEvent.ACTION_UP) {
                      startBrain();
                      return true;
                  }
                  return true;
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  stopBrain();
              }
          }
          EOF

      - name: Build Phone Brain Companion APK
        run: gradle -p phone :app:assembleDebug --no-daemon --stacktrace

      - name: Generate Rokid HUD Bridge app
        run: |
          set -e
          mkdir -p rokid/app/src/main/java/com/damage/rokid/copilot
          mkdir -p rokid/app/src/main/res/values
          mkdir -p rokid/app/src/main/assets

          cat > rokid/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "RokidHudBridge"
          include ":app"
          EOF

          cat > rokid/build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > rokid/app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.damage.rokid.copilot"
              compileSdk 35

              defaultConfig {
                  applicationId "com.damage.rokid.copilot"
                  minSdk 28
                  targetSdk 28
                  versionCode 1520
                  versionName "15.0a-rokid-hud-bridge"

                  ndk {
                      abiFilters "arm64-v8a"
                  }
              }

              aaptOptions {
                  noCompress "am", "fst", "bin", "conf", "mdl", "raw", "arpa", "int"
              }
          }

          dependencies {
              implementation "net.java.dev.jna:jna:5.18.1@aar"
              implementation "com.alphacephei:vosk-android:0.3.75@aar"
          }
          EOF

          cat > rokid/app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Conversation Copilot</string>
          </resources>
          EOF

          cat > rokid/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.ConversationCopilot" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowBackground">#000000</item>
                  <item name="android:fontFamily">sans</item>
              </style>
          </resources>
          EOF

          cat > rokid/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              <uses-permission android:name="android.permission.CHANGE_WIFI_MULTICAST_STATE" />

              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <uses-feature android:name="android.hardware.microphone" android:required="false" />

              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.ConversationCopilot"
                  android:resizeableActivity="true"
                  android:extractNativeLibs="true"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:autoRemoveFromRecents="true"
                      android:excludeFromRecents="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "Downloading Vosk small English model..."
          curl -L --retry 3 -o /tmp/vosk-model-small-en-us-0.15.zip https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip
          unzip -q /tmp/vosk-model-small-en-us-0.15.zip -d /tmp/vosk-model
          mv /tmp/vosk-model/vosk-model-small-en-us-0.15 rokid/app/src/main/assets/model-en-us

          cat > rokid/app/src/main/java/com/damage/rokid/copilot/MainActivity.java <<'EOF'
          package com.damage.rokid.copilot;

          import android.Manifest;
          import android.app.Activity;
          import android.content.pm.PackageManager;
          import android.content.res.AssetManager;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.media.AudioFormat;
          import android.media.AudioRecord;
          import android.media.MediaRecorder;
          import android.net.wifi.WifiManager;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;

          import org.json.JSONObject;
          import org.vosk.LibVosk;
          import org.vosk.LogLevel;
          import org.vosk.Model;
          import org.vosk.Recognizer;

          import java.io.BufferedReader;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.io.InputStreamReader;
          import java.io.OutputStream;
          import java.net.DatagramPacket;
          import java.net.DatagramSocket;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.nio.charset.StandardCharsets;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private static final int REQ_AUDIO = 42;
              private static final int SAMPLE_RATE = 16000;
              private static final float PCM_GAIN = 2.0f;
              private static final String CURRENT_ROOT = "copilot-v15a";
              private static final String ASSET_MODEL_DIR = "model-en-us";
              private static final int BEACON_PORT = 8766;

              private TextView status, transcript, card, footer;
              private final Handler ui = new Handler(Looper.getMainLooper());

              private Model speechModel;
              private Recognizer recognizer;
              private AudioRecord recorder;
              private Thread audioThread, discoveryThread;
              private WifiManager.MulticastLock multicastLock;

              private volatile boolean ready = false;
              private volatile boolean listening = false;
              private volatile boolean discovering = false;
              private volatile boolean phoneBusy = false;

              private String phoneUrl = "";
              private String phoneIp = "";
              private String transcriptLog = "";
              private String lastPartial = "";
              private String currentCard = "SOURCE: LOCAL\nWaiting for phone brain.";
              private String fallbackCard = "SOURCE: LOCAL\nWaiting for transcript.";
              private String cleanupSummary = "";

              private long startedAt = 0L, lastUiAt = 0L, lastPhoneAt = 0L, lastBeaconAt = 0L;
              private int finalCount = 0, partialCount = 0, readCount = 0, readErrors = 0, peak = 0, sessionPeak = 0, phoneOk = 0, phoneFail = 0;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);

                  buildUi();
                  LibVosk.setLogLevel(LogLevel.WARNINGS);

                  if (checkSelfPermission(Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      status.setText("NEEDS MIC PERMISSION");
                      requestPermissions(new String[]{Manifest.permission.RECORD_AUDIO}, REQ_AUDIO);
                  } else {
                      initAsync();
                  }
              }

              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(16, 8, 16, 8);
                  root.setBackgroundColor(Color.BLACK);

                  TextView title = tv("CONVERSATION COPILOT", 22, "#00FF33", true);
                  status = tv("V15A ROKID HUD BRIDGE", 14, "#FFFFFF", true);
                  transcript = tv("Loading Vosk and looking for phone brain...", 12, "#DDFFFFFF", false);
                  card = tv("PHONE BRAIN\nStart companion app on phone.", 15, "#00FF33", true);
                  footer = tv("Rokid = mic/HUD • phone = local brain", 11, "#CCFFFFFF", false);

                  root.addView(title); root.addView(status); root.addView(transcript); root.addView(card); root.addView(footer);
                  setContentView(root);
              }

              private TextView tv(String s, int size, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(s); t.setTextSize(size); t.setTextColor(Color.parseColor(color)); t.setGravity(Gravity.CENTER); t.setPadding(0, 3, 0, 3);
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == REQ_AUDIO && grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) initAsync();
                  else {
                      status.setText("MIC PERMISSION DENIED");
                      transcript.setText("Microphone permission is required.");
                      card.setText("Permission blocked.");
                  }
              }

              private void initAsync() {
                  status.setText("LOADING HUD BRIDGE");
                  transcript.setText("Cleaning old LLM copies and loading Vosk.\nPhone brain handles thinking.");

                  new Thread(() -> {
                      try {
                          cleanupSummary = cleanupOldBuilds();
                          File root = new File(getFilesDir(), CURRENT_ROOT);
                          File speechDir = new File(root, "vosk-model-en-us");
                          File marker = new File(speechDir, ".speech_ready_v15a");

                          if (!marker.exists()) {
                              deleteRecursive(speechDir);
                              speechDir.mkdirs();
                              copyAssetDir(getAssets(), ASSET_MODEL_DIR, speechDir);
                              marker.createNewFile();
                          }

                          speechModel = new Model(speechDir.getAbsolutePath());
                          recognizer = new Recognizer(speechModel, SAMPLE_RATE);
                          recognizer.setWords(false);

                          ui.post(() -> {
                              ready = true;
                              status.setText("READY: HUD BRIDGE");
                              transcript.setText("Vosk ready.\n" + cleanupSummary + "\nWaiting for phone beacon.");
                              card.setText("PHONE BRAIN\nOpen companion app on phone.");
                              startDiscovery();
                              startListening();
                          });
                      } catch (Throwable e) {
                          ui.post(() -> {
                              status.setText("LOAD FAILED");
                              transcript.setText(e.getClass().getSimpleName() + "\n" + safe(e.getMessage()) + "\n\n" + cleanupSummary);
                              card.setText("Run cleaner or reinstall.");
                          });
                      }
                  }, "copilot-v15a-init").start();
              }

              static class CleanupStats { long bytes = 0L; int files = 0; int failed = 0; }

              private String cleanupOldBuilds() {
                  CleanupStats s = new CleanupStats();
                  safeDeleteChildren(getCacheDir(), s); safeDeleteChildren(getCodeCacheDir(), s); safeDeleteChildren(getNoBackupFilesDir(), s);
                  File files = getFilesDir();
                  String[] legacy = {"vosk-model-en-us", "local-brain", "models", "model-en-us", "brain.gguf", "llama-cli", "llama-runner", "llama-lib"};
                  for (String n : legacy) deleteTarget(new File(files, n), s);
                  File[] kids = files.listFiles();
                  if (kids != null) for (File k : kids) {
                      String n = k.getName();
                      if (n.startsWith("copilot-v") && !n.equals(CURRENT_ROOT)) deleteTarget(k, s);
                  }
                  return "Cleanup: " + humanBytes(s.bytes) + " / " + s.files + " files / failed " + s.failed;
              }

              private void safeDeleteChildren(File dir, CleanupStats s) { if (dir == null || !dir.exists() || !dir.isDirectory()) return; File[] kids = dir.listFiles(); if (kids != null) for (File k : kids) deleteTarget(k, s); }
              private void deleteTarget(File f, CleanupStats s) { if (f == null || !f.exists()) return; if (f.isDirectory()) { File[] kids = f.listFiles(); if (kids != null) for (File k : kids) deleteTarget(k, s); } long len = sizeOf(f); if (f.delete()) { s.bytes += len; s.files++; } else if (f.exists()) s.failed++; }
              private long sizeOf(File f) { try { if (f == null || !f.exists()) return 0L; if (f.isFile()) return Math.max(0L, f.length()); long total = 0L; File[] kids = f.listFiles(); if (kids != null) for (File k : kids) total += sizeOf(k); return total; } catch (Throwable ignored) { return 0L; } }
              private String humanBytes(long bytes) { double b = (double)Math.max(0L, bytes); String[] u = {"B", "KB", "MB", "GB"}; int i = 0; while (b >= 1024.0 && i < u.length - 1) { b /= 1024.0; i++; } return String.format(Locale.US, "%.1f %s", b, u[i]); }

              private void startDiscovery() {
                  if (discovering) return;
                  discovering = true;
                  acquireMulticastLock();

                  discoveryThread = new Thread(() -> {
                      DatagramSocket socket = null;
                      try {
                          socket = new DatagramSocket(BEACON_PORT);
                          socket.setBroadcast(true);
                          byte[] buf = new byte[256];

                          while (discovering) {
                              DatagramPacket packet = new DatagramPacket(buf, buf.length);
                              socket.receive(packet);
                              String msg = new String(packet.getData(), 0, packet.getLength(), StandardCharsets.UTF_8).trim();

                              if (msg.startsWith("COPILOT_BRAIN_V15A:")) {
                                  String port = msg.substring("COPILOT_BRAIN_V15A:".length()).trim();
                                  phoneIp = packet.getAddress().getHostAddress();
                                  phoneUrl = "http://" + phoneIp + ":" + port + "/think";
                                  lastBeaconAt = System.currentTimeMillis();
                                  ui.post(() -> {
                                      status.setText("PHONE BRAIN FOUND");
                                      currentCard = "SOURCE: PHONE\nBrain linked: " + phoneIp;
                                      updateHud();
                                  });
                              }
                          }
                      } catch (Throwable e) {
                          if (discovering) ui.post(() -> { status.setText("DISCOVERY ERROR"); currentCard = "SOURCE: LOCAL\nDiscovery failed: " + e.getClass().getSimpleName(); updateHud(); });
                      } finally {
                          if (socket != null) socket.close();
                      }
                  }, "copilot-v15a-phone-discovery");
                  discoveryThread.start();
              }

              private void acquireMulticastLock() {
                  try {
                      WifiManager wm = (WifiManager) getApplicationContext().getSystemService(WIFI_SERVICE);
                      if (wm != null) {
                          multicastLock = wm.createMulticastLock("copilot-rokid-discovery");
                          multicastLock.setReferenceCounted(false);
                          multicastLock.acquire();
                      }
                  } catch (Throwable ignored) {}
              }

              private void startListening() {
                  if (!ready || speechModel == null || recognizer == null || listening) return;
                  try {
                      int min = AudioRecord.getMinBufferSize(SAMPLE_RATE, AudioFormat.CHANNEL_IN_MONO, AudioFormat.ENCODING_PCM_16BIT);
                      int bufferSize = Math.max(min * 2, SAMPLE_RATE);
                      recorder = new AudioRecord(MediaRecorder.AudioSource.MIC, SAMPLE_RATE, AudioFormat.CHANNEL_IN_MONO, AudioFormat.ENCODING_PCM_16BIT, bufferSize);
                      if (recorder.getState() != AudioRecord.STATE_INITIALIZED) throw new RuntimeException("AudioRecord not initialized");

                      resetSessionStats();
                      listening = true;
                      startedAt = System.currentTimeMillis();
                      recorder.startRecording();
                      audioThread = new Thread(this::audioLoop, "copilot-v15a-audio-vosk");
                      audioThread.start();

                      status.setText(phoneUrl.length() > 0 ? "LISTENING + PHONE LINK" : "LISTENING OFFLINE");
                      footer.setText("Vosk local → phone brain → Rokid HUD");
                  } catch (Throwable e) {
                      status.setText("AUDIO START FAILED");
                      transcript.setText(e.getClass().getSimpleName() + "\n" + safe(e.getMessage()));
                      card.setText("Mic route failed.");
                      cleanupRecorder();
                  }
              }

              private void resetSessionStats() {
                  transcriptLog = ""; lastPartial = "";
                  currentCard = phoneUrl.length() > 0 ? "SOURCE: PHONE\nReady." : "SOURCE: LOCAL\nWaiting for phone brain.";
                  fallbackCard = "SOURCE: LOCAL\nWaiting for transcript.";
                  finalCount = partialCount = readCount = readErrors = peak = sessionPeak = phoneOk = phoneFail = 0;
                  lastUiAt = lastPhoneAt = 0L;
              }

              private void audioLoop() {
                  byte[] raw = new byte[4096];
                  byte[] boosted = new byte[4096];

                  while (listening && recorder != null) {
                      int n;
                      try { n = recorder.read(raw, 0, raw.length); } catch (Throwable e) { readErrors++; postHud(); continue; }
                      if (n <= 0) { readErrors++; postHud(); continue; }

                      readCount++;
                      applyGainAndMeasure(raw, boosted, n);

                      try {
                          boolean finalReady = recognizer.acceptWaveForm(boosted, n);
                          if (finalReady) {
                              String text = extract(recognizer.getResult(), "text");
                              if (text.length() > 0) { finalCount++; lastPartial = ""; appendTranscript(text); updateFallbackCard(); sendToPhoneMaybe(); }
                          } else {
                              String text = extract(recognizer.getPartialResult(), "partial");
                              if (text.length() > 0) { partialCount++; lastPartial = text; updateFallbackCard(); }
                          }
                      } catch (Throwable ignored) {}

                      long now = System.currentTimeMillis();
                      if (now - lastUiAt > 250) { lastUiAt = now; postHud(); }
                  }

                  try {
                      String text = extract(recognizer.getFinalResult(), "text");
                      if (text.length() > 0) { finalCount++; appendTranscript(text); updateFallbackCard(); sendToPhoneMaybe(); }
                  } catch (Throwable ignored) {}

                  postHud();
              }

              private void sendToPhoneMaybe() {
                  if (phoneBusy) return;
                  String text = transcriptLog.trim();
                  if (text.length() < 8) return;

                  long now = System.currentTimeMillis();
                  if (now - lastPhoneAt < 2500L) return;
                  lastPhoneAt = now;

                  if (phoneUrl == null || phoneUrl.length() == 0) { currentCard = fallbackCard; return; }

                  phoneBusy = true;
                  currentCard = "SOURCE: PHONE\nThinking...";
                  postHud();

                  final String payload = tail(text, 1200);
                  final String url = phoneUrl;

                  new Thread(() -> {
                      String response;
                      boolean ok = false;
                      try {
                          response = postText(url, payload);
                          ok = response.length() > 0;
                      } catch (Throwable e) {
                          response = "SOURCE: LOCAL\nPhone error: " + e.getClass().getSimpleName();
                      }

                      final String finalResponse = ok ? response : fallbackCard;
                      final boolean finalOk = ok;
                      ui.post(() -> {
                          phoneBusy = false;
                          if (finalOk) phoneOk++; else phoneFail++;
                          currentCard = cleanCard(finalResponse);
                          updateHud();
                      });
                  }, "copilot-v15a-phone-post").start();
              }

              private String postText(String urlText, String payload) throws Exception {
                  URL url = new URL(urlText);
                  HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                  conn.setRequestMethod("POST");
                  conn.setConnectTimeout(1800);
                  conn.setReadTimeout(5000);
                  conn.setDoOutput(true);
                  conn.setRequestProperty("Content-Type", "text/plain; charset=utf-8");

                  byte[] body = payload.getBytes(StandardCharsets.UTF_8);
                  conn.setRequestProperty("Content-Length", String.valueOf(body.length));
                  try (OutputStream out = conn.getOutputStream()) { out.write(body); }

                  int code = conn.getResponseCode();
                  InputStream in = code >= 200 && code < 300 ? conn.getInputStream() : conn.getErrorStream();
                  if (in == null) return "";

                  StringBuilder b = new StringBuilder();
                  try (BufferedReader br = new BufferedReader(new InputStreamReader(in, StandardCharsets.UTF_8))) {
                      String line;
                      while ((line = br.readLine()) != null) {
                          b.append(line).append("\n");
                          if (b.length() > 2000) break;
                      }
                  }
                  conn.disconnect();
                  return b.toString().trim();
              }

              private String cleanCard(String s) { if (s == null || s.trim().length() == 0) return fallbackCard; s = s.trim(); if (s.length() > 260) s = s.substring(0, 260); return s; }

              private void updateFallbackCard() {
                  String low = (transcriptLog + " " + lastPartial).toLowerCase(Locale.US).trim();

                  if (low.length() < 8) fallbackCard = "SOURCE: LOCAL\nWaiting for transcript.";
                  else if ((low.contains("one plus one") && (low.contains("seven") || low.contains("7"))) || low.contains("1+1=7") || low.contains("1 + 1 = 7")) fallbackCard = "SOURCE: LOCAL\nVERIFY: One plus one equals two.";
                  else if (containsAny(low, "price", "cost", "money", "dollar", "percent", "rate", "number", "amount", "fee")) fallbackCard = "SOURCE: LOCAL\nVERIFY: Ask what number supports that.";
                  else if (containsAny(low, "always", "never", "everyone", "nobody", "guaranteed", "impossible")) fallbackCard = "SOURCE: LOCAL\nPUSH BACK: Ask for one exception.";
                  else if (containsAny(low, "deadline", "tomorrow", "today", "schedule", "meeting", "when", "time")) fallbackCard = "SOURCE: LOCAL\nACTION: Confirm the next step.";
                  else fallbackCard = "SOURCE: LOCAL\nASK: Ask one useful follow-up.";

                  if (phoneUrl == null || phoneUrl.length() == 0) currentCard = fallbackCard;
              }

              private boolean containsAny(String text, String... words) { for (String w : words) if (text.contains(w)) return true; return false; }

              private void applyGainAndMeasure(byte[] src, byte[] dst, int len) {
                  int p = 0;
                  for (int i = 0; i + 1 < len; i += 2) {
                      int lo = src[i] & 0xff;
                      int hi = src[i + 1];
                      int sample = (hi << 8) | lo;
                      if (sample > 32767) sample -= 65536;
                      int abs = Math.abs(sample);
                      if (abs > p) p = abs;

                      int boosted = Math.round(sample * PCM_GAIN);
                      if (boosted > 32767) boosted = 32767;
                      else if (boosted < -32768) boosted = -32768;

                      dst[i] = (byte)(boosted & 0xff);
                      dst[i + 1] = (byte)((boosted >> 8) & 0xff);
                  }
                  if ((len & 1) == 1) dst[len - 1] = src[len - 1];
                  peak = p;
                  if (peak > sessionPeak) sessionPeak = peak;
              }

              private void postHud() { ui.post(this::updateHud); }

              private void updateHud() {
                  long seconds = startedAt == 0L ? 0L : (System.currentTimeMillis() - startedAt) / 1000L;
                  long beaconAge = lastBeaconAt == 0L ? -1L : (System.currentTimeMillis() - lastBeaconAt) / 1000L;

                  transcript.setText("TRANSCRIPT\n" + (transcriptLog.length() == 0 ? "(waiting for final words)" : transcriptLog) + "\n\nLIVE\n" + (lastPartial.length() == 0 ? "(listening...)" : lastPartial));

                  String signal;
                  if (finalCount > 0 || partialCount > 0) signal = "TEXT OK";
                  else if (sessionPeak > 800) signal = "AUDIO OK";
                  else if (readCount > 10) signal = "QUIET";
                  else signal = "STARTING";

                  String link = phoneUrl.length() > 0 ? "PHONE " + phoneIp + " age=" + beaconAge + "s" : "NO PHONE";
                  footer.setText(signal + " • " + link + " • ok=" + phoneOk + " fail=" + phoneFail + " • " + seconds + "s • P=" + peak + " maxP=" + sessionPeak);
                  card.setText(currentCard == null || currentCard.trim().length() == 0 ? fallbackCard : currentCard);
              }

              private void appendTranscript(String text) {
                  if (text == null || text.trim().isEmpty()) return;
                  transcriptLog = (transcriptLog + "\n" + text.trim()).trim();
                  if (transcriptLog.length() > 900) {
                      transcriptLog = transcriptLog.substring(transcriptLog.length() - 900);
                      int firstBreak = transcriptLog.indexOf('\n');
                      if (firstBreak > 0) transcriptLog = transcriptLog.substring(firstBreak + 1);
                  }
              }

              private String extract(String json, String key) {
                  try {
                      JSONObject obj = new JSONObject(json == null ? "{}" : json);
                      String value = obj.optString(key, "");
                      return value == null ? "" : value.trim();
                  } catch (Throwable ignored) {
                      return "";
                  }
              }

              private void stopListening() {
                  listening = false;
                  try { if (recorder != null) recorder.stop(); } catch (Throwable ignored) {}
                  cleanupRecorder();
                  status.setText("STOPPED");
                  footer.setText("Tap/center = start • phone brain bridge");
                  updateHud();
              }

              private void cleanupRecorder() { try { if (recorder != null) recorder.release(); } catch (Throwable ignored) {} recorder = null; }

              private void closeModels() {
                  try { if (recognizer != null) { recognizer.close(); recognizer = null; } } catch (Throwable ignored) {}
                  try { if (speechModel != null) { speechModel.close(); speechModel = null; } } catch (Throwable ignored) {}
              }

              private void toggleListening() {
                  if (!ready) { Toast.makeText(this, "Still loading", Toast.LENGTH_SHORT).show(); return; }
                  if (listening) stopListening(); else startListening();
              }

              private void copyAssetDir(AssetManager am, String assetPath, File destDir) throws Exception {
                  String[] items = am.list(assetPath);
                  if (items == null || items.length == 0) { copyAssetFile(am, assetPath, destDir); return; }
                  if (!destDir.exists()) destDir.mkdirs();

                  for (String item : items) {
                      String childAssetPath = assetPath + "/" + item;
                      File childDest = new File(destDir, item);
                      String[] childItems = am.list(childAssetPath);
                      if (childItems != null && childItems.length > 0) copyAssetDir(am, childAssetPath, childDest);
                      else copyAssetFile(am, childAssetPath, childDest);
                  }
              }

              private void copyAssetFile(AssetManager am, String assetPath, File destFile) throws Exception {
                  File parent = destFile.getParentFile();
                  if (parent != null && !parent.exists()) parent.mkdirs();
                  try (InputStream in = am.open(assetPath); OutputStream out = new FileOutputStream(destFile)) {
                      byte[] buf = new byte[8192];
                      int len;
                      while ((len = in.read(buf)) > 0) out.write(buf, 0, len);
                  }
              }

              private void deleteRecursive(File f) { if (f == null || !f.exists()) return; if (f.isDirectory()) { File[] kids = f.listFiles(); if (kids != null) for (File k : kids) deleteRecursive(k); } f.delete(); }
              private String tail(String s, int max) { if (s == null) return ""; if (s.length() <= max) return s; return s.substring(s.length() - max); }
              private String safe(String s) { return s == null ? "" : s; }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() == MotionEvent.ACTION_UP) { toggleListening(); return true; }
                  return true;
              }

              @Override
              public boolean dispatchKeyEvent(KeyEvent e) {
                  if (e.getAction() == KeyEvent.ACTION_UP) {
                      int k = e.getKeyCode();
                      if (k == KeyEvent.KEYCODE_ENTER || k == KeyEvent.KEYCODE_DPAD_CENTER || k == KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE || k == KeyEvent.KEYCODE_VOLUME_UP || k == KeyEvent.KEYCODE_VOLUME_DOWN) {
                          toggleListening();
                          return true;
                      }
                  }
                  return super.dispatchKeyEvent(e);
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  listening = false;
                  discovering = false;
                  cleanupRecorder();
                  closeModels();
                  try { if (multicastLock != null && multicastLock.isHeld()) multicastLock.release(); } catch (Throwable ignored) {}
              }
          }
          EOF

      - name: Build Rokid HUD Bridge APK
        run: gradle -p rokid :app:assembleDebug --no-daemon --stacktrace

      - name: Show APK outputs and sizes
        run: |
          echo "Phone APK:"
          find phone/app/build/outputs/apk -type f -exec ls -lh {} \;
          echo "Rokid APK:"
          find rokid/app/build/outputs/apk -type f -exec ls -lh {} \;

      - name: Enforce Rokid APK under 300MB
        run: |
          APK="$(find rokid/app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          SIZE="$(stat -c%s "$APK")"
          LIMIT="$((300 * 1024 * 1024))"
          echo "Rokid APK size bytes: $SIZE"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "Rokid APK is over 300MB limit"
            exit 1
          fi

      - name: Upload Phone Brain APK
        uses: actions/upload-artifact@v4
        with:
          name: V15A-Phone-Local-Brain-Companion-APK
          path: phone/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Rokid HUD Bridge APK
        uses: actions/upload-artifact@v4
        with:
          name: V15A-Rokid-HUD-Bridge-APK
          path: rokid/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
