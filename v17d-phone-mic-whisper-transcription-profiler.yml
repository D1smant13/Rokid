name: V17D Phone Mic Whisper Transcription Profiler

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  WHISPER_CPP_COMMIT: "7695a5331230c585f5ce92291c4256973985ae5a"
  LLAMA_CPP_COMMIT: "3e706dd55f56f59126c053c3db9cfc219a0a7074"
  ANDROID_COMPILE_SDK: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK_VERSION: "29.0.13113456"
  ANDROID_CMAKE_VERSION: "3.31.6"

jobs:
  build:
    name: Build phone microphone transcription profiler
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out workflow repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Initialize or restore permanent Android signing key
        shell: bash
        env:
          SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          umask 077

          if [ -z "${SIGNING_KEY_PASSPHRASE:-}" ]; then
            echo "Missing repository secret: SIGNING_KEY_PASSPHRASE"
            exit 1
          fi

          if [ "${#SIGNING_KEY_PASSPHRASE}" -lt 16 ]; then
            echo "SIGNING_KEY_PASSPHRASE must be at least 16 characters."
            exit 1
          fi

          KEYSTORE="${RUNNER_TEMP}/rokid-release.jks"
          ENCRYPTED_KEY="signing/rokid-release.jks.gpg"
          CERT_INFO="signing/rokid-release-certificate.txt"

          mkdir -p signing

          if [ -f "${ENCRYPTED_KEY}" ]; then
            echo "Restoring the existing permanent signing key."

            gpg \
              --batch \
              --yes \
              --pinentry-mode loopback \
              --passphrase "${SIGNING_KEY_PASSPHRASE}" \
              --output "${KEYSTORE}" \
              --decrypt "${ENCRYPTED_KEY}"
          else
            echo "Creating the permanent signing key."

            keytool -genkeypair \
              -keystore "${KEYSTORE}" \
              -storetype JKS \
              -storepass "${SIGNING_KEY_PASSPHRASE}" \
              -keypass "${SIGNING_KEY_PASSPHRASE}" \
              -alias rokid-release \
              -keyalg RSA \
              -keysize 4096 \
              -validity 10000 \
              -dname "CN=Kyle Medcalf, OU=Private Android Development, O=UTS, L=Cincinnati, ST=Ohio, C=US"

            gpg \
              --batch \
              --yes \
              --pinentry-mode loopback \
              --passphrase "${SIGNING_KEY_PASSPHRASE}" \
              --symmetric \
              --cipher-algo AES256 \
              --s2k-mode 3 \
              --s2k-digest-algo SHA512 \
              --s2k-count 65011712 \
              --output "${ENCRYPTED_KEY}" \
              "${KEYSTORE}"

            keytool -list -v \
              -keystore "${KEYSTORE}" \
              -storepass "${SIGNING_KEY_PASSPHRASE}" \
              -alias rokid-release \
              > "${CERT_INFO}"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add "${ENCRYPTED_KEY}" "${CERT_INFO}"
            git commit -m "Add encrypted permanent Android signing key"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

          keytool -list \
            -keystore "${KEYSTORE}" \
            -storepass "${SIGNING_KEY_PASSPHRASE}" \
            -alias rokid-release \
            >/dev/null

          chmod 600 "${KEYSTORE}"

          echo "ANDROID_KEYSTORE_PATH=${KEYSTORE}" >> "${GITHUB_ENV}"
          echo "ANDROID_KEY_ALIAS=rokid-release" >> "${GITHUB_ENV}"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build dependencies
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git \
            gnupg \
            ninja-build \
            unzip

          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          LICENSE_STATUS="${PIPESTATUS[1]}"
          set -o pipefail

          if [ "${LICENSE_STATUS}" -ne 0 ]; then
            echo "sdkmanager --licenses failed with exit code ${LICENSE_STATUS}"
            exit "${LICENSE_STATUS}"
          fi

          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Fetch pinned Android native sources
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf llama.cpp whisper.cpp

          git init llama.cpp
          git -C llama.cpp remote add origin https://github.com/ggml-org/llama.cpp.git
          git -C llama.cpp fetch --depth 1 origin "${LLAMA_CPP_COMMIT}"
          git -C llama.cpp checkout --detach FETCH_HEAD

          git init whisper.cpp
          git -C whisper.cpp remote add origin https://github.com/ggml-org/whisper.cpp.git
          git -C whisper.cpp fetch --depth 1 origin "${WHISPER_CPP_COMMIT}"
          git -C whisper.cpp checkout --detach FETCH_HEAD

          test -f llama.cpp/examples/llama.android/gradlew
          test -f whisper.cpp/examples/whisper.android/lib/build.gradle
          test -f whisper.cpp/examples/whisper.android/lib/src/main/java/com/whispercpp/whisper/LibWhisper.kt
          test -f whisper.cpp/examples/whisper.android/lib/src/main/jni/whisper/CMakeLists.txt

          echo "llama.cpp:"
          git -C llama.cpp rev-parse HEAD

          echo "whisper.cpp:"
          git -C whisper.cpp rev-parse HEAD

      - name: Add official whisper.cpp Android library to the project
        shell: bash
        run: |
          set -euxo pipefail

          SETTINGS="llama.cpp/examples/llama.android/settings.gradle.kts"
          WHISPER_GRADLE="whisper.cpp/examples/whisper.android/lib/build.gradle"

          cat >> "${SETTINGS}" <<'EOF'

          include(":whisperlib")
          project(":whisperlib").projectDir =
              file("../../../whisper.cpp/examples/whisper.android/lib")
          EOF

          python3 - <<'PY'
          from pathlib import Path

          path = Path(
              "whisper.cpp/examples/whisper.android/lib/build.gradle"
          )
          text = path.read_text(encoding="utf-8")

          replacements = {
              "compileSdk 34": "compileSdk 36",
              "minSdk 26": "minSdk 33",
              "targetSdk 34": "targetSdk 36",
              "abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86', 'x86_64'":
                  "abiFilters 'arm64-v8a'",
              "sourceCompatibility JavaVersion.VERSION_1_8":
                  "sourceCompatibility JavaVersion.VERSION_17",
              "targetCompatibility JavaVersion.VERSION_1_8":
                  "targetCompatibility JavaVersion.VERSION_17",
              "jvmTarget = '1.8'": "jvmTarget = '17'",
              'ndkVersion "25.2.9519653"':
                  'ndkVersion "29.0.13113456"',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(
                      f"Expected Whisper Gradle text not found: {old}"
                  )
              text = text.replace(old, new, 1)

          old_cmake = '''        cmake {
              path = file("src/main/jni/whisper/CMakeLists.txt")
          }'''
          new_cmake = '''        cmake {
              path = file("src/main/jni/whisper/CMakeLists.txt")
              version "3.31.6"
          }'''

          if old_cmake not in text:
              raise SystemExit("Expected Whisper CMake block was not found.")

          path.write_text(
              text.replace(old_cmake, new_cmake, 1),
              encoding="utf-8",
          )
          PY

          tail -10 "${SETTINGS}"
          grep -nE \
            "compileSdk|minSdk|targetSdk|abiFilters|ndkVersion|jvmTarget|version \"3.31.6\"" \
            "${WHISPER_GRADLE}"

      - name: Generate V17D signed phone transcription profiler
        shell: bash
        run: |
          set -euxo pipefail

          PROJECT="llama.cpp/examples/llama.android"
          APP="${PROJECT}/app"
          SOURCE="${APP}/src/main/java/com/example/llama/MainActivity.kt"

          cat > "${APP}/build.gradle.kts" <<'EOF'
          plugins {
              alias(libs.plugins.android.application)
              alias(libs.plugins.jetbrains.kotlin.android)
          }

          android {
              namespace = "com.example.llama"
              compileSdk = 36

              signingConfigs {
                  create("permanent") {
                      storeFile = file(
                          System.getenv("ANDROID_KEYSTORE_PATH")
                      )
                      storePassword =
                          System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias =
                          System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword =
                          System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }

              defaultConfig {
                  applicationId = "com.damage.v17b.qwen3proof"
                  minSdk = 33
                  targetSdk = 36

                  versionCode = 1704
                  versionName = "17.0d-phone-mic-whisper-profiler"

                  ndk {
                      abiFilters += listOf("arm64-v8a")
                  }

                  vectorDrawables {
                      useSupportLibrary = true
                  }
              }

              buildTypes {
                  debug {
                      signingConfig =
                          signingConfigs.getByName("permanent")
                      isMinifyEnabled = false
                      isShrinkResources = false
                  }

                  release {
                      signingConfig =
                          signingConfigs.getByName("permanent")
                      isMinifyEnabled = false
                      isShrinkResources = false
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlin {
                  jvmToolchain(17)
              }

              packaging {
                  jniLibs {
                      useLegacyPackaging = true
                  }
                  resources {
                      excludes += "/META-INF/{AL2.0,LGPL2.1}"
                  }
              }
          }

          dependencies {
              implementation(libs.bundles.androidx)
              implementation(libs.material)
              implementation(project(":whisperlib"))
          }
          EOF

          cat > "${APP}/src/main/AndroidManifest.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />

              <application
                  android:allowBackup="false"
                  android:extractNativeLibs="true"
                  android:hardwareAccelerated="true"
                  android:label="@string/app_name"
                  android:largeHeap="true"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.DayNight.NoActionBar"
                  android:usesCleartextTraffic="false">

                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|keyboard|uiMode|density"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:screenOrientation="portrait">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > "${APP}/src/main/res/values/strings.xml" <<'EOF'
          <resources>
              <string name="app_name">V17D Phone Mic Profiler</string>
          </resources>
          EOF

          cat > "${SOURCE}" <<'EOF'
          package com.example.llama

          import android.Manifest
          import android.annotation.SuppressLint
          import android.content.Context
          import android.content.pm.PackageManager
          import android.graphics.Color
          import android.graphics.Typeface
          import android.media.AudioDeviceInfo
          import android.media.AudioFormat
          import android.media.AudioManager
          import android.media.AudioRecord
          import android.media.MediaRecorder
          import android.os.Bundle
          import android.os.SystemClock
          import android.view.Gravity
          import android.view.View
          import android.view.WindowManager
          import android.widget.ArrayAdapter
          import android.widget.Button
          import android.widget.FrameLayout
          import android.widget.LinearLayout
          import android.widget.ScrollView
          import android.widget.Spinner
          import android.widget.TextView
          import android.widget.Toast
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AlertDialog
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.content.ContextCompat
          import androidx.lifecycle.lifecycleScope
          import com.whispercpp.whisper.WhisperContext
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.Job
          import kotlinx.coroutines.launch
          import kotlinx.coroutines.runBlocking
          import kotlinx.coroutines.withContext
          import java.io.File
          import java.io.RandomAccessFile
          import java.net.HttpURLConnection
          import java.net.URL
          import java.util.Locale
          import java.util.concurrent.atomic.AtomicBoolean
          import kotlin.math.abs
          import kotlin.math.log10
          import kotlin.math.sqrt

          class MainActivity : AppCompatActivity() {

              private data class AudioProfile(
                  val label: String,
                  val source: Int
              )

              private data class CaptureResult(
                  val samples: FloatArray,
                  val durationMs: Long,
                  val profile: AudioProfile,
                  val preferredRouteAccepted: Boolean,
                  val logicalDevice: String,
                  val activeMics: String
              )

              private val profiles = listOf(
                  AudioProfile(
                      "VOICE_RECOGNITION — processed speech",
                      MediaRecorder.AudioSource.VOICE_RECOGNITION
                  ),
                  AudioProfile(
                      "MIC — standard phone input",
                      MediaRecorder.AudioSource.MIC
                  ),
                  AudioProfile(
                      "UNPROCESSED — raw when supported",
                      MediaRecorder.AudioSource.UNPROCESSED
                  ),
                  AudioProfile(
                      "CAMCORDER — possible far-field profile",
                      MediaRecorder.AudioSource.CAMCORDER
                  )
              )

              private lateinit var statusView: TextView
              private lateinit var modelInfoView: TextView
              private lateinit var profileSpinner: Spinner
              private lateinit var levelView: TextView
              private lateinit var routeView: TextView
              private lateinit var modelButton: Button
              private lateinit var recordButton: Button
              private lateinit var deleteWhisperButton: Button
              private lateinit var transcriptView: TextView

              private var whisperContext: WhisperContext? = null
              private var modelReady = false

              private var operationJob: Job? = null
              private var recordingJob: Job? = null
              private var transcriptionJob: Job? = null

              private var activeAudioRecord: AudioRecord? = null
              private val stopRequested = AtomicBoolean(false)
              private var isRecording = false

              private val microphonePermissionLauncher =
                  registerForActivityResult(
                      ActivityResultContracts.RequestPermission()
                  ) { granted ->
                      if (granted) {
                          startRecording()
                      } else {
                          statusView.text = "MICROPHONE PERMISSION DENIED"
                          Toast.makeText(
                              this,
                              "Microphone permission is required.",
                              Toast.LENGTH_LONG
                          ).show()
                      }
                  }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  window.addFlags(
                      WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON
                  )

                  buildScreen()
                  showInitialState()
              }

              private fun buildScreen() {
                  val root = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      gravity = Gravity.CENTER_HORIZONTAL
                      setPadding(dp(16), dp(12), dp(16), dp(12))
                      setBackgroundColor(Color.BLACK)
                  }

                  root.addView(label(
                      "V17D PHONE MIC + WHISPER PROFILER",
                      20f,
                      "#00FF33",
                      true,
                      Gravity.CENTER
                  ))

                  statusView = label(
                      "CHECKING LOCAL MODELS",
                      17f,
                      "#FFFFFF",
                      true,
                      Gravity.CENTER
                  )
                  root.addView(statusView)

                  modelInfoView = label(
                      "Whisper small.en Q5 • local transcription",
                      13f,
                      "#B8FFBF",
                      false,
                      Gravity.CENTER
                  )
                  root.addView(modelInfoView)

                  profileSpinner = Spinner(this).apply {
                      adapter = ArrayAdapter(
                          this@MainActivity,
                          android.R.layout.simple_spinner_dropdown_item,
                          profiles.map { it.label }
                      )
                      isEnabled = false
                  }
                  root.addView(
                      profileSpinner,
                      LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                      ).apply {
                          topMargin = dp(6)
                          bottomMargin = dp(6)
                      }
                  )

                  levelView = label(
                      "INPUT LEVEL: waiting",
                      15f,
                      "#FFFFFF",
                      true,
                      Gravity.CENTER
                  )
                  root.addView(levelView)

                  routeView = label(
                      "ROUTE: not recording",
                      12f,
                      "#B8FFBF",
                      false,
                      Gravity.START
                  )
                  root.addView(routeView)

                  modelButton = Button(this)
                  root.addView(modelButton, fullWidthButtonParams())

                  recordButton = Button(this).apply {
                      text = "START 30-SECOND MAX RECORDING"
                      isEnabled = false
                      setOnClickListener {
                          if (isRecording) {
                              stopRecording()
                          } else {
                              requestPermissionAndRecord()
                          }
                      }
                  }
                  root.addView(recordButton, fullWidthButtonParams())

                  deleteWhisperButton = Button(this).apply {
                      text = "DELETE WHISPER MODEL"
                      isEnabled = false
                      setOnClickListener { confirmDeleteWhisperModel() }
                  }
                  root.addView(
                      deleteWhisperButton,
                      fullWidthButtonParams()
                  )

                  transcriptView = label(
                      "TRANSCRIPT\n\nWaiting for a recording.",
                      16f,
                      "#00FF33",
                      true,
                      Gravity.START
                  ).apply {
                      setTextIsSelectable(true)
                  }

                  val outputScroll = ScrollView(this).apply {
                      isFillViewport = true
                      addView(
                          transcriptView,
                          FrameLayout.LayoutParams(
                              FrameLayout.LayoutParams.MATCH_PARENT,
                              FrameLayout.LayoutParams.WRAP_CONTENT
                          )
                      )
                  }

                  root.addView(
                      outputScroll,
                      LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          0,
                          1f
                      ).apply {
                          topMargin = dp(8)
                      }
                  )

                  root.addView(label(
                      "Phone built-in mic preferred • 16 kHz mono • " +
                          "Qwen model files are not modified",
                      11f,
                      "#777777",
                      false,
                      Gravity.CENTER
                  ))

                  setContentView(root)
              }

              private fun fullWidthButtonParams() =
                  LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT,
                      LinearLayout.LayoutParams.WRAP_CONTENT
                  ).apply {
                      topMargin = dp(4)
                      bottomMargin = dp(4)
                  }

              private fun showInitialState() {
                  val whisperModel = whisperModelFile()
                  val partial = whisperPartialFile()
                  val qwenModel = qwenModelFile()

                  modelReady = false
                  profileSpinner.isEnabled = false
                  recordButton.isEnabled = false

                  deleteWhisperButton.isEnabled =
                      whisperModel.exists() || partial.exists()

                  val qwenStatus =
                      if (qwenModel.exists()) {
                          "Qwen preserved: ${formatGiB(qwenModel.length())}"
                      } else {
                          "Qwen model not currently present"
                      }

                  when {
                      isValidWhisperModel(whisperModel) -> {
                          statusView.text = "WHISPER MODEL FOUND"
                          modelInfoView.text =
                              "Whisper: ${formatMiB(whisperModel.length())}\n" +
                              qwenStatus +
                              "\nLoading transcription engine..."
                          modelButton.visibility = View.GONE
                          loadWhisperModel(whisperModel)
                      }

                      partial.exists() && partial.length() > 0L -> {
                          statusView.text = "PARTIAL WHISPER DOWNLOAD FOUND"
                          modelInfoView.text =
                              "Downloaded: ${formatMiB(partial.length())}\n" +
                              qwenStatus
                          configureModelButton(
                              "RESUME WHISPER MODEL DOWNLOAD"
                          ) {
                              downloadAndLoadWhisper()
                          }
                      }

                      else -> {
                          statusView.text = "WHISPER MODEL REQUIRED"
                          modelInfoView.text =
                              "Whisper small.en Q5 local speech model\n" +
                              qwenStatus
                          configureModelButton(
                              "DOWNLOAD WHISPER SMALL.EN Q5"
                          ) {
                              downloadAndLoadWhisper()
                          }
                      }
                  }
              }

              private fun configureModelButton(
                  text: String,
                  action: () -> Unit
              ) {
                  modelButton.visibility = View.VISIBLE
                  modelButton.text = text
                  modelButton.isEnabled = true
                  modelButton.setOnClickListener { action() }
              }

              private fun downloadAndLoadWhisper() {
                  operationJob?.cancel()

                  modelButton.isEnabled = false
                  recordButton.isEnabled = false
                  profileSpinner.isEnabled = false
                  deleteWhisperButton.isEnabled = false
                  statusView.text = "DOWNLOADING WHISPER MODEL"
                  transcriptView.text =
                      "TRANSCRIPT\n\nDownloading the local speech model..."

                  operationJob = lifecycleScope.launch {
                      try {
                          val model = withContext(Dispatchers.IO) {
                              downloadWhisperModel { downloaded, total ->
                                  runOnUiThread {
                                      updateDownloadProgress(
                                          downloaded,
                                          total
                                      )
                                  }
                              }
                          }

                          loadWhisperModelInternal(model)
                      } catch (error: Throwable) {
                          showError("WHISPER DOWNLOAD FAILED", error)
                      }
                  }
              }

              private fun updateDownloadProgress(
                  downloaded: Long,
                  total: Long
              ) {
                  if (total > 0L) {
                      val percent =
                          downloaded.toDouble() * 100.0 / total.toDouble()

                      statusView.text = String.format(
                          Locale.US,
                          "DOWNLOADING %.1f%%",
                          percent
                      )

                      modelInfoView.text =
                          "${formatMiB(downloaded)} of " +
                          formatMiB(total)
                  } else {
                      statusView.text = "DOWNLOADING WHISPER MODEL"
                      modelInfoView.text =
                          "${formatMiB(downloaded)} downloaded"
                  }
              }

              private fun downloadWhisperModel(
                  progress: (Long, Long) -> Unit
              ): File {
                  val destination = whisperModelFile()
                  val partial = whisperPartialFile()

                  if (isValidWhisperModel(destination)) {
                      return destination
                  }

                  var existing =
                      if (partial.exists()) partial.length() else 0L

                  val connection = openDownloadConnection(existing)
                  val response = connection.responseCode

                  val append =
                      existing > 0L &&
                      response == HttpURLConnection.HTTP_PARTIAL

                  if (!append) {
                      existing = 0L
                  }

                  if (response !in 200..299) {
                      connection.disconnect()
                      error("Whisper model server returned HTTP $response")
                  }

                  val total = when {
                      response == HttpURLConnection.HTTP_PARTIAL -> {
                          parseTotalFromContentRange(
                              connection.getHeaderField("Content-Range")
                          )
                      }

                      connection.contentLengthLong > 0L -> {
                          connection.contentLengthLong
                      }

                      else -> -1L
                  }

                  RandomAccessFile(partial, "rw").use { output ->
                      if (append) {
                          output.seek(existing)
                      } else {
                          output.setLength(0L)
                      }

                      connection.inputStream
                          .buffered(1024 * 1024)
                          .use { input ->
                              val buffer = ByteArray(1024 * 1024)
                              var downloaded = existing
                              var lastUpdate = 0L

                              while (true) {
                                  val count = input.read(buffer)
                                  if (count < 0) {
                                      break
                                  }

                                  output.write(buffer, 0, count)
                                  downloaded += count

                                  val now =
                                      SystemClock.elapsedRealtime()

                                  if (now - lastUpdate >= 500L) {
                                      progress(downloaded, total)
                                      lastUpdate = now
                                  }
                              }

                              progress(downloaded, total)
                          }

                      output.fd.sync()
                  }

                  connection.disconnect()
                  validateWhisperModel(partial)

                  if (destination.exists()) {
                      check(destination.delete()) {
                          "Could not replace the previous Whisper model."
                      }
                  }

                  check(partial.renameTo(destination)) {
                      "Could not finalize the Whisper model download."
                  }

                  return destination
              }

              private fun openDownloadConnection(
                  resumeOffset: Long
              ): HttpURLConnection {
                  var current = URL(WHISPER_MODEL_URL)

                  repeat(MAX_REDIRECTS) {
                      val connection =
                          current.openConnection() as HttpURLConnection

                      connection.instanceFollowRedirects = false
                      connection.connectTimeout = 30_000
                      connection.readTimeout = 60_000
                      connection.setRequestProperty(
                          "User-Agent",
                          "V17D-Phone-Mic-Profiler/1.0"
                      )
                      connection.setRequestProperty(
                          "Accept-Encoding",
                          "identity"
                      )

                      if (resumeOffset > 0L) {
                          connection.setRequestProperty(
                              "Range",
                              "bytes=$resumeOffset-"
                          )
                      }

                      val code = connection.responseCode

                      if (code in REDIRECT_CODES) {
                          val location =
                              connection.getHeaderField("Location")
                                  ?: error(
                                      "Redirect did not include Location."
                                  )

                          current = URL(current, location)
                          connection.disconnect()
                      } else {
                          return connection
                      }
                  }

                  error("Too many model-download redirects.")
              }

              private fun parseTotalFromContentRange(
                  value: String?
              ): Long {
                  if (value.isNullOrBlank()) {
                      return -1L
                  }

                  val slash = value.lastIndexOf('/')
                  if (slash < 0 || slash == value.lastIndex) {
                      return -1L
                  }

                  return value.substring(slash + 1)
                      .toLongOrNull()
                      ?: -1L
              }

              private fun loadWhisperModel(model: File) {
                  operationJob?.cancel()

                  operationJob = lifecycleScope.launch {
                      try {
                          loadWhisperModelInternal(model)
                      } catch (error: Throwable) {
                          showError("WHISPER MODEL LOAD FAILED", error)
                      }
                  }
              }

              private suspend fun loadWhisperModelInternal(model: File) {
                  validateWhisperModel(model)

                  statusView.text = "LOADING WHISPER IN-PROCESS"
                  modelInfoView.text =
                      "Model: ${formatMiB(model.length())}\n" +
                      "Initializing official whisper.cpp Android binding..."

                  val started = SystemClock.elapsedRealtime()

                  withContext(Dispatchers.IO) {
                      whisperContext?.release()
                      whisperContext =
                          WhisperContext.createContextFromFile(
                              model.absolutePath
                          )
                  }

                  val elapsed =
                      SystemClock.elapsedRealtime() - started

                  modelReady = true
                  statusView.text = "PHONE TRANSCRIPTION READY"
                  modelInfoView.text =
                      "Whisper small.en Q5: " +
                      "${formatMiB(model.length())}\n" +
                      "Model load: $elapsed ms\n" +
                      qwenPreservationText()

                  modelButton.visibility = View.GONE
                  profileSpinner.isEnabled = true
                  recordButton.isEnabled = true
                  deleteWhisperButton.isEnabled = true
                  transcriptView.text =
                      "TRANSCRIPT\n\n" +
                      "Choose a capture profile. Put the phone where both " +
                      "speakers can be heard, then record the same test phrase " +
                      "with each profile."
              }

              private fun requestPermissionAndRecord() {
                  if (!modelReady || whisperContext == null) {
                      Toast.makeText(
                          this,
                          "The Whisper model is not ready.",
                          Toast.LENGTH_SHORT
                      ).show()
                      return
                  }

                  if (
                      ContextCompat.checkSelfPermission(
                          this,
                          Manifest.permission.RECORD_AUDIO
                      ) == PackageManager.PERMISSION_GRANTED
                  ) {
                      startRecording()
                  } else {
                      microphonePermissionLauncher.launch(
                          Manifest.permission.RECORD_AUDIO
                      )
                  }
              }

              @SuppressLint("MissingPermission")
              private fun startRecording() {
                  if (isRecording) {
                      return
                  }

                  val profile =
                      profiles[profileSpinner.selectedItemPosition]

                  stopRequested.set(false)
                  isRecording = true

                  statusView.text = "RECORDING — ${profile.label}"
                  levelView.text = "INPUT LEVEL: measuring..."
                  routeView.text = "ROUTE: opening phone microphone..."
                  transcriptView.text =
                      "TRANSCRIPT\n\nRecording. Speak naturally. " +
                      "Maximum length is 30 seconds."

                  profileSpinner.isEnabled = false
                  modelButton.isEnabled = false
                  deleteWhisperButton.isEnabled = false
                  recordButton.text = "STOP AND TRANSCRIBE"
                  recordButton.isEnabled = true

                  recordingJob = lifecycleScope.launch(Dispatchers.IO) {
                      try {
                          val capture = captureAudio(profile)

                          withContext(Dispatchers.Main) {
                              isRecording = false
                              recordButton.text =
                                  "START 30-SECOND MAX RECORDING"
                              recordButton.isEnabled = false
                              statusView.text = "TRANSCRIBING LOCALLY"
                              levelView.text =
                                  "CAPTURED: " +
                                  String.format(
                                      Locale.US,
                                      "%.1f seconds",
                                      capture.durationMs / 1000.0
                                  )
                              routeView.text =
                                  buildCaptureRouteText(capture)
                          }

                          transcribeCapture(capture)
                      } catch (error: Throwable) {
                          withContext(Dispatchers.Main) {
                              isRecording = false
                              showError("PHONE AUDIO CAPTURE FAILED", error)
                          }
                      }
                  }
              }

              private fun stopRecording() {
                  if (!isRecording) {
                      return
                  }

                  stopRequested.set(true)
                  recordButton.isEnabled = false
                  recordButton.text = "STOPPING..."

                  try {
                      activeAudioRecord?.let { recorder ->
                          if (
                              recorder.recordingState ==
                              AudioRecord.RECORDSTATE_RECORDING
                          ) {
                              recorder.stop()
                          }
                      }
                  } catch (_: Throwable) {
                      // The capture thread handles final cleanup.
                  }
              }

              @SuppressLint("MissingPermission")
              private fun captureAudio(
                  profile: AudioProfile
              ): CaptureResult {
                  val minBuffer = AudioRecord.getMinBufferSize(
                      SAMPLE_RATE,
                      AudioFormat.CHANNEL_IN_MONO,
                      AudioFormat.ENCODING_PCM_16BIT
                  )

                  check(minBuffer > 0) {
                      "AudioRecord minimum buffer failed: $minBuffer"
                  }

                  val bufferSize = maxOf(
                      minBuffer * 4,
                      SAMPLE_RATE * 2
                  )

                  val recorder = AudioRecord.Builder()
                      .setAudioSource(profile.source)
                      .setAudioFormat(
                          AudioFormat.Builder()
                              .setSampleRate(SAMPLE_RATE)
                              .setEncoding(
                                  AudioFormat.ENCODING_PCM_16BIT
                              )
                              .setChannelMask(
                                  AudioFormat.CHANNEL_IN_MONO
                              )
                              .build()
                      )
                      .setBufferSizeInBytes(bufferSize)
                      .build()

                  check(
                      recorder.state == AudioRecord.STATE_INITIALIZED
                  ) {
                      "Audio profile could not initialize: " +
                          profile.label
                  }

                  val audioManager =
                      getSystemService(
                          Context.AUDIO_SERVICE
                      ) as AudioManager

                  val builtInMic = audioManager.getDevices(
                      AudioManager.GET_DEVICES_INPUTS
                  ).firstOrNull {
                      it.type == AudioDeviceInfo.TYPE_BUILTIN_MIC
                  }

                  val routeAccepted =
                      builtInMic?.let {
                          recorder.setPreferredDevice(it)
                      } ?: false

                  val logicalDevice =
                      builtInMic?.let {
                          "id=${it.id}, product=${it.productName}, " +
                              "type=${it.type}"
                      } ?: "No TYPE_BUILTIN_MIC device was enumerated"

                  activeAudioRecord = recorder

                  val chunks = ArrayList<ShortArray>()
                  var totalSamples = 0
                  var activeMicText = "Not reported yet"
                  var routeReported = false
                  var lastMeterUpdate = 0L
                  val maximumSamples =
                      SAMPLE_RATE * MAX_RECORDING_SECONDS

                  val buffer = ShortArray(bufferSize / 2)

                  try {
                      recorder.startRecording()

                      check(
                          recorder.recordingState ==
                          AudioRecord.RECORDSTATE_RECORDING
                      ) {
                          "AudioRecord did not enter recording state."
                      }

                      while (
                          !stopRequested.get() &&
                          totalSamples < maximumSamples
                      ) {
                          val read = recorder.read(
                              buffer,
                              0,
                              buffer.size,
                              AudioRecord.READ_BLOCKING
                          )

                          if (read > 0) {
                              chunks.add(buffer.copyOf(read))
                              totalSamples += read

                              val now =
                                  SystemClock.elapsedRealtime()

                              if (!routeReported) {
                                  activeMicText =
                                      describeActiveMicrophones(
                                          recorder
                                      )
                                  routeReported = true

                                  runOnUiThread {
                                      routeView.text =
                                          "PREFERRED BUILT-IN ROUTE: " +
                                          if (routeAccepted) {
                                              "accepted"
                                          } else {
                                              "not confirmed"
                                          } +
                                          "\nLOGICAL DEVICE: " +
                                          logicalDevice +
                                          "\nACTIVE PHYSICAL MICS:\n" +
                                          activeMicText
                                  }
                              }

                              if (now - lastMeterUpdate >= 250L) {
                                  val meter =
                                      calculateMeter(buffer, read)

                                  runOnUiThread {
                                      levelView.text =
                                          "INPUT LEVEL: " + meter
                                  }

                                  lastMeterUpdate = now
                              }
                          } else if (!stopRequested.get()) {
                              error(
                                  "AudioRecord.read returned $read"
                              )
                          }
                      }
                  } finally {
                      try {
                          if (
                              recorder.recordingState ==
                              AudioRecord.RECORDSTATE_RECORDING
                          ) {
                              recorder.stop()
                          }
                      } catch (_: Throwable) {
                          // Ignore stop races during cleanup.
                      }

                      recorder.release()
                      activeAudioRecord = null
                  }

                  check(totalSamples > SAMPLE_RATE / 2) {
                      "Recording was too short to transcribe."
                  }

                  val floatSamples = FloatArray(totalSamples)
                  var outputIndex = 0

                  for (chunk in chunks) {
                      for (sample in chunk) {
                          if (outputIndex >= totalSamples) {
                              break
                          }

                          floatSamples[outputIndex] =
                              sample.toFloat() / 32768.0f
                          outputIndex += 1
                      }
                  }

                  val durationMs =
                      totalSamples.toLong() * 1000L / SAMPLE_RATE

                  return CaptureResult(
                      samples = floatSamples,
                      durationMs = durationMs,
                      profile = profile,
                      preferredRouteAccepted = routeAccepted,
                      logicalDevice = logicalDevice,
                      activeMics = activeMicText
                  )
              }

              private fun calculateMeter(
                  buffer: ShortArray,
                  count: Int
              ): String {
                  var sumSquares = 0.0
                  var peak = 0

                  for (index in 0 until count) {
                      val value = buffer[index].toInt()
                      sumSquares += value.toDouble() * value.toDouble()
                      peak = maxOf(peak, abs(value))
                  }

                  val rms =
                      sqrt(sumSquares / count.toDouble()) / 32768.0
                  val peakRatio =
                      peak.toDouble() / 32768.0

                  val rmsDb =
                      if (rms > 0.0) {
                          20.0 * log10(rms)
                      } else {
                          -120.0
                      }

                  val peakDb =
                      if (peakRatio > 0.0) {
                          20.0 * log10(peakRatio)
                      } else {
                          -120.0
                      }

                  return String.format(
                      Locale.US,
                      "RMS %.1f dBFS • peak %.1f dBFS",
                      rmsDb,
                      peakDb
                  )
              }

              private fun describeActiveMicrophones(
                  recorder: AudioRecord
              ): String =
                  try {
                      val microphones = recorder.activeMicrophones

                      if (microphones.isEmpty()) {
                          "Android returned no active physical microphones."
                      } else {
                          microphones.mapIndexed { index, mic ->
                              "#${index + 1} id=${mic.id}, " +
                                  "type=${mic.type}, " +
                                  "location=${mic.location}, " +
                                  "group=${mic.group}, " +
                                  "groupIndex=${mic.indexInTheGroup}, " +
                                  "channels=" +
                                  mic.channelMapping.joinToString {
                                      "${it.first}->${it.second}"
                                  }
                          }.joinToString("\n")
                      }
                  } catch (error: Throwable) {
                      "Unavailable: ${error.javaClass.simpleName}: " +
                          (error.message ?: "no message")
                  }

              private fun transcribeCapture(
                  capture: CaptureResult
              ) {
                  transcriptionJob?.cancel()

                  transcriptionJob =
                      lifecycleScope.launch(Dispatchers.Default) {
                          try {
                              val context =
                                  whisperContext
                                      ?: error(
                                          "Whisper context is not loaded."
                                      )

                              val started =
                                  SystemClock.elapsedRealtime()

                              val text = context.transcribeData(
                                  capture.samples,
                                  printTimestamp = false
                              ).trim()

                              val elapsed =
                                  SystemClock.elapsedRealtime() -
                                  started

                              withContext(Dispatchers.Main) {
                                  statusView.text =
                                      "LOCAL TRANSCRIPTION COMPLETE"
                                  modelInfoView.text =
                                      "Audio: " +
                                      String.format(
                                          Locale.US,
                                          "%.1f sec\n",
                                          capture.durationMs / 1000.0
                                      ) +
                                      "Transcription: $elapsed ms\n" +
                                      "Real-time factor: " +
                                      String.format(
                                          Locale.US,
                                          "%.2fx\n",
                                          elapsed.toDouble() /
                                              capture.durationMs.toDouble()
                                      ) +
                                      qwenPreservationText()

                                  transcriptView.text =
                                      "TRANSCRIPT\n\n" +
                                      if (text.isBlank()) {
                                          "(Whisper returned no text.)"
                                      } else {
                                          text
                                      }

                                  profileSpinner.isEnabled = true
                                  recordButton.text =
                                      "START 30-SECOND MAX RECORDING"
                                  recordButton.isEnabled = true
                                  deleteWhisperButton.isEnabled = true
                              }
                          } catch (error: Throwable) {
                              withContext(Dispatchers.Main) {
                                  showError(
                                      "LOCAL TRANSCRIPTION FAILED",
                                      error
                                  )
                              }
                          }
                      }
              }

              private fun buildCaptureRouteText(
                  capture: CaptureResult
              ): String =
                  "PROFILE: ${capture.profile.label}\n" +
                      "PREFERRED BUILT-IN ROUTE: " +
                      if (capture.preferredRouteAccepted) {
                          "accepted"
                      } else {
                          "not confirmed"
                      } +
                      "\nLOGICAL DEVICE: ${capture.logicalDevice}\n" +
                      "ACTIVE PHYSICAL MICS:\n${capture.activeMics}"

              private fun confirmDeleteWhisperModel() {
                  val model = whisperModelFile()
                  val partial = whisperPartialFile()
                  val bytes = model.length() + partial.length()

                  AlertDialog.Builder(this)
                      .setTitle("Delete Whisper model?")
                      .setMessage(
                          "This removes " +
                              if (bytes > 0L) {
                                  formatMiB(bytes)
                              } else {
                                  "the local speech model"
                              } +
                              ". The Qwen conversation model is not deleted."
                      )
                      .setNegativeButton("CANCEL", null)
                      .setPositiveButton("DELETE") { _, _ ->
                          deleteWhisperModel()
                      }
                      .show()
              }

              private fun deleteWhisperModel() {
                  stopRecording()
                  recordingJob?.cancel()
                  transcriptionJob?.cancel()
                  operationJob?.cancel()

                  modelReady = false
                  recordButton.isEnabled = false
                  profileSpinner.isEnabled = false
                  deleteWhisperButton.isEnabled = false
                  statusView.text = "DELETING WHISPER MODEL"

                  operationJob = lifecycleScope.launch {
                      try {
                          withContext(Dispatchers.IO) {
                              whisperContext?.release()
                              whisperContext = null

                              val model = whisperModelFile()
                              val partial = whisperPartialFile()

                              if (model.exists()) {
                                  check(model.delete()) {
                                      "Could not delete Whisper model."
                                  }
                              }

                              if (partial.exists()) {
                                  check(partial.delete()) {
                                      "Could not delete partial model."
                                  }
                              }
                          }

                          showInitialState()
                          statusView.text = "WHISPER MODEL DELETED"
                          transcriptView.text =
                              "TRANSCRIPT\n\n" +
                              "Whisper files were deleted. " +
                              "The Qwen model was left untouched."
                      } catch (error: Throwable) {
                          showError(
                              "WHISPER MODEL DELETE FAILED",
                              error
                          )
                      }
                  }
              }

              private fun showError(
                  title: String,
                  error: Throwable
              ) {
                  isRecording = false
                  statusView.text = title
                  modelInfoView.text =
                      "${error.javaClass.simpleName}: " +
                      (error.message ?: "(no message)")
                  transcriptView.text =
                      "TRANSCRIPT\n\nERROR: " +
                      error.javaClass.name +
                      "\n" +
                      (error.message ?: "(no message)")

                  recordButton.text =
                      "START 30-SECOND MAX RECORDING"
                  recordButton.isEnabled = modelReady
                  profileSpinner.isEnabled = modelReady
                  deleteWhisperButton.isEnabled =
                      whisperModelFile().exists() ||
                      whisperPartialFile().exists()

                  if (!modelReady) {
                      configureModelButton("RETRY") {
                          if (
                              isValidWhisperModel(
                                  whisperModelFile()
                              )
                          ) {
                              loadWhisperModel(
                                  whisperModelFile()
                              )
                          } else {
                              downloadAndLoadWhisper()
                          }
                      }
                  }
              }

              private fun modelsDirectory(): File {
                  val directory = File(filesDir, "models")

                  if (directory.exists() && !directory.isDirectory) {
                      check(directory.delete()) {
                          "Could not replace invalid models path."
                      }
                  }

                  if (!directory.exists()) {
                      check(directory.mkdirs()) {
                          "Could not create private models directory."
                      }
                  }

                  return directory
              }

              private fun whisperModelFile(): File =
                  File(modelsDirectory(), WHISPER_MODEL_FILENAME)

              private fun whisperPartialFile(): File =
                  File(
                      modelsDirectory(),
                      "$WHISPER_MODEL_FILENAME.part"
                  )

              private fun qwenModelFile(): File =
                  File(modelsDirectory(), QWEN_MODEL_FILENAME)

              private fun qwenPreservationText(): String {
                  val file = qwenModelFile()

                  return if (file.exists()) {
                      "Qwen preserved: ${formatGiB(file.length())}"
                  } else {
                      "Qwen model not currently present"
                  }
              }

              private fun isValidWhisperModel(
                  file: File
              ): Boolean =
                  try {
                      validateWhisperModel(file)
                      true
                  } catch (_: Throwable) {
                      false
                  }

              private fun validateWhisperModel(file: File) {
                  check(file.exists()) {
                      "Whisper model is missing."
                  }
                  check(file.isFile) {
                      "Whisper model path is not a file."
                  }
                  check(file.length() >= MINIMUM_WHISPER_MODEL_BYTES) {
                      "Whisper model is incomplete: " +
                          "${file.length()} bytes."
                  }
              }

              private fun label(
                  value: String,
                  size: Float,
                  color: String,
                  bold: Boolean,
                  gravityValue: Int
              ): TextView =
                  TextView(this).apply {
                      text = value
                      textSize = size
                      setTextColor(Color.parseColor(color))
                      gravity = gravityValue
                      setPadding(0, dp(4), 0, dp(4))

                      if (bold) {
                          setTypeface(Typeface.DEFAULT, Typeface.BOLD)
                      }
                  }

              private fun dp(value: Int): Int =
                  (value * resources.displayMetrics.density).toInt()

              private fun formatMiB(bytes: Long): String =
                  String.format(
                      Locale.US,
                      "%.1f MiB",
                      bytes.toDouble() / (1024.0 * 1024.0)
                  )

              private fun formatGiB(bytes: Long): String =
                  String.format(
                      Locale.US,
                      "%.2f GiB",
                      bytes.toDouble() /
                          (1024.0 * 1024.0 * 1024.0)
                  )

              override fun onStop() {
                  if (isRecording) {
                      stopRecording()
                  }
                  super.onStop()
              }

              override fun onDestroy() {
                  stopRequested.set(true)

                  try {
                      activeAudioRecord?.stop()
                  } catch (_: Throwable) {
                      // Ignore shutdown race.
                  }

                  recordingJob?.cancel()
                  transcriptionJob?.cancel()
                  operationJob?.cancel()

                  whisperContext?.let { context ->
                      runBlocking(Dispatchers.IO) {
                          try {
                              context.release()
                          } catch (_: Throwable) {
                              // Process is shutting down.
                          }
                      }
                  }

                  whisperContext = null
                  super.onDestroy()
              }

              companion object {
                  private const val SAMPLE_RATE = 16_000
                  private const val MAX_RECORDING_SECONDS = 30

                  private const val WHISPER_MODEL_FILENAME =
                      "ggml-small.en-q5_1.bin"

                  private const val WHISPER_MODEL_URL =
                      "https://huggingface.co/ggerganov/" +
                      "whisper.cpp/resolve/main/" +
                      "ggml-small.en-q5_1.bin?download=true"

                  private const val MINIMUM_WHISPER_MODEL_BYTES =
                      100_000_000L

                  private const val QWEN_MODEL_FILENAME =
                      "Qwen3-4B-Instruct-2507-Q4_K_M.gguf"

                  private const val MAX_REDIRECTS = 10

                  private val REDIRECT_CODES = setOf(
                      HttpURLConnection.HTTP_MOVED_PERM,
                      HttpURLConnection.HTTP_MOVED_TEMP,
                      HttpURLConnection.HTTP_SEE_OTHER,
                      307,
                      308
                  )
              }
          }
          EOF

          if grep -RInE \
              'ProcessBuilder[[:space:]]*\(|Runtime\.getRuntime[[:space:]]*\(|whisper-cli|llama-cli|llama-server' \
              "${APP}/src/main/java"; then
            echo "Forbidden CLI/subprocess integration found."
            exit 1
          fi

      - name: Build V17D and preserve the complete Gradle log
        id: gradle_build
        working-directory: llama.cpp/examples/llama.android
        shell: bash
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx6g
            -Dfile.encoding=UTF-8
            -Dkotlin.daemon.jvm.options=-Xmx2g
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
          ANDROID_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
        run: |
          set -uo pipefail

          chmod +x gradlew

          set +e
          ./gradlew \
            :app:assembleRelease \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            2>&1 | tee "${GITHUB_WORKSPACE}/V17D-gradle-build.log"

          BUILD_STATUS="${PIPESTATUS[0]}"
          set -e

          echo "status=${BUILD_STATUS}" >> "${GITHUB_OUTPUT}"
          echo "Gradle exit code: ${BUILD_STATUS}"
          exit 0

      - name: Upload complete Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: V17D-Complete-Gradle-Build-Log
          path: V17D-gradle-build.log
          if-no-files-found: error
          retention-days: 14

      - name: Stop after a recorded build failure
        if: steps.gradle_build.outputs.status != '0'
        shell: bash
        run: |
          echo "Gradle failed. Download the V17D complete build log."
          exit 1

      - name: Verify and name the signed APK
        shell: bash
        run: |
          set -euxo pipefail

          APK="llama.cpp/examples/llama.android/app/build/outputs/apk/release/app-release.apk"
          test -f "${APK}"

          unzip -l "${APK}" > /tmp/v17d-apk-contents.txt

          grep -E \
            "lib/arm64-v8a/libwhisper(_v8fp16_va)?\.so" \
            /tmp/v17d-apk-contents.txt

          if grep -E "lib/x86_64/|lib/armeabi-v7a/|lib/x86/" \
              /tmp/v17d-apk-contents.txt; then
            echo "Unexpected non-arm64 native libraries were packaged."
            exit 1
          fi

          if grep -E "\.(gguf|bin)$" /tmp/v17d-apk-contents.txt; then
            echo "A model was unexpectedly embedded in the APK."
            exit 1
          fi

          cp "${APK}" V17D-Phone-Mic-Whisper-Profiler.apk
          ls -lh V17D-Phone-Mic-Whisper-Profiler.apk

      - name: Verify permanent APK signature
        shell: bash
        run: |
          set -euo pipefail

          APK="V17D-Phone-Mic-Whisper-Profiler.apk"

          "${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner" \
            verify \
            --verbose \
            --print-certs \
            "${APK}" \
            | tee V17D-apk-signature.txt

          grep -F "Signer #1 certificate" V17D-apk-signature.txt

      - name: Upload signing certificate report
        uses: actions/upload-artifact@v4
        with:
          name: V17D-Permanent-Signing-Certificate
          path: V17D-apk-signature.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload V17D phone microphone profiler APK
        uses: actions/upload-artifact@v4
        with:
          name: V17D-Phone-Mic-Whisper-Profiler-APK
          path: V17D-Phone-Mic-Whisper-Profiler.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
